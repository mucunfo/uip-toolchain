# APIs exclusivas de versão > pin Sicoob.
#
# Consumido por heuristic `uip_engine.heuristics.pin_alert.detect_pin_alert`
# (rule D-PIN-ALERT em rules.yaml).
#
# Status manual atual. Roadmap Tier 3 substitui catálogo por harvester
# automático via `runners/api_probe/` (Cecil / System.Reflection.Metadata
# sobre `.nupkg` pinados em canonical_pins.yaml). Quando harvester ship'ar:
#  - Engine carrega catálogo gerado em `.uip-toolchain/.tmp/api_surface_<pkg>_<ver>.json`
#  - Diff entre pin canonical e versões superiores popula introduced_in
#  - Este YAML continua como override manual pra casos refinados (mechanical: ...)
#
# Para cada package, lista APIs/atributos/elementos XAML que só existem em
# versões >= `introduced_in`. Quando `project.json::dependencies[<package>]`
# tem versão pinada < `introduced_in` AND algum XAML do projeto contém o
# `pattern`, o detector emite finding ERROR.
#
# Caso típico: Activity Migrator (Studio GA) ignora pin Sicoob e instala
# latest stable do pacote, injetando APIs novas em XAMLs migrados. Quando
# o engine realinha o package ao pin (regra D-1*), as APIs órfãs ficam
# no XAML e geram `UIPATH:LOAD ERROR` no Studio analyzer.
#
# Adicionar novos casos conforme aparecerem em produção. Formato:
#
# <PackageName>:
#   apis:
#     - pattern: '<regex>'              # ASCII regex, usado por re.finditer no XAML content
#       introduced_in: 'X.Y.Z'          # primeira versão pública onde a API existe
#       where: xaml_attribute|xaml_element  # informativo (não muda matching)
#       fix: 'texto curto pt-BR'        # prose fix no finding

UiPath.System.Activities:
  apis:
    # Patterns precisam matchar XAML actual form. Studio analyzer reporta como
    # `RetryScope.LogRetriedExceptions` (dotted), mas no XAML aparece como
    # `<ui:RetryScope ... LogRetriedExceptions="..."`. Pattern detecta XAML form.
    #
    # RetryScope classic (UiPath.Core.Activities.RetryScope) e CopyFile/MoveFile
    # classic são UiPath.System.Activities — NÃO UIAutomation. Verificado
    # empiricamente (2026-07-03) via grep no metadata de
    # uipath.system.activities.runtime.windows/<ver>/lib/net6.0-windows7.0/UiPath.System.Activities.dll:
    #   LogRetriedExceptions/RetriedExceptionsLogLevel: ausente 25.6.1, presente 25.8.1+
    #   DestinationResource/PathResource: presente desde <= 23.10.6 (mais antigo em cache)
    - pattern: '<ui:RetryScope\b[^>]*\bLogRetriedExceptions\s*='
      introduced_in: '25.8.1'
      where: xaml_attribute
      fix: 'Remover atributo LogRetriedExceptions (não existe em UiPath.System.Activities pin Sicoob 25.4.4).'
      mechanical:
        type: strip_xml_attribute
        attribute: LogRetriedExceptions
    - pattern: '<ui:RetryScope\b[^>]*\bRetriedExceptionsLogLevel\s*='
      introduced_in: '25.8.1'
      where: xaml_attribute
      fix: 'Remover atributo RetriedExceptionsLogLevel (não existe em UiPath.System.Activities pin Sicoob 25.4.4).'
      mechanical:
        type: strip_xml_attribute
        attribute: RetriedExceptionsLogLevel
    - pattern: '<ui:CopyFile\b[^>]*\bDestinationResource\s*='
      introduced_in: '23.10.6'
      where: xaml_attribute
      fix: 'Remover atributo DestinationResource. Usar Destination (path local).'
      mechanical:
        type: strip_xml_attribute
        attribute: DestinationResource
    - pattern: '<ui:CopyFile\b[^>]*\bPathResource\s*='
      introduced_in: '23.10.6'
      where: xaml_attribute
      fix: 'Remover atributo PathResource. Usar Path (path local).'
      mechanical:
        type: strip_xml_attribute
        attribute: PathResource
    - pattern: '<ui:MoveFile\b[^>]*\bDestinationResource\s*='
      introduced_in: '23.10.6'
      where: xaml_attribute
      fix: 'Remover atributo DestinationResource. Usar Destination (path local).'
      mechanical:
        type: strip_xml_attribute
        attribute: DestinationResource
    - pattern: '<ui:MoveFile\b[^>]*\bPathResource\s*='
      introduced_in: '23.10.6'
      where: xaml_attribute
      fix: 'Remover atributo PathResource. Usar Path (path local).'
      mechanical:
        type: strip_xml_attribute
        attribute: PathResource

UiPath.UIAutomation.Activities:
  apis:
    - pattern: '<uix:NWindowOperation\b'
      introduced_in: '25.10.21'
      where: xaml_element
      fix: 'Activity NWindowOperation não disponível no pin 25.10.8. Engine strip element + força CloseMode="Always" no NApplicationCard pai (cobre close lifecycle equivalente).'
      mechanical:
        type: strip_nwindow_operation
    - pattern: '<uix:NTakeScreenshot\b'
      introduced_in: '25.10.21'
      where: xaml_element
      fix: 'Activity NTakeScreenshot não disponível no pin 25.10.8/Studio 23.10. Converter para ui:TakeScreenshot clássico preservando OutImage e alvo quando possível.'
      mechanical:
        type: rewrite_ntake_screenshot_to_classic
    - pattern: '<uix:TargetAnchorable\b[^>]*\bElementVisibilityArgument\s*='
      introduced_in: '25.10.21'
      where: xaml_attribute
      fix: 'Remover atributo ElementVisibilityArgument de TargetAnchorable (não existe em UIA pin Sicoob 25.10.8).'
      mechanical:
        type: strip_xml_attribute
        attribute: ElementVisibilityArgument
        element: uix:TargetAnchorable
    - pattern: '<uix:TargetAnchorable\b[^>]*\bImageAccuracyArgument\s*='
      introduced_in: '25.10.21'
      where: xaml_attribute
      fix: 'Remover atributo ImageAccuracyArgument de TargetAnchorable (não existe em UIA pin Sicoob 25.10.8).'
      mechanical:
        type: strip_xml_attribute
        attribute: ImageAccuracyArgument
        element: uix:TargetAnchorable
    - pattern: '<uix:Target\b[^>]*\bImageAccuracyArgument\s*='
      introduced_in: '25.10.21'
      where: xaml_attribute
      fix: 'Remover atributo ImageAccuracyArgument de Target (não existe em UIA pin Sicoob 25.10.8).'
      mechanical:
        type: strip_xml_attribute
        attribute: ImageAccuracyArgument
        element: uix:Target

UiPath.OCR.Activities:
  apis:
    - pattern: '<[A-Za-z_][\w]*:UiPathScreenOCR\b[^>]*\bUseSeparateOcrProcess\s*='
      introduced_in: '3.23.0'
      where: xaml_attribute
      fix: 'Remover atributo UseSeparateOcrProcess de UiPathScreenOCR (não existe em UiPath.OCR.Activities pin Sicoob 3.22.0).'
      mechanical:
        type: strip_xml_attribute
        attribute: UseSeparateOcrProcess

UiPath.Mail.Activities:
  apis:
    - pattern: '<ui:SendMail\b[^>]*\bConnectionMode\s*='
      introduced_in: '1.25.0'
      where: xaml_attribute
      fix: 'Remover atributo ConnectionMode de SendMail (não existe em UiPath.Mail.Activities pin Sicoob 1.24.2).'
      mechanical:
        type: strip_xml_attribute
        attribute: ConnectionMode
