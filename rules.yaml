  - id: IOCR-2
    severity: ERROR
    category: breaking
    target: all
    title: "Document Understanding ML pack auto-instalado (não remover)"
    description: |
      Auto-instalado desde v6.19.0. Generative validators + Modern DU
      consumption (v6.22.0+) dependem dele.
    detect:
      type: agent_only

  - id: IOCR-3
    severity: ERROR
    category: architectural
    target: all
    title: "Validation human-in-loop para low-confidence em campos críticos"
    description: |
      Present Validation Station (síncrono) ou Action Center via apps
      (v6.24.0). CPF/CNPJ/valor exigem audit trail antes de core banking.
    detect:
      type: agent_only

  - id: IOCR-4
    severity: ERROR
    category: breaking
    target: all
    title: "Não usar CJK OCR (deprecada jan/2025)"
    description: |
      Migrar para UiPath Extended Languages OCR (GA desde v6.22.0).
      PT-BR não usa CJK mas regra vale para XAML legado.

      Detector regex cobre `<*:CjkOCR>` (e variantes property element).
      Fix mecânico via rename_element → ExtendedLanguagesOCR. Schema
      confirma args IDÊNTICOS entre os dois (rename seguro, sem migração
      de attrs). Mesmo pkg (UiPath.OCR.Activities) — sem mudança de
      dependência.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.crypto
        function: detect_iocr4_cjk_ocr
    fix:
      apply_class: deterministic
      # fix_mechanical per-finding (type=rename_element) — prefix extraído
      # do XAML (CjkOCR usa xmlns/ocr próprio, não `ui:`).
      prose: |
        Renomear `<*:CjkOCR>` → `<*:ExtendedLanguagesOCR>` (open, close,
        property elements). Args preservados — schema idêntico.
        Prefix extraído do XAML (xmlns/ocr próprio, normalmente não `ui:`).

  - id: IOCR-5
    severity: ERROR
    category: breaking
    target: all
    title: "ApplyOcrOnPdf substituiu ForceApplyOCR (v6.5.0+)"
    description: |
      XAML migrado de versão < 6.5 deve ser atualizado.
      ForceApplyOCR não existe mais no v6.24.0.
      Rename 1:1 oficial — schema preserva semantic (bool flag).
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: regex
      pattern: '\bForceApplyOCR\b'
    fix:
      apply_class: deterministic
      mechanical:
        type: regex_replace
        pattern: '\bForceApplyOCR\b'
        replacement: 'ApplyOcrOnPdf'
      prose: |
        Trocar `ForceApplyOCR` por `ApplyOcrOnPdf`. Rename oficial UiPath
        v6.5.0+; schema preserva bool semantic. Idempotente.
    examples:
      bad: '<ui:DigitizeDocument ForceApplyOCR="[True]" .../>'
      good: '<ui:DigitizeDocument ApplyOcrOnPdf="[True]" .../>'

