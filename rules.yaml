# ---- TEST — Testing pack ----

  - id: TEST-1
    severity: ERROR
    category: testing
    target: all
    title: "Verify Expression somente em Test Cases"
    description: |
      `Verify Expression`/`Verify Expression With Operator`/
      `Verify Control Attribute` SOMENTE em `Tests/`. Nunca dentro de
      Performer/Process.xaml. Logam falhas sem throw, corrompem transações.
      Fix mecânico: delete element (open+body+close OU self-close).
      Engine cascade rollback pega caso edge (sole-child de parent
      restritivo → XML inválido → rollback automático).
    applies_to:
      include: ["**/*.xaml"]
      exclude: ["Tests/**"]
    detect:
      type: regex
      pattern: '<ui:(?:VerifyExpression|VerifyExpressionWithOperator|VerifyControlAttribute)\b'
    fix:
      apply_class: deterministic
      mechanical:
        type: delete_element
        # Cobre 2 formas: self-close `<ui:VerifyX .../>` e bloco
        # `<ui:VerifyX ...>...</ui:VerifyX>` (não-greedy entre open e close
        # do MESMO nome local).
        pattern: '<ui:(?:VerifyExpression|VerifyExpressionWithOperator|VerifyControlAttribute)\b[^>]*?/>|<ui:(VerifyExpression|VerifyExpressionWithOperator|VerifyControlAttribute)\b[^>]*?>[\s\S]*?</ui:\1>'
      prose: |
        Remover `<ui:VerifyExpression*>` de XAML produção. Verify só vale em
        Test Cases (passa silent em prod, corrompe transações). Mover lógica
        de assertion p/ Tests/ workflow correspondente.

  - id: TEST-2
    severity: ERROR
    category: testing
    target: all
    title: "Test Case segue Given-When-Then"
    description: |
      Given = arrange (mock data, navegar). When = Invoke do SUT.
      Then = Verify Expression comparando output. Template TestCase do
      Studio enforça layout; desviar quebra Test Manager.
    detect:
      type: agent_only

  - id: TEST-3
    severity: ERROR
    category: testing
    target: all
    title: "Mockar dependências externas (DB2, API Sisbr, SMTP)"
    description: |
      Mock em volta do Invoke Workflow; nunca CI tocar produção bancária.
    detect:
      type: agent_only

  - id: TEST-4
    severity: WARN
    category: testing
    target: all
    title: "TakeScreenshotIfFailed=True + AlternativeVerificationTitle"
    description: |
      Especialmente em data variations. Títulos aparecem em Test Manager
      para QA identificar variação sem rerodar.
    detect:
      type: agent_only

  - id: TEST-5
    severity: WARN
    category: testing
    target: all
    title: "Given workflows project-level + tag tests"
    description: |
      Setup compartilhado (login, abrir Sisbr). Uma asserção lógica por TC
      para falha diagnosticável.
    detect:
      type: agent_only

  - id: TEST-6
    severity: INFO
    category: testing
    target: all
    title: "Variações de dados via Data Service ou Test Data Queues"
    description: |
      Não Config.xlsx. Test data bancário precisa versionamento e PII control.
    detect:
      type: agent_only

# ---- CRY — Cryptography ----

  - id: CRY-1
    severity: HALT
    category: architectural
    target: all
    title: "Nunca hardcode keys/passwords em Encrypt/Hash"
    description: |
      Carregar de Orchestrator Asset (Credential) ou Windows Credential Store.
    detect:
      type: agent_only

  - id: CRY-2
    severity: ERROR
    category: architectural
    target: all
    title: "AES-GCM/AES-256 para simétrico; SHA256/512 para hash"
    description: |
      Evitar DES, RC2, MD5, SHA1, RIPEMD160. 1.4.x ainda expõe legados em
      dropdowns mas não compliam BACEN/PCI-DSS.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: regex
      pattern: 'Algorithm="(?:DES|RC2|MD5|SHA1|RIPEMD160)"'

  - id: CRY-3
    severity: ERROR
    category: architectural
    target: all
    title: "Preferir KeySecureString sobre Key (String)"
    description: |
      1.4.x adicionou overloads SecureString para manter keys fora de
      memory dump e log verbose.
    detect:
      type: agent_only

  - id: CRY-4
    severity: WARN
    category: architectural
    target: all
    title: "Encrypt/Decrypt em Try/Catch sem logar inner verbatim"
    description: |
      CryptographicException pode ecoar IV bytes ou tamanho da key.
    detect:
      type: agent_only

  - id: CRY-5
    severity: WARN
    category: breaking
    target: all
    title: "Migrar Hash Text/File legadas (deprecated em 1.4.0+)"
    description: |
      Studio marca legadas como (deprecated). Novas Hash exigem Key.
      Verificar Key Encoding preservado na migração.

      Detector cobre HashText/HashFile (legacy). Fix mecânico via
      rename_element para variantes Keyed* (open + close + property
      elements). Args idênticos no schema atual — rename é seguro;
      Key arg missing já é coberto por M-2 (required arg) independente
      do rename.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.crypto
        function: detect_cry5_hash_legacy
    fix:
      apply_class: deterministic
      # fix_mechanical per-finding (type=rename_element).
      prose: |
        Renomear `<ui:HashText>` → `<ui:KeyedHashText>` e
        `<ui:HashFile>` → `<ui:KeyedHashFile>`. Args preservados.
        Se Key arg ausente, M-2 emitirá finding separado (não bloqueia
        o rename — Key estava obrigatório no schema legacy também).

  - id: CRY-6
    severity: INFO
    category: architectural
    target: all
    title: "Não confiar só em FIPS-only mode"
    description: |
      Pacote não é FIPS-validated. Usar política Windows FIPS + .NET CNG
      providers se compliance exigir.
    detect:
      type: agent_only

