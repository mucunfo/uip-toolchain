      com UI Automation Performer.
    detect:
      type: agent_only

# ============================================================
# Batch — U (Unused / Undeclared) — higiene + compile safety
# ============================================================

  - id: U-1
    severity: WARN
    category: architectural
    target: all
    title: "Variável declarada não usada"
    description: |
      `<Variable Name="X" />` declarado em `*.Variables` sem nenhuma
      referência em expressões do escopo (atributos `To`/`Value`/
      `Condition`/`[expr]` + body de `<InvokeCode><Code>`).
      Scan case-insensitive (VB compila igual). Excluir matches em
      `<sap2010:Annotation.AnnotationText>` e `<x:Property.Attributes>`.

      Framework/* incluído no escopo (ajuste 2026-05-01) — REFramework
      templates podem ter vars realmente unused após customização. Auto-fix
      gate (XML well-formed + VB ref check) protege contra remoção indevida.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.unused
        function: detect_unused_variables
    fix:
      apply_class: deterministic
      mechanical:
        type: delete_variable
      # Detector injeta `name` per-finding antes do CLI chamar fixer.
      # ViewState IdRef cleanup adiado — Studio tolera orphan IdRef em
      # ViewState (rendering hint, não-breaking). Se aparecer breakage
      # futuro, adicionar fixer secundário.
      prose: |
        Remover `<Variable x:TypeArguments="..." Name="X" />` declaração.
        Auto-fix idempotente cobre self-close e open+close forms.
    examples:
      bad: '<Variable x:TypeArguments="x:String" Name="vStrTemp" />  <!-- never referenced -->'
      good: '<!-- variável removida -->'

  - id: U-2
    severity: INFO
    category: architectural
    target: all
    title: "Argumento declarado não usado (callee + callers limpos)"
    description: |
      `<x:Property Name="in_X" />` ou `io_X` sem leitura no body do callee
      e sem binding em nenhum caller (`InvokeWorkflowFile.Arguments`).
      Severity sobe para WARN após sprint 2 com FP < 5%.
      `out_X` adiado para fase 2 (lógica direção inversa).
      Skips automáticos:
        - Main.xaml (contrato Orchestrator/queue/job).
        - Tests/ (runner reflection).
        - REFramework template files.
        - projectType=Library workflows public (API).
      Heurística passthrough: se callee tem `InvokeWorkflowFile` que passa
      o mesmo nome de arg → cadeia, não unused.
      Detect aborta projeto inteiro se houver `WorkflowFileName="[expr]"`
      dinâmico (não dá mapear caller estático).
      Sprint 1: detect-only. Auto-fix mecânico em sprint 2 com guards
      W-1 (caller self-closed) e default-value preservation.
    applies_to:
      include: ["**/*.xaml"]
      exclude:
        - "**/Main.xaml"
        - "**/Tests/**/*.xaml"
        - "Framework/InitAllSettings.xaml"
        - "Framework/InitAllApplications.xaml"
        - "Framework/GetTransactionData.xaml"
        - "Framework/Process.xaml"
        - "Framework/SetTransactionStatus.xaml"
        - "Framework/CloseAllApplications.xaml"
        - "Framework/KillAllProcesses.xaml"
        - "Framework/TakeScreenshot.xaml"
        - "Framework/RetryCurrentTransaction.xaml"
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.unused
        function: detect_unused_arguments
    fix:
      prose: |
        1. Confirmar que nenhum caller passa binding com valor não-default.
        2. Remover `<x:Property Name="in_X" .../>` do `<x:Members>` no callee.
        3. Remover bindings `<InArgument x:Key="in_X">...</InArgument>` em
           todos os `<ui:InvokeWorkflowFile.Arguments>` dos callers.
        4. Limpar ViewState entries órfãs.
        5. Validar build em todos projetos afetados.
    examples:
      bad: |
        <!-- callee.xaml -->
        <x:Property Name="in_StSenhaNaoUsada" Type="InArgument(x:String)" />
      good: '<!-- removido callee + bindings em todos callers -->'

  - id: U-3
    severity: ERROR
    category: breaking
    target: all
    title: "Identifier referenciado sem declaração no escopo"
    description: |
      Identifier VB usado em expressão sem declaração resolvível no
      escopo (Variables ancestrais, Arguments do `<x:Members>`,
      DelegateInArgument de ForEach/ForEachRow/Catch/Parallel/Pick).
      Sintoma compile: `BC30451 'X' is not declared. ... Variable 'X'
      is missing. Please use Data Manager to recreate it.`
      Causa típica: variável removida do `<Variables>` mas expressões
      remanescentes; ou shape de atividade inválido (ex: ForEachRow
      Legacy `DataTable=` em pacote Modern que espera `Values=`) que
      derruba DelegateInArgument do body.
      Cascata comum: BC30035, BC30201, BC30800, BC30198, BC30370 após
      identifier não resolvido.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.unused
        function: detect_undeclared_identifiers
    fix:
      prose: |
        Reportar local exato (xaml:linha:identifier:escopo).
        Resolução manual:
        1. Recriar variável faltante via Studio Data Manager OU
        2. Renomear referência para variável existente OU
        3. Corrigir shape de atividade que perdeu DelegateInArgument
           (ex: migrar ForEachRow Legacy → Modern; trocar `DataTable=`
           por `Values=`).
    examples:
      bad: |
        <Sequence>
          <Sequence.Variables />  <!-- vStReferenceTemp removido -->
          <Assign>
            <Assign.Value>
              <InArgument x:TypeArguments="x:String">[vStReferenceTemp]</InArgument>
              <!-- BC30451 -->
            </Assign.Value>
          </Assign>
        </Sequence>
      good: |
        <Sequence>
          <Sequence.Variables>
            <Variable x:TypeArguments="x:String" Name="vStReferenceTemp" />
          </Sequence.Variables>
          ...
        </Sequence>

  - id: U-4
    severity: WARN
    category: architectural
    target: all
    title: "Variable name duplicado no mesmo arquivo"
    description: |
      `<Variable Name="X">` declarado >1× no mesmo XAML (em scopes diferentes).
      VB compila (case-insensitive scope-resolution OK), mas:
        - Confunde leitor.
        - Bloqueia U-1 detector (file-level scan): se 1 instância é usada,
          U-1 não consegue identificar a OUTRA como unused (qualquer ref
          casa case-insensitive com qualquer Name).

      Resolução manual: renomear uma das duplicatas (escope-aware), ou
      consolidar declarações em scope mais alto se intenção for var
      compartilhada.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.unused
        function: detect_duplicate_variable_names
    fix:
      # Mixed: same-scope duplicates → mechanical delete (deterministic).
      # Cross-scope duplicates → prose only (contextual). Detector emite
      # mechanical per-finding apenas pra same-scope cases.
      apply_class: deterministic
      prose: |
        Same-scope (mesmo <*.Variables> block): auto-deleta duplicatas extras.
        Cross-scope (scopes diferentes): renomear OU consolidar manual.

  - id: N-13
    severity: WARN
    category: architectural
    target: all
    title: "Identificador com verbo deve usar infinitivo (-ar/-er/-ir)"
    description: |
      Nomes de workflow (filename + x:Class), variáveis (`v...`) e
      argumentos (`in_/out_/io_...`) iniciados por verbo PT-BR devem usar
      INFINITIVO (-ar/-er/-ir), não presente do indicativo (3ª pessoa
      singular: -a/-e/-i).

      Exemplos:
        ❌ BuscaDossieAtivo.xaml      → ✅ BuscarDossieAtivo.xaml
        ❌ AtualizaTAGsXML            → ✅ AtualizarTAGsXML
        ❌ ValidaRegrasNegociais      → ✅ ValidarRegrasNegociais
        ❌ vStBuscaToken              → ✅ vStBuscarToken
        ❌ in_StAtualizaConfig        → ✅ in_StAtualizarConfig

      Exclui Main.xaml, Process.xaml e Framework/** (REFramework/template,
      verbos em inglês imperativo aceitos).
    applies_to:
      include: ["**/*.xaml"]
      exclude:
        - "Main.xaml"
        - "Process.xaml"
        - "Framework/**"
        - "Tests/**"
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.naming
        function: detect_n13_verb_infinitive
        targets:
          - filename
          - xclass
          - property_name
          - variable_name
        verbs:
          - { wrong: "Busca",     right: "Buscar" }
          - { wrong: "Atualiza",  right: "Atualizar" }
          - { wrong: "Carrega",   right: "Carregar" }
          - { wrong: "Extrai",    right: "Extrair" }
          - { wrong: "Recupera",  right: "Recuperar" }
          - { wrong: "Verifica",  right: "Verificar" }
          - { wrong: "Valida",    right: "Validar" }
          - { wrong: "Anexa",     right: "Anexar" }
          - { wrong: "Salva",     right: "Salvar" }
          - { wrong: "Lista",     right: "Listar" }
          - { wrong: "Obtem",     right: "Obter" }
          - { wrong: "Obtém",     right: "Obter" }
          - { wrong: "Executa",   right: "Executar" }
          - { wrong: "Envia",     right: "Enviar" }
          - { wrong: "Cria",      right: "Criar" }
          - { wrong: "Conecta",   right: "Conectar" }
          - { wrong: "Calcula",   right: "Calcular" }
          - { wrong: "Processa",  right: "Processar" }
          - { wrong: "Trata",     right: "Tratar" }
          - { wrong: "Converte",  right: "Converter" }
          - { wrong: "Vincula",   right: "Vincular" }
          - { wrong: "Captura",   right: "Capturar" }
          - { wrong: "Encerra",   right: "Encerrar" }
          - { wrong: "Inicia",    right: "Iniciar" }
          - { wrong: "Reinicia",  right: "Reiniciar" }
          - { wrong: "Limpa",     right: "Limpar" }
          - { wrong: "Recebe",    right: "Receber" }
          - { wrong: "Monta",     right: "Montar" }
    fix:
      apply_class: contextual
      prose: |
        Renomear identificador para forma infinitiva. Para filename +
        x:Class, propaga em this:OldClass.* e InvokeWorkflowFile callers
        (cascade S-6). Para Variable/Property: renomear referências.
        Sem fix automático — risco semântico.

  - id: N-15
    severity: INFO
    category: architectural
    target: all
    title: "LogMessage iniciada por verbo deve usar infinitivo"
    description: |
      Primeiro verbo da Message de `<ui:LogMessage>` deve estar no
      INFINITIVO (-ar/-er/-ir), não gerúndio (-ando/-endo/-indo) nem
      passado (-ou/-eu/-iu).

      Padrão Sicoob: mensagens declaram intenção, não narração.

      Exemplos:
        ❌ "Conectando ao banco"           → ✅ "Conectar ao banco"
        ❌ "Atualizando TAG do XML"        → ✅ "Atualizar TAG do XML"
        ❌ "Recuperou dados de Controle"   → ✅ "Recuperar dados de Controle"

      Skip: mensagens dinâmicas (concat com `+`), state markers
      (Início/Fim), substantivos (Total/Status/Erro), Framework/Tests.
    applies_to:
      include: ["**/*.xaml"]
      exclude:
        - "Main.xaml"
        - "Process.xaml"
        - "Framework/**"
        - "Tests/**"
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.logs
        function: detect_n15_log_infinitive
        exclude_paths:
          - "framework/"
          - "tests/"
          - "main.xaml"
          - "process.xaml"
        forbidden_suffixes:
          gerundio: ["ando", "endo", "indo"]
          passado:  ["ou", "eu", "iu", "ei", "ava", "ia"]
          presente: ["a", "e", "i"]
        valid_suffixes: ["ar", "er", "ir", "or"]
        skip_first_words:
          - "Início"
          - "Inicio"
          - "Fim"
          - "Erro"
          - "Falha"
          - "Sucesso"
          - "Status"
          - "Total"
          - "Quantidade"
          - "Valor"
          - "Item"
          - "Token"
          - "ID"
          - "Id"
          - "TAG"
          - "Log"
          - "Dados"
          - "Pasta"
          - "Arquivo"
          - "Email"
          - "URL"
          - "API"
          - "DB"
          - "XML"
          - "JSON"
          - "Title"
          - "Message"
        only_pure_literals: true
    fix:
      apply_class: contextual
      prose: |
        Reescrever Message com primeiro verbo no infinitivo.
        Sem fix automático — mudança de tom requer revisão.

  - id: U-5
    severity: WARN
    category: architectural
    target: all
    title: "Variáveis com mesma origem/Default — alias provável (consolidar)"
    description: |
      Múltiplas `<Variable>` no mesmo arquivo com:
        - mesmo `x:TypeArguments` + Default literal não-trivial idêntico, OU
        - Assigns separados que populam vars distintas com expressão
          textualmente idêntica

      são candidatas a consolidação em uma única variável.

      Skip:
        - Defaults triviais ("", 0, False, Nothing)
        - Tipos containerados (List, Dict, HashSet)
        - Framework/Tests + Main/Process (REFramework)
    applies_to:
      include: ["**/*.xaml"]
      exclude:
        - "Main.xaml"
        - "Process.xaml"
        - "Framework/**"
        - "Tests/**"
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.unused
        function: detect_u5_variable_aliases
        trivial_defaults:
          - ""
          - "0"
          - "False"
          - "True"
          - "Nothing"
          - "{x:Null}"
        skip_types:
          - "scg:List"
          - "scg:Dictionary"
          - "scg:HashSet"
          - "scg:Queue"
          - "scg:Stack"
          - "ui:QueueItem"
        min_duplicate_assigns: 2
        normalize_whitespace: true
    fix:
      apply_class: structural
      prose: |
        Consolidar variáveis duplicadas:
          1. Identificar nome canônico mais descritivo
          2. Substituir referências da var redundante pela canônica
          3. Remover declaração + Assign da var eliminada
        Sem fix automático — requer verificação humana.

  - id: V-2
    severity: ERROR
    category: breaking
    target: windows
    title: "Default numérico/booleano com literal String entre aspas"
    description: |
      Property/InArgument de tipo `x:Int32`/`x:Int64`/`x:Boolean`/
      `x:Double`/`x:Decimal`/`x:Single` com Default quotado como String:

        ❌ this:Class.in_IntTimeout="[&quot;60&quot;]"
        ❌ <InArgument x:TypeArguments="x:Int32">[&quot;60&quot;]</InArgument>

        ✅ this:Class.in_IntTimeout="[60]"
        ✅ <InArgument x:TypeArguments="x:Int32">[60]</InArgument>

      Studio antigo (Legacy) convertia implicitamente. Windows target
      com Option Strict On rejeita: BC30512 String→Integer.

      Causa raiz comum: arquivo veio de migração Legacy, ou ferramenta
      gerou Default literal sem resolver tipo do prop.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: regex
      pattern: '<InArgument\s+x:TypeArguments="x:(?:Int32|Int64|Boolean|Double|Decimal|Single)"\s*>\[&quot;[^&]*&quot;\]</InArgument>|this:[A-Za-z_][\w]*\.in_(?:Int|Bl|Db|Dec|Dbl)[A-Za-z]*="\[&quot;[^&]*&quot;\]"'
    fix:
      apply_class: deterministic
      mechanical:
        type: strip_string_quotes_numeric_default
      prose: |
        Stripar `&quot;...&quot;` deixando apenas conteúdo literal numérico/bool:
          [&quot;60&quot;] → [60]
          [&quot;True&quot;] → [True]
        Validação parseable: float() OR true/false. Senão preserva.

  - id: V-3
    severity: ERROR
    category: breaking
    target: all
    title: "Double-escape de entidade XML em expressão VB"
    description: |
      Pattern `&amp;gt;`, `&amp;lt;`, `&amp;quot;` dentro de qualquer
      atributo XAML que carrega expressão VB (`Code`, `Expression`, `Condition`,
      `Message`, `OutputMessageFormat`, `ExpressionText`, default literal de
      InArgument etc.) quebra Studio compile.

      Causa raiz: ferramenta/script geradora aplicou XML escape duas vezes.
      XAML parser decodifica uma vez (`&amp;gt;` → `&amp;gt;`), VB compiler
      vê literal `&amp;gt;` e tenta `gt`/`lt`/`quot` como identificador:

        BC30451: 'gt' is not declared.
        BC30037: Character is not valid.
        BC30198: ')' expected.

      Single-encode correto: `&amp;gt;` (XAML decode → `>`, VB vê operador).

      Detector é fileset-wide pra pegar pattern em qualquer attribute
      (regex não consegue ancorar atributo VB de forma confiável em XAML
      multilinha). False positive aceitável só se XAML tem texto display-
      only com literal `&amp;gt;` — pathológico, suprimir individualmente.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: regex
      pattern: '(?:Condition|Expression|ExpressionText)="[^"]*&amp;(?:gt|lt|quot);[^"]*"'
    fix:
      apply_class: deterministic
      mechanical:
        type: regex_replace
        pattern: '((?:Condition|Expression|ExpressionText)="[^"]*)&amp;(gt|lt|quot);'
        replacement: '\1&\2;'
      prose: |
        Substituir `&amp;XXX;` por `&amp;XXX;` (single-encode).
        Exemplo: `[Not (lst.Count &amp;gt; 0)]` → `[Not (lst.Count &amp;gt; 0)]`.
        XAML parser decodifica `&amp;gt;` → `>`, VB compila OK.

  - id: V-4
    severity: WARN
    category: architectural
    target: all
    title: "DisplayName/Annotation com entity double-escape — render quebrado UI"
    description: |
      `DisplayName="texto -&amp;amp;gt; algo"` no FILE renderiza Studio UI
      como literal `texto -&amp;gt; algo` (entity text não decoded) em vez
      de `texto -> algo`.

      Para Studio mostrar `>` corretamente, atributo deve ser single-encode
      `DisplayName="texto -&amp;gt; algo"`: XAML parser decodifica `&amp;gt;`
      → `>`, UI exibe `>`.

      Causa raiz: ferramenta/script geradora aplicou XML escape duas vezes.
      V-3 cobre contextos de expressão VB (`Expression`, `Condition`,
      `ExpressionText`); V-4 cobre attrs plain-text de display
      (`DisplayName`, `AnnotationText`).

      Não é breaking — Studio compila normalmente; só render UI fica feio.
      Severidade WARN; deterministic fix.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: regex
      pattern: '(?:DisplayName|AnnotationText)="[^"]*&amp;amp;(?:gt|lt|quot|amp);[^"]*"'
    fix:
      apply_class: deterministic
      mechanical:
        type: regex_replace
        pattern: '((?:DisplayName|AnnotationText)="[^"]*)&amp;amp;(gt|lt|quot|amp);'
        replacement: '\1&amp;\2;'
      prose: |
        Stripar duplo-encode: `&amp;amp;XXX;` → `&amp;XXX;`. XAML parser
        decodifica `&amp;XXX;` → `XXX` (caractere real); Studio UI exibe
        corretamente. Re-rodar fixer até convergir (cobre múltiplas
        ocorrências no mesmo attribute).
    examples:
      bad: 'DisplayName="Item -&amp;amp;gt; Próximo"'
      good: 'DisplayName="Item -&amp;gt; Próximo"'

  - id: U-6
    severity: WARN
    category: architectural
    target: all
    title: "Variable em scope estreito — preferir escopo maior (hoisting)"
    description: |
      Variável declarada em scope interno quando poderia viver no escopo
      mais amplo do mesmo arquivo. Padrão Sicoob: declarar no scope MAIS
      EXTERNO possível para reduzir redundância e shadowing.

      Casos detectados:
        Caso A — DUPLICATA CROSS-SCOPE:
          Mesma <Variable Name="X" Type="T"> declarada em 2+ scopes
          irmãos/aninhados. Hoist para ancestral comum.

          Ex: Process.xaml — `vStPrefixoLog` declarado em
            Sequence_29.Variables E Sequence_15.Variables.
            Hoist para scope raiz do Process. → 1 declaração serve ambos.

        Caso B — SCOPE ÚNICO INTERNO TRIVIAL:
          Variable declarada em scope interno, usada apenas naquele
          scope, com expressão de Assign sem dependência de variáveis
          locais do scope. Pode subir um nível (no benefit forte —
          INFO ao invés de WARN).

      EXCEÇÃO (não flagar):
        - Loop iterators (ForEach.iterator, While body var): scope-local
          por design semântico.
        - Variable em TryCatch.Catches scope (exception locals).
        - Variable cujo Default/Assign depende de vars locais ao scope
          (move quebra resolution).
        - Variable usada em escopos disjuntos (sub-Sequences paralelas
          que não compartilham ancestral exceto root) onde shadowing é
          intencional.
    applies_to:
      include: ["**/*.xaml"]
      exclude: ["Framework/**", "Tests/**"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.unused
        function: detect_u6_variable_hoist
        # Loop tags onde Variable é scope-local intencional
        loop_parents:
          - "ForEach"
          - "ui:ForEach"
          - "ParallelForEach"
          - "ui:ParallelForEach"
          - "While"
          - "DoWhile"
        # Tags onde vars são exception-local
        exception_parents:
          - "Catch"
          - "TryCatch.Catches"
        # Caso A apenas (cross-scope dup) — caso B opt-in via params
        only_cross_scope_dup: true
    fix:
      apply_class: structural
      prose: |
        Hoist da Variable para ancestral comum:
          1. Identificar ancestral comum via DOM walk dos scopes envolvidos
          2. Adicionar <Variable> em <Ancestral.Variables>
          3. Remover declarações redundantes nos scopes internos
          4. Verificar se referências pré-existentes resolvem (case-insensitive
             VB scope resolution já fazia isso em U-4 dup)
        Sem fix automático — risco de mudar semântica em casos com
        Default/Assign scope-dependente. Requer revisão humana.


  # ---------------------------------------------------------------------
  # M-* — Schema-aware activity validation (categoria metadata)
  # Schema source: assets/activities/activities-compact.json
  # Regenerar: scripts/activities_meta/{batch-extract,build-schema}.ps1
  # ---------------------------------------------------------------------

  - id: M-1
    severity: ERROR
    category: metadata
    target: all
    title: "Activity FQN desconhecida no schema"
    description: |
      Elemento XAML referencia activity (xmlns + local name) que não existe
      nos packages NuGet UiPath instalados (assets/activities/activities-compact.json).
      Causas comuns:
        - Typo no nome (case-sensitive).
        - Package não instalado / versão sem essa activity.
        - Activity removida em versão nova (rename + breaking change).
        - LLM inventou activity inexistente.
      Activities customizadas (libraries proprietárias) são ignoradas — apenas
      xmlns canônicos UiPath disparam a regra.
    applies_to:
      include:
        - "**/*.xaml"
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.activity_meta
        function: detect_m1_activity_unknown
    fix:
      apply_class: contextual
      prose: |
        Verifique nome da activity vs schema (assets/activities/INDEX.md
        + uipath.<package>.md). Se foi renomeada, consulte migration table
        do package. Em packages privados, suprimir via rule-disable inline.

  - id: M-2
    severity: ERROR
    category: metadata
    target: all
    title: "Argumento required ausente em activity"
    description: |
      Activity tem args com RequiredArgumentAttribute não preenchidos.
      Detector respeita OverloadGroup: se group tem >=1 arg satisfeito,
      demais required do mesmo group ficam OK (alternativas mutuamente
      exclusivas).
      Cobre attribute form (`<ui:WriteRange Foo="x"/>`) + property element
      form (`<ui:WriteRange.Foo>...</...>`).
    applies_to:
      include:
        - "**/*.xaml"
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.activity_meta
        function: detect_m2_required_missing
    fix:
      apply_class: deterministic
      prose: |
        Adicionar property element ou attribute para o arg required.
        OverloadGroup respeitado: detector emite apenas args do best_group.
        Fixer mecânico add_property_element insere placeholder com default
        do schema (vazio se sem default) — usuário preenche valor real.
      mechanical:
        type: add_property_element

  - id: M-3
    severity: WARN
    category: metadata
    target: all
    title: "Argumento desconhecido em activity (typo ou removido)"
    description: |
      Property element / attribute referencia arg/property que NÃO existe na
      activity conforme schema. Schema captura tanto Argument-typed properties
      (InArgument<T>/OutArgument<T>/InOutArgument<T>) quanto plain properties
      (string, enum, objeto). Limitação fase 1 resolvida em fase 5.

      Atributos genéricos sempre OK: DisplayName, ContinueOnError, TimeoutMS,
      DelayBefore, DelayAfter.
    applies_to:
      include:
        - "**/*.xaml"
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.activity_meta
        function: detect_m3_unknown_arg
    fix:
      apply_class: contextual
      prose: |
        Confira nome do arg vs schema (assets/activities/uipath.<package>.md).
        Pode ser typo (case-sensitive) ou arg deprecated.

  - id: M-4
    severity: ERROR
    category: metadata
    target: all
    title: "OverloadGroup conflito (alternativas mutuamente exclusivas)"
    description: |
      Activity tem args de OverloadGroups distintos preenchidos simultaneamente.
      Cada group representa uma combinação válida — escolher apenas um.
      Exemplo clássico: WriteRange File (WorkbookPath) vs FileResource
      (WorkbookPathResource) vs Use Workbook (Workbook) — usar apenas um modo.
    applies_to:
      include:
        - "**/*.xaml"
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.activity_meta
        function: detect_m4_overload_conflict
    fix:
      apply_class: contextual
      prose: |
        Remover args dos groups não-escolhidos. Manter apenas um group preenchido.

  - id: M-6
    severity: ERROR
    category: metadata
    target: all
    title: "xmlns de prefix UiPath não declarado no <Activity> root"
    description: |
      Workflow usa elementos com prefix UiPath conhecido (ui:, uix:, cv:,
      isactr:, uitp:) mas xmlns:<prefix> não está declarado no root.
      Studio reporta activities como unresolved. Diferente de S-11 (que
      detecta xmlns declarado mas assembly não em project.json) — M-6 é
      a outra ponta: usado sem declarar.
    applies_to:
      include:
        - "**/*.xaml"
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.activity_meta
        function: detect_m6_xmlns_missing
    fix:
      apply_class: deterministic
      # fix_mechanical emitido per-finding (type=xmlns_declare) com prefix +
      # xmlns_uri resolvido via schema (canonical_xmlns_set ∩ local_name).
      # Casos ambíguos (>=2 xmlns com mesmo local_name) ficam sem fix_mech.
      prose: |
        Adicionar `xmlns:<prefix>="..."` no <Activity> root.
        Fix mecânico resolve URI canônica via activity schema (1 URI única
        por local_name).
        Assembly em project.json é checado por S-11 (finding separado se
        ausente).

  - id: M-5
    severity: WARN
    category: metadata
    target: all
    title: "Literal incompatível com tipo do argumento"
    description: |
      Atributo recebe literal cujo tipo óbvio não casa com schema da activity.

      Casos cobertos (heurística sem compiler VB/C#):
        - String literal em arg numérico/Boolean/DateTime ("abc" em Int32).
        - Numérico literal em Boolean/DateTime ("123" em Boolean).
        - Bool literal "True"/"False" em arg numérico/string-only.

      Ignorados (precisariam compiler):
        - Bind expressions `[expr]` — tipo depende do contexto VB.
        - Markup extensions `{x:Null}`, `{Binding}`, etc.
        - String → numérico em alguns contextos (Studio aceita conversão
          implícita ToString/Parse via Option Strict Off).
      String é destino permissivo (aceita qualquer literal — Studio chama
      .ToString implícito).
    applies_to:
      include:
        - "**/*.xaml"
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.activity_meta
        function: detect_m5_type_mismatch
    fix:
      apply_class: contextual
      prose: |
        Ajustar literal para tipo correto OU usar bind expression
        `[CType(value, T)]`/`[Convert.ToInt32(value)]` se conversão for
        intencional.

  - id: M-8
    severity: ERROR
    category: metadata
    target: all
    title: "[Nothing] em InArgument tipo valor (VB runtime crash)"
    description: |
      VB bind expression `[Nothing]` resolvendo para arg de tipo valor
      (Integer, Boolean, DateTime, Decimal, etc) lança
      InvalidOperationException em runtime.

      Exclui Nullable<T> (`Integer?`, `Nullable(Of Integer)`) — suportam null.
      Exclui reference types (String, IResource, DataTable, etc).
      Exclui `Foo="{x:Null}"` em attribute form — significa "InArgument
      não fornecido" (activity usa default), não "Expression=Nothing".
      Apenas `Foo="[Nothing]"` (bind expression real) transmite null.

      Casos detectados:
        - `Foo="[Nothing]"` em InArgument<Int32>
        - `Foo="[ Nothing ]"` em InArgument<Boolean>
    applies_to:
      include:
        - "**/*.xaml"
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.activity_meta
        function: detect_m8_nothing_in_value_type
    fix:
      apply_class: deterministic
      # fix_mechanical emitido per-finding pelo detector (type=replace_nothing_value_type).
      # Char NÃO mapeia — finding fica sem fix_mechanical (manual).
      prose: |
        Substituir `[Nothing]` por default VB do tipo de valor:
          - Integer/Long/Short/Byte → `[0]`
          - Single → `[0.0F]`; Double → `[0.0]`; Decimal → `[0D]`
          - Boolean → `[False]`
          - DateTime → `[DateTime.MinValue]`
          - DateTimeOffset → `[DateTimeOffset.MinValue]`
          - TimeSpan → `[TimeSpan.Zero]`
          - Guid → `[Guid.Empty]`
          - Char → MANUAL (sem mapping default — semantic ambíguo)
        Se semântica permite null real, declarar arg como Nullable(Of T) no
        callee, ou converter via wrapper.

  - id: M-7
    severity: INFO
    category: metadata
    target: all
    title: "DefaultValue redundante (igual ao default do schema)"
    description: |
      Atributo atribuído explicitamente com valor literal idêntico ao default
      definido no schema da activity. Omitir é equivalente — reduz ruído no
      XAML.
      Exemplo: WriteRange StartingCell="A1" — A1 já é o default.
    applies_to:
      include:
        - "**/*.xaml"
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.activity_meta
        function: detect_m7_redundant_default
    fix:
      apply_class: deterministic
      # fix_mechanical emitido per-finding (type=strip_redundant_default) com
      # match exato (prefix, activity_local, attr_name, expected_value).
      # Idempotente + scope-restricted: não toca outros atributos da tag.
      prose: |
        Remover atribuição redundante (valor == schema default). Studio
        re-emite atributo no save se usuário alterar e voltar — comportamento
        idempotente.

# ============================================================
# Batch CX — Complexity metrics (workflow-level)
# ============================================================

  - id: CX-1
    severity: WARN
    category: architectural
    target: all
    title: "Cyclomatic complexity excessiva (McCabe)"
    description: |
      Soma de decision points no workflow excede threshold McCabe.
      Inclui: If, Switch/FlowSwitch cases, While/DoWhile, ForEach/
      ParallelForEach, TryCatch.Catches, Parallel branches, FlowDecision.
      Industry standard: >10 manutenibilidade degrada; >20 = refactor
      obrigatório (extract sub-workflows).
    applies_to:
      include: ["**/*.xaml"]
      exclude: ["**/Framework/**", "**/Tests/**"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.complexity
        function: detect_cx1_cyclomatic
        threshold_warn: 10
        threshold_error: 20
    fix:
      apply_class: contextual
      prose: |
        Extrair branches em sub-workflows. Aplicar pattern Strategy
        ou State-Machine. Refactor reduz cyclomatic via decomposição
        modular (A-5).

  - id: CX-2
    severity: WARN
    category: architectural
    target: all
    title: "Nesting depth excessiva"
    description: |
      Profundidade de elementos executáveis aninhados excede threshold.
      UiPath BP guideline: aninhar > 5 níveis indica lógica complexa em
      escopo único. >8 = refactor mandatório.
    applies_to:
      include: ["**/*.xaml"]
      exclude: ["**/Framework/**", "**/Tests/**"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.complexity
        function: detect_cx2_depth
        threshold_warn: 5
        threshold_error: 8
    fix:
      apply_class: contextual
      prose: |
        Achatar via early-return em sub-workflow (extract). Guard clauses
        no início. Switch/FlowDecision substitui If aninhado quando
        múltiplas branches simétricas.

  - id: CX-3
    severity: WARN
    category: architectural
    target: all
    title: "Fan-out excessivo (callees diretos)"
    description: |
      Workflow invoca número alto de outros workflows. Sinal de coupling
      e responsabilidade difusa. >10 callees = revisar coesão; >15 =
      candidato a orquestrador-de-orquestrador, refactor.
    applies_to:
      include: ["**/*.xaml"]
      exclude: ["**/Main.xaml", "**/Framework/**", "**/Tests/**"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.complexity
        function: detect_cx3_fanout
        threshold_warn: 10
        threshold_error: 15
    fix:
      apply_class: contextual
      prose: |
        Agrupar callees relacionados em sub-orquestradores intermediários.
        Aplicar pattern Facade quando vários callees servem mesmo
        conceito de negócio.

  - id: CX-4
    severity: WARN
    category: architectural
    target: all
    title: "Activity count excessivo"
    description: |
      Total de elementos executáveis no workflow excede threshold.
      Sicoob convention stricter que UiPath default (500): >100 = revisão;
      >300 = quebrar em sub-workflows. Combina com A-17 (~150 linhas).
    applies_to:
      include: ["**/*.xaml"]
      exclude: ["**/Framework/**", "**/Tests/**"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.complexity
        function: detect_cx4_activities
        threshold_warn: 100
        threshold_error: 300
    fix:
      apply_class: contextual
      prose: |
        Decompor por conceito (A-5). Workflows grandes geralmente
        encadeiam múltiplos passos independentes — extrair cada
        passo em workflow próprio + orquestrador slim.

  - id: CX-5
    severity: WARN
    category: architectural
    target: all
    title: "God-workflow composite (≥3 métricas excedidas)"
    description: |
      Workflow excede simultaneamente ≥3 das métricas: lines>200,
      activities>50, depth>5, args>7. Indicador forte de violação de
      Single Responsibility — refactor obrigatório.
    applies_to:
      include: ["**/*.xaml"]
      exclude: ["**/Framework/**", "**/Tests/**", "**/Main.xaml"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.complexity
        function: detect_cx5_god_workflow
        threshold_lines: 200
        threshold_activities: 50
        threshold_depth: 5
        threshold_args: 7
        min_tripped: 3
    fix:
      apply_class: contextual
      prose: |
        Refactor obrigatório. Cada métrica excedida é sinal independente
        de god-workflow. Plano: (1) listar conceitos distintos no
        workflow; (2) extrair cada conceito em workflow próprio;
        (3) reduzir args agrupando em Dictionary/DataTable (N-4);
        (4) re-medir até zerar findings.

# ============================================================
# Batch HY — CI/CD hygiene
# ============================================================

  - id: HY-1
    severity: ERROR
    category: breaking
    target: all
    title: "Merge conflict markers leftover"
    description: |
      Linha começa com `<<<<<<<`, `=======` ou `>>>>>>>` — marcador de
      conflito git não resolvido. Publish quebra silente (XAML inválido,
      JSON parse error). Sempre ERROR breaking.
    applies_to:
      include: ["**/*.xaml", "**/*.json", "**/*.yaml", "**/*.yml"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.hygiene
        function: detect_hy1_merge_markers
    fix:
      apply_class: contextual
      prose: |
        Resolver conflito manualmente. Auto-resolve picks side arbitrário,
        risco de perda de código. Escolher side correto, remover markers,
        re-test.

  - id: HY-2
    severity: WARN
    category: architectural
    target: all
    title: "project.json.description é placeholder Studio default"
    description: |
      Description = "Blank Process" / "Blank Library" / "Process
      Description" / vazio. Indica projeto criado sem descrição
      preenchida — quebra discoverability em Orchestrator + Studio.
    applies_to:
      include: ["project.json"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.hygiene
        function: detect_hy2_placeholder_description
    fix:
      apply_class: deterministic
      mechanical:
        type: set_json_field
        path: description
      prose: |
        Preencher description com resumo claro do propósito do projeto
        (process: o que automatiza; library: que activities expõe).
        Fixer auto seta "Projeto Sicoob — <name>" como baseline; revisar.

  - id: HY-3
    severity: WARN
    category: architectural
    target: all
    title: "Main.xaml vazio (sem activity executável)"
    description: |
      Main.xaml com root Activity → Sequence vazio (sem children).
      Sinal de projeto não desenvolvido ou esqueleto abandonado.
    applies_to:
      include: ["**/Main.xaml"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.hygiene
        function: detect_hy3_main_empty
    fix:
      apply_class: contextual
      prose: |
        Implementar lógica do Main ou remover projeto se descontinuado.
        Para REFramework, Main deve referenciar Framework state machine.

  - id: HY-4
    severity: WARN
    category: architectural
    target: all
    title: ".gitignore ausente ou faltando entries Sicoob obrigatórios"
    description: |
      .gitignore deve incluir mínimo: `.local/`, `bin/`, `obj/`, `*.user`,
      `.uipath/`. Entries ausentes causam commit de cache local e
      artefatos build no repo.
    applies_to:
      include: ["project.json"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.hygiene
        function: detect_hy4_gitignore
    fix:
      apply_class: deterministic
      mechanical:
        type: gitignore_append_lines
        defaults: [".local/", "bin/", "obj/", "*.user", ".uipath/"]
      prose: |
        Adicionar entries faltantes em .gitignore. Fixer append no fim
        com bloco separador comentado.

  - id: HY-5
    severity: INFO
    category: architectural
    target: all
    title: "EOL mix CRLF+LF no mesmo arquivo"
    description: |
      Arquivo contém ambos CRLF e LF puro. XAML Studio convention =
      CRLF (Windows). Mix causa diff noise em PR + merge falsos.
    applies_to:
      include: ["**/*.xaml", "**/*.json"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.hygiene
        function: detect_hy5_eol_mix
    fix:
      apply_class: deterministic
      mechanical:
        type: normalize_eol_crlf
      prose: |
        Normalizar EOL → CRLF. Fixer converte preservando BOM.

  - id: HY-6
    severity: INFO
    category: architectural
    target: all
    title: "BOM UTF-8 em arquivo JSON"
    description: |
      project.json (e demais .json) por convenção UTF-8 sem BOM.
      BOM causa parse erros em ferramentas Node/Python sem
      `utf-8-sig`. Studio salva sem BOM por default.
    applies_to:
      include: ["**/*.json"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.hygiene
        function: detect_hy6_bom_json
    fix:
      apply_class: deterministic
      mechanical:
        type: strip_bom
      prose: |
        Strip BOM. Fixer remove 3 bytes iniciais 0xEF 0xBB 0xBF.

# ============================================================
# Batch TCC — Test Case Coverage
# ============================================================

  - id: TCC-1
    severity: WARN
    category: testing
    target: all
    title: "Workflow produção sem Test Case correspondente"
    description: |
      Performer com workflow produção (fora Framework/Tests/Data/Main)
      sem TC_<stem>.xaml em pasta `Tests/`. Convenção Sicoob exige TC
      por workflow.
    applies_to:
      include: ["**/*.xaml"]
      exclude:
        - "**/Framework/**"
        - "**/Tests/**"
        - "**/Data/**"
        - "**/Main.xaml"
        - "**/TC_*.xaml"
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.test_coverage
        function: detect_tc_cov_1_missing
    fix:
      apply_class: contextual
      prose: |
        Criar Tests/TC_<workflow>.xaml exercitando Given-When-Then.
        Mock externos (DB/API/SMTP). Cobre golden path + 1 edge case
        mínimo.

  - id: TCC-3
    severity: WARN
    category: testing
    target: all
    title: "Performer sem pasta Tests/"
    description: |
      Projeto Performer (name suffix `_Performer`) sem pasta `Tests/`
      no root, ou pasta vazia. Indica ausência total de TC. Bloqueia
      sustentação por falta de regression suite.
    applies_to:
      include: ["project.json"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.test_coverage
        function: detect_tc_cov_3_no_tests_folder
    fix:
      apply_class: contextual
      prose: |
        Criar pasta `Tests/` no root do Performer. Adicionar TC mínimo
        cobrindo golden path. CI deve falhar enquanto vazio.

  - id: TCC-4
    severity: INFO
    category: testing
    target: all
    title: "Workflow com >3 in_args mas 0-1 Test Cases (low variation)"
    description: |
      Workflow com >3 argumentos in_/io_ tem só 0-1 TC. Proxy de
      cobertura de data-variation pobre — alta probabilidade de
      regressão não detectada por mudança de payload.
    applies_to:
      include: ["**/*.xaml"]
      exclude:
        - "**/Framework/**"
        - "**/Tests/**"
        - "**/Data/**"
        - "**/Main.xaml"
        - "**/TC_*.xaml"
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.test_coverage
        function: detect_tc_cov_4_low_arg_variation
        arg_threshold: 3
    fix:
      apply_class: contextual
      prose: |
        Adicionar TCs por variação de input significativa. Ou usar
        Data Service / Test Data Queues p/ parametrizar (TEST-6).
