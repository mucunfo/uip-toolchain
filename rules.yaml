# ============================================================
# Batch 1 — Breaking (Studio compile / runtime / Orchestrator)
# ============================================================

# ---- S — Sintaxe XAML breaking ----

  - id: S-1
    severity: ERROR
    category: breaking
    target: all
    title: "<x:Members /> nunca self-closed"
    description: |
      Self-closing `<x:Members />` quebra o parser XAML 2009/2010 do Studio
      com `Unexpected 'PROPERTYELEMENT'` porque o parser trata
      `<mva:VisualBasic.Settings>` seguinte como property-element.
      Sempre usar `<x:Members></x:Members>` mesmo vazio.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: regex
      pattern: '<x:Members\s*/>'
    fix:
      mechanical:
        type: regex_replace
        pattern: '<x:Members\s*/>'
        replacement: '<x:Members></x:Members>'
      prose: |
        Trocar `<x:Members />` por `<x:Members></x:Members>`.
    examples:
      bad: '<x:Members />'
      good: '<x:Members></x:Members>'

  - id: S-2
    severity: ERROR
    category: breaking
    target: all
    title: "<ui:Switch>/<ui:SwitchCase> não existem"
    description: |
      `Switch` é do namespace default (sem prefixo `ui:`).
      Não existe `<ui:Switch>` nem `<ui:SwitchCase>`. Cases são
      elementos com `x:Key="valor"` como filhos diretos.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: regex
      pattern: '<ui:Switch[Cc]?ase|<ui:Switch[\s>]'
    fix:
      apply_class: deterministic
      mechanical:
        type: regex_replace
        pattern: '(</?)ui:(Switch(?:[Cc]ase)?)\b'
        replacement: '\1\2'
      prose: |
        Remover prefixo `ui:`. `<Switch>` + cases com `x:Key=` como filhos diretos.
    examples:
      bad: '<ui:Switch x:TypeArguments="x:String"></ui:Switch>'
      good: '<Switch x:TypeArguments="x:String"></Switch>'

  - id: S-3
    severity: ERROR
    category: breaking
    target: all
    title: "<ui:Assign> não existe"
    description: |
      `Assign` é do namespace default. `ui:` só hospeda `MultipleAssign`
      e `AssignOperation`. `<ui:Assign>` quebra parse.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: regex
      pattern: '<ui:Assign[\s>](?!Operation)'
    fix:
      mechanical:
        type: regex_replace
        pattern: '<ui:Assign(\s|>)'
        replacement: '<Assign\1'
      prose: |
        Remover prefixo `ui:` em `Assign`. Manter em `MultipleAssign`/`AssignOperation`.

# ---- W — Windows target migration breaking ----

  - id: W-1
    severity: ERROR
    category: breaking
    target: windows
    title: "InArgument self-closed proibido em caller"
    description: |
      `<InArgument x:Key="..." />` self-closed transmite Nothing ao callee.
      Em Windows target o caller binding explícito vence sempre, mesmo vazio,
      diferente do Legacy onde default declarado no callee era aplicado.
      Sintoma: `Value cannot be null. (Parameter 'source')` em runtime quando
      callee aplica LINQ.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: regex
      pattern: '<InArgument\s+[^/>]*x:Key="[^"]+"[^/>]*/>'
    fix:
      apply_class: deterministic
      mechanical:
        type: expand_self_closed_inarg
      prose: |
        Expansão automática:
          - Tipos primitivos → <Literal x:TypeArguments="<T>" Value="<default>" />
          - Tipos complexos (Tuple, Dict, custom) → <x:Null />
        Default por tipo: String="" / Boolean=False / Int*=0 / Double|Decimal|Single=0.

  - id: W-2
    severity: WARN
    category: breaking
    target: windows
    title: "LINQ sobre arg referência sem null guard"
    description: |
      LINQ (`.Contains`, `.Any`, `.Where`, `.Select`, `.First`, `.Single`, `.All`)
      sobre argumento `in_*`/`io_*` de tipo referência sem null guard próximo
      crasha runtime Windows com ArgumentNullException quando arg é Nothing.
      Heurística: warn quando não há `Is Nothing`/`If(<arg> Is Nothing` nas
      ~200 chars antes da chamada.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.windows
        function: detect_w2_linq_no_guard
    fix:
      apply_class: deterministic
      mechanical:
        type: guard_linq_arg_ref
        params: {}
      prose: |
        Guardar antes do LINQ: `[arg Is Nothing OrElse Not arg.Contains(x)]`,
        `[If(arg Is Nothing, defaultExpr, arg.Where(...))]`.
        Auto-fix cobre apenas Contains/Any (Boolean retorno). Where/Select/First
        type-dependent — manual.

  - id: W-3
    severity: WARN
    category: breaking
    target: windows
    title: "Default value de argumento via element form"
    description: |
      Defaults declarados como atributo na tag `<Activity>` raiz
      (`this:Workflow.in_X="..."`) só aplicam quando caller omite o `x:Key`.
      Preferir element form: `<this:Workflow.in_X><InArgument x:TypeArguments="...">[expr]</InArgument></this:Workflow.in_X>`.

      Auto-fix mecânico converte attribute form → element form usando type
      do `<x:Property>` declaration. Mantém value (literal text vira
      `[&quot;value&quot;]`; `[expr]` permanece direct).
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.arg_default
        function: detect_w3_arg_default_attribute_form
    fix:
      apply_class: deterministic
      # Detector resolve type via lookup `<x:Property Name="...">`.
      # Mechanical injetada per-finding com class_name + arg_name + arg_type + value.
      prose: |
        Mover default-value do attribute root para element form com tipo
        explícito derivado de <x:Property>.

  - id: W-4
    severity: ERROR
    category: breaking
    target: windows
    title: "Namespace mscorlib em xmlns Windows target"
    description: |
      Cabeçalho XAML migrado deve usar `assembly=System.Private.CoreLib`.
      `assembly=mscorlib` em `xmlns:` indica migração incompleta.
      mscorlib continua válido apenas em `TextExpression.ReferencesForImplementation`.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: regex
      pattern: 'xmlns:\w+="clr-namespace:[^;]+;assembly=mscorlib"'
    fix:
      mechanical:
        type: regex_replace
        pattern: '(xmlns:\w+="clr-namespace:[^;]+;assembly=)mscorlib"'
        replacement: '\1System.Private.CoreLib"'

  - id: W-10
    severity: ERROR
    category: breaking
    target: windows
    title: "NetworkCredential exige caminho System.Net. completo"
    description: |
      Windows target exige `New System.Net.NetworkCredential(...)`.
      Sem o prefixo (ou com prefixo parcial `Net.`) o resolvedor de namespace
      VB falha mesmo com `System.Net` em NamespacesForImplementation.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: regex_with_context
      params:
        pattern: '\bNew\s+(?:Net\.)?NetworkCredential\s*\('
        safe_prefix: ['System\.Net\.']
        prefix_window: 12
    fix:
      mechanical:
        type: regex_replace
        pattern: '\bNew\s+(?:Net\.)?NetworkCredential\s*\('
        replacement: 'New System.Net.NetworkCredential('

  - id: W-11a
    severity: ERROR
    category: breaking
    target: windows
    title: "Main.xaml falta AssemblyReference System.Security"
    description: |
      `Main.xaml` Windows target deve ter `<AssemblyReference>System.Security</AssemblyReference>`
      em `TextExpression.ReferencesForImplementation`. Sem isso, expressões
      em sub-workflows que dependem de `SecureString` falham com tipo não-resolvido.
    applies_to:
      include: ["Main.xaml"]
    detect:
      type: regex_pair
      params:
        must_have:
          - '<TextExpression\.ReferencesForImplementation>'
        must_not_have:
          - '<AssemblyReference>System\.Security</AssemblyReference>'
    fix:
      apply_class: deterministic
      mechanical:
        type: insert_assembly_reference
        name: System.Security
      prose: |
        Adicionar `<AssemblyReference>System.Security</AssemblyReference>` ao bloco
        `<sco:Collection x:TypeArguments="AssemblyReference">` em Main.xaml.

  - id: W-11b
    severity: ERROR
    category: breaking
    target: windows
    title: "XAML falta AssemblyReference System.Runtime.InteropServices"
    description: |
      XAML Windows target precisa `<AssemblyReference>System.Runtime.InteropServices</AssemblyReference>`
      em `TextExpression.ReferencesForImplementation`. `SecureString`, marshaling COM
      e P/Invoke dependem desse assembly. Sem ele, BC30652 em XAML usando Get
      Credential / SecureString-typed args. Aplica a TODOS xamls (não só Main.xaml
      — sub-workflows também afetados).
    applies_to:
      include: ["**/*.xaml"]
      exclude:
        - "**/.local/**"
        - "**/.tmp/**"
        - "**/.settings/**"
    detect:
      type: regex_pair
      params:
        must_have:
          - '<TextExpression\.ReferencesForImplementation>'
        must_not_have:
          - '<AssemblyReference>System\.Runtime\.InteropServices</AssemblyReference>'
    fix:
      apply_class: deterministic
      mechanical:
        type: insert_assembly_reference
        name: System.Runtime.InteropServices
      prose: |
        Adicionar `<AssemblyReference>System.Runtime.InteropServices</AssemblyReference>`
        ao bloco refs. Necessário pra SecureString, COM, P/Invoke.

  - id: W-11c
    severity: WARN
    category: breaking
    target: windows
    title: "XAML falta AssemblyReference System.ComponentModel.TypeConverter"
    description: |
      Em Windows target (.NET 6+) `MarshalByValueComponent`, `TypeConverter`,
      `Component` vivem em `System.ComponentModel.TypeConverter`. XAML que
      referencia DataTable, DataRow, DataView ou usa TypeConverter precisa
      desse assembly declarado em `TextExpression.ReferencesForImplementation`.
      Studio 23.10 abre projeto e dispara "Some references are not imported"
      dialog quando ref está ausente; auto-import pode falhar em renomeação
      complexa. Engine pré-popula pra evitar dialog.
    applies_to:
      include: ["**/*.xaml"]
      exclude:
        - "**/.local/**"
        - "**/.tmp/**"
        - "**/.settings/**"
    detect:
      type: regex_pair
      params:
        must_have:
          - '<TextExpression\.ReferencesForImplementation>'
        must_not_have:
          - '<AssemblyReference>System\.ComponentModel\.TypeConverter</AssemblyReference>'
    fix:
      apply_class: deterministic
      mechanical:
        type: insert_assembly_reference
        name: System.ComponentModel.TypeConverter
      prose: |
        Adicionar `<AssemblyReference>System.ComponentModel.TypeConverter</AssemblyReference>`
        ao bloco `<sco:Collection x:TypeArguments="AssemblyReference">`.

  - id: W-11d
    severity: WARN
    category: breaking
    target: windows
    title: "XAML falta AssemblyReference System.Data.Common"
    description: |
      Em Windows target, `System.Data.DataTable` foi forwarded para `System.Data.Common`
      (.NET 6 BCL). XAML usando DataTable/DataRow/DataView precisa do assembly
      declarado pra Studio analyzer resolver type forward. Sem ele, Studio reporta
      `BC31424: Type 'System.Data.DataTable' has been forwarded to assembly
      'System.Data.Common'`.
    applies_to:
      include: ["**/*.xaml"]
      exclude:
        - "**/.local/**"
        - "**/.tmp/**"
        - "**/.settings/**"
    detect:
      type: regex_pair
      params:
        must_have:
          - '<TextExpression\.ReferencesForImplementation>'
        must_not_have:
          - '<AssemblyReference>System\.Data\.Common</AssemblyReference>'
    fix:
      apply_class: deterministic
      mechanical:
        type: insert_assembly_reference
        name: System.Data.Common
      prose: |
        Adicionar `<AssemblyReference>System.Data.Common</AssemblyReference>` ao
        bloco refs. Evita `BC31424` design-time.

  - id: W-11e
    severity: WARN
    category: breaking
    target: windows
    title: "XAML falta AssemblyReference System.Collections"
    description: |
      Em Windows target, `List<T>`, `Dictionary<TK,TV>`, `IEnumerable<T>` vivem
      em `System.Collections` (.NET 6). XAML que declara variáveis ou args com
      tipos genéricos coleção precisa do assembly. Sem ele Studio reporta
      `BC30652: Reference required to assembly 'System.Collections' containing
      the type 'List(Of )'`.
    applies_to:
      include: ["**/*.xaml"]
      exclude:
        - "**/.local/**"
        - "**/.tmp/**"
        - "**/.settings/**"
    detect:
      type: regex_pair
      params:
        must_have:
          - '<TextExpression\.ReferencesForImplementation>'
        must_not_have:
          - '<AssemblyReference>System\.Collections</AssemblyReference>'
    fix:
      apply_class: deterministic
      mechanical:
        type: insert_assembly_reference
        name: System.Collections
      prose: |
        Adicionar `<AssemblyReference>System.Collections</AssemblyReference>`.

  - id: W-11f
    severity: WARN
    category: breaking
    target: windows
    title: "XAML falta AssemblyReference System.Linq"
    description: |
      LINQ extension methods (`Count`, `ToList`, `Where`, `Select`, `Any`, `First`,
      `Single`, `All`) requerem `System.Linq` assembly. Sem ele Studio reporta
      `BC30456: 'Count' is not a member of 'IEnumerable(Of X)'`.
    applies_to:
      include: ["**/*.xaml"]
      exclude:
        - "**/.local/**"
        - "**/.tmp/**"
        - "**/.settings/**"
    detect:
      type: regex_pair
      params:
        must_have:
          - '<TextExpression\.ReferencesForImplementation>'
        must_not_have:
          - '<AssemblyReference>System\.Linq</AssemblyReference>'
    fix:
      apply_class: deterministic
      mechanical:
        type: insert_assembly_reference
        name: System.Linq
      prose: |
        Adicionar `<AssemblyReference>System.Linq</AssemblyReference>`.

  - id: W-11g
    severity: WARN
    category: breaking
    target: windows
    title: "XAML falta AssemblyReference System.Net.Primitives"
    description: |
      Em Windows target, `NetworkCredential`, `Cookie`, `IPEndPoint`, `IPAddress`
      foram type-forwarded de `System` para `System.Net.Primitives` (.NET 6).
      XAML usando NetworkCredential (Get Credential output) precisa do assembly
      declarado. Sem ele, Studio reporta `BC31424: Type 'System.Net.NetworkCredential'
      has been forwarded to assembly 'System.Net.Primitives'`.
    applies_to:
      include: ["**/*.xaml"]
      exclude:
        - "**/.local/**"
        - "**/.tmp/**"
        - "**/.settings/**"
    detect:
      type: regex_pair
      params:
        must_have:
          - '<TextExpression\.ReferencesForImplementation>'
        must_not_have:
          - '<AssemblyReference>System\.Net\.Primitives</AssemblyReference>'
    fix:
      apply_class: deterministic
      mechanical:
        type: insert_assembly_reference
        name: System.Net.Primitives
      prose: |
        Adicionar `<AssemblyReference>System.Net.Primitives</AssemblyReference>`.

  - id: W-11x
    severity: WARN
    category: breaking
    target: windows
    title: "XAML xmlns assembly não declarado em ReferencesForImplementation"
    description: |
      Cada `xmlns:prefix="clr-namespace:NS;assembly=ASM"` declarado no XAML
      implica que `ASM` é assembly USED por aquele workflow. Studio analyzer
      precisa de `<AssemblyReference>ASM</AssemblyReference>` no bloco
      `<TextExpression.ReferencesForImplementation>` pra resolver types
      durante compile/analyze.

      Sem isso, Studio dispara dialog "Some references are not imported in
      current workflow" ao abrir/analisar projeto. Engine pré-popula refs
      faltantes per-xaml baseado em xmlns reais — mais preciso que catálogo
      fixo W-11c..h porque cobre TODO assembly que aquele xaml de fato usa.

      Detector ortogonal aos W-11a..h (que cobrem common BCL forwards mesmo
      sem xmlns). Recomendação: ambos ativos — W-11a..h pra refs forwarded
      que XAML usa em VB expressions (não aparecem em xmlns), W-11x pra
      refs declaradas via xmlns.
    applies_to:
      include: ["**/*.xaml"]
      exclude:
        - "**/.local/**"
        - "**/.tmp/**"
        - "**/.settings/**"
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.xmlns_refs
        function: detect_xmlns_required_refs
    fix:
      apply_class: deterministic
      # Mechanical injetada per-finding pelo detector
      # (type=insert_assembly_reference, name=<asm específico>).
      prose: |
        Adicionar `<AssemblyReference>X</AssemblyReference>` no bloco refs
        pra cada xmlns assembly declarado mas não referenciado.

  - id: W-11h
    severity: WARN
    category: breaking
    target: windows
    title: "XAML falta AssemblyReference System.Text.RegularExpressions"
    description: |
      Em Windows target, `Regex`, `Match`, `MatchCollection` foram type-forwarded
      de `System` para `System.Text.RegularExpressions` (.NET 6). XAML usando
      regex (extração de padrões, validação) precisa do assembly declarado.
      Sem ele Studio reporta `BC31424: Type 'System.Text.RegularExpressions.Match'
      has been forwarded` + `BC30456` em Linq sobre `IEnumerable(Of Match)`.
    applies_to:
      include: ["**/*.xaml"]
      exclude:
        - "**/.local/**"
        - "**/.tmp/**"
        - "**/.settings/**"
    detect:
      type: regex_pair
      params:
        must_have:
          - '<TextExpression\.ReferencesForImplementation>'
        must_not_have:
          - '<AssemblyReference>System\.Text\.RegularExpressions</AssemblyReference>'
    fix:
      apply_class: deterministic
      mechanical:
        type: insert_assembly_reference
        name: System.Text.RegularExpressions
      prose: |
        Adicionar `<AssemblyReference>System.Text.RegularExpressions</AssemblyReference>`.

  - id: W-11y
    severity: WARN
    category: breaking
    target: windows
    title: "XAML falta refs baseline cross-version Windows target"
    description: |
      Baseline superset: garante que TODO xaml com bloco
      `<TextExpression.ReferencesForImplementation>` tem refs comuns
      necessárias pro Studio analyzer resolver types implícitos.

      Lista derivada empiricamente — assemblies presentes em xamls que
      Studio NÃO reclama (working set). Cross-version (.NET 6 BCL stable
      entre Studio 23.10 e 26.x).

      Cobre gap dos W-11a..h+x (que cobrem refs específicos por symbol/
      xmlns). Brute-force pra refs que Studio sintetiza implicitamente mas
      precisa estar declarado quando workflow é analisado em Studio fresh.
    applies_to:
      include: ["**/*.xaml"]
      exclude:
        - "**/.local/**"
        - "**/.tmp/**"
        - "**/.settings/**"
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.xmlns_refs
        function: detect_baseline_refs
        # Baseline refs cross-version Windows target. Lista derivada empiricamente
        # de xamls Sicoob funcionais. Adicionar conforme novos baselines descobertos.
        #
        # NÃO incluir mscorlib/System/System.Core aqui: cobertos por ENV-2
        # (rule dedicada — Studio 23.10 forwarder bridge). Separação de
        # concerns: W-11y baseline = refs cross-version genéricos, ENV-2 =
        # legacy compat refs Sicoob deploy-specific.
        required_refs:
          - System.Activities
          - System.Xml
          - System.Xml.Linq
          - System.Xaml
          - System.Data
          - System.Drawing
          - System.Memory
          # Adicionados 2026-05-22 (Tentativa 5, Studio Import References fix):
          # Studio auto-fix sempre injeta esses 3 BCL .NET 6 refs em XAMLs
          # post-Migrator. Working ref (solicitacao-acessos-sisbr) tem; broken
          # (contestacao-fraude) faltava. Engine W-11y agora ensure baseline.
          - System.Memory.Data
          - System.Runtime.CompilerServices.Unsafe
          - System.Threading.Tasks.Extensions
          - System.ValueTuple
          - System.ObjectModel
          - System.ComponentModel.Composition
          - System.ComponentModel.Primitives
          - System.ServiceModel
          - System.Runtime.Serialization
          - System.Linq.Expressions
          - System.Private.CoreLib
          - System.Reflection.Metadata
          - Microsoft.VisualBasic
          - Microsoft.VisualBasic.Core
          - Microsoft.Bcl.AsyncInterfaces
          - PresentationCore
          - PresentationFramework
          - WindowsBase
          - UiPath.System.Activities
          - UiPath.UiAutomation.Activities
          - UiPath.Workflow
    fix:
      apply_class: deterministic
      # Mechanical injetada per-finding (type=insert_assembly_reference, name=<ref>)
      prose: |
        Adicionar refs baseline faltantes via `insert_assembly_reference`.
        Cobre refs comuns que Studio implicitamente espera mas que precisam
        estar declaradas pra analyzer não reclamar.

  - id: W-11z
    severity: WARN
    category: breaking
    target: windows
    title: "XAML VB expression usa type sem AssemblyReference resolvida"
    description: |
      Scan VB expressions inline buscando type FQNs (`System.X.Y...`).
      Mapeia type → assembly via `assets/dotnet6_symbol_catalog.yaml`.
      Se assembly não está em `<TextExpression.ReferencesForImplementation>`,
      emite finding + fix mecânico insert.

      Cobre gap do W-11x (xmlns-based): types usados em VB expressions
      inline (`[New System.Net.NetworkCredential(...)]`,
      `Default="[New System.Security.SecureString()]"`) NÃO aparecem em
      xmlns declarations e escapam W-11x.

      Catálogo cross-version safe (.NET 6 BCL forwards stable entre
      Studio 23.10 e 26.x). Manutenção: adicionar entries em
      `assets/dotnet6_symbol_catalog.yaml` conforme novos types apareçam
      em projetos.
    applies_to:
      include: ["**/*.xaml"]
      exclude:
        - "**/.local/**"
        - "**/.tmp/**"
        - "**/.settings/**"
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.xmlns_refs
        function: detect_vb_symbol_refs
    fix:
      apply_class: deterministic
      # Mechanical injetada per-finding (type=insert_assembly_reference, name=<asm>)
      prose: |
        Adicionar `<AssemblyReference>X</AssemblyReference>` pra cada
        assembly resolvido via catálogo a partir de types usados em VB
        expressions.

  - id: CCS-1
    severity: ERROR
    category: breaking
    target: all
    title: "CCS_* workflow attribute usa casing errado vs lib contract"
    description: |
      Lib CCS_* declara properties com casing exato (ex: `out_UIESipagDirect`
      capital). XAML do projeto pode usar casing diferente (ex: `out_UiESipagDirect`)
      — VB.NET/XAML é case-sensitive em property names → Studio reporta
      `Cannot set unknown member 'CCS_X.Workflow.attr_name'`.

      Engine extrai contracts de `C:\\Users\\lisan\\OneDrive - Sicoob\\Projects\\.nupkgs\\CCS_*.nupkg`
      (cada nupkg contém `content/<Workflow>.xaml` com `<x:Property Name="...">`),
      escaneia projeto buscando `<prefix:Workflow attr1=... attr2=...>` invocações,
      compara case-insensitive. Mismatch case → fix mecânico `rename_attribute`.

      Cobre case real: `out_UIESipagDirect` (lib) vs `out_UiESipagDirect` (XAML)
      em CCS_SipagDirect.Login. Também `in_URL` (lib) vs `in_Url` (XAML).
    applies_to:
      include: ["**/*.xaml"]
      exclude:
        - "**/.local/**"
        - "**/.tmp/**"
        - "**/.settings/**"
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.ccs_contract
        function: detect_ccs_contract_check
    fix:
      apply_class: deterministic
      # Mechanical injetada per-finding (type=rename_attribute, from=<wrong>, to=<correct>)
      prose: |
        Renomear attribute usado em `<prefix:Workflow>` pra match exato com
        property name declarada pela lib CCS_* em `.nupkgs/`. VB.NET case-sensitive.

  - id: W-19
    severity: ERROR
    category: breaking
    target: windows
    title: "QueueItem SpecificContent/Output indexer call gera BC30057"
    description: |
      Em UIA 25.x, `QueueItem.SpecificContent` e `QueueItem.Output` são
      propriedades `Dictionary(Of String, Object)`. VB expression no XAML
      como `qi.SpecificContent("key")` pode ser interpretada pelo compiler
      como property invocation com arg, gerando
      `BC30057: Too many arguments to 'Public Overloads Property SpecificContent'`.

      Fix mecânico: rewrite para uso explícito de `.Item("key")` — força
      resolução como Dictionary indexer method call vs property invocation:

        `.SpecificContent("X")` → `.SpecificContent.Item("X")`
        `.Output("X")`          → `.Output.Item("X")`

      Cobre forma XAML-escaped (`&quot;`) e raw quote. Single string key apenas.
    applies_to:
      include: ["**/*.xaml"]
      exclude:
        - "**/.local/**"
        - "**/.tmp/**"
        - "**/.settings/**"
    detect:
      type: regex
      pattern: '\.(SpecificContent|Output)\s*\(\s*(?:&quot;[^&]+&quot;|"[^"]+")\s*\)'
    fix:
      apply_class: deterministic
      mechanical:
        type: queue_item_indexer_to_item
      prose: |
        Reescrever `.SpecificContent("X")` → `.SpecificContent.Item("X")` e
        `.Output("X")` → `.Output.Item("X")` pra evitar BC30057.

  # W-21 REMOVIDA: tentativa de retargetar xmlns assemblies de System.Private.CoreLib
  # → .NET 6 ref assemblies (System.ObjectModel, System.Collections etc) gerou REGRESSÃO
  # em Studio 23.10 (Cannot create unknown type Collection<T>, Variable(IEnumerable(Match))).
  # Studio 23.10 NÃO aceita esses targets como xmlns assembly. Mantém Private.CoreLib
  # como Migrator gera. Investigar ground-truth via scan Studio refs/ dir antes de
  # retornar. Fixer mantido pra rollback (no-op + reverse helper).

  - id: W-20
    severity: WARN
    category: breaking
    target: windows
    title: "XAML tem xmlns aliases orfãs (não usadas no document body)"
    description: |
      Activity Migrator deixa muitas xmlns aliases cruft pós-migração
      Legacy→Windows. Algumas referenciam `.NET Framework 4` assemblies
      (`mscorlib, Version=4.0.0.0`) que conflitam com `.NET 6` resolution
      paths — Studio analyzer pode gerar BC31424/BC30652 confusos por
      ambiguidade de type forwarder.

      Engine strip xmlns:PREFIX="..." declarations cujo `PREFIX:` NÃO é
      usado em nenhum lugar no document body. Hygiene cleanup + previne
      analyzer ambiguity.

      Safety:
        - Skip core prefixes (`x`, `mc`, `xml`)
        - Conta usage no document body (não na própria xmlns declaration)
        - 0 usages → strip
    applies_to:
      include: ["**/*.xaml"]
      exclude:
        - "**/.local/**"
        - "**/.tmp/**"
        - "**/.settings/**"
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.xmlns_refs
        function: detect_w20_orphan_xmlns
    fix:
      apply_class: deterministic
      mechanical:
        type: strip_orphan_xmlns
      prose: |
        Strip xmlns:PREFIX="..." declarations onde PREFIX não é referenciado
        em nenhum lugar do document body. Cleanup pós-Migrator.

  - id: W-31
    severity: WARN
    category: breaking
    target: windows
    title: "XAML tem AssemblyReference legacy facade sem usage body"
    description: |
      Studio "Import References" auto-fix (validado 2026-05-22 em
      RetryCurrentTransaction.xaml) strippa refs Legacy facade que estão
      no bloco `<TextExpression.ReferencesForImplementation>` MAS NÃO têm
      `xmlns:*=\"clr-namespace:*;assembly=<X>\"` no body — refs órfãs
      template REFramework antigo.

      Lista canonical (conservadora):
        - OfficeDevPnP.Core
        - System.Configuration.Install
        - System.Data.Entity
        - UiPathTeam.SharePoint
        - UiPath.Word

      Engine W-31 replica strip + usage guard. Diferente de W-26 errado
      (que strippava mscorlib/System/System.Core blind, sem guard de
      usage — premissa errada, agora ENV-2 garante esses 3 estão presentes).

      W-31 idempotente: skip se ref ausente OU ref tem usage xmlns body.
    applies_to:
      include: ["**/*.xaml"]
      exclude:
        - "**/.local/**"
        - "**/.tmp/**"
        - "**/.settings/**"
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.legacy_refs
        function: detect_unused_legacy_facade_refs
    fix:
      apply_class: deterministic
      # Mechanical injetada per-finding (type=strip_assembly_reference, name=<X>)
      prose: |
        Remover `<AssemblyReference>X</AssemblyReference>` se X ∈
        {OfficeDevPnP.Core, System.Configuration.Install, System.Data.Entity,
        UiPathTeam.SharePoint, UiPath.Word} e body não tem xmlns mapping
        pra esse assembly.

  - id: W-32
    severity: WARN
    category: breaking
    target: windows
    title: "XAML tem AssemblyReference obsoleta .NET Framework 4.x"
    description: |
      Studio XamlMigration (validado 2026-05-22 via Studio.Project.log)
      strippa `<AssemblyReference>System.Runtime.WindowsRuntime</...>` toda
      vez que carrega o XAML — assembly WinRT bridge é .NET Framework 4.x-only,
      não existe em .NET 6. Studio remove on-load mas NÃO persiste no XAML →
      cycle infinito de `WARN [UiPath.Studio.Project] XamlMigration: removed
      reference System.Runtime.WindowsRuntime` a cada session.

      Engine W-32 persiste o strip no XAML → Studio para de logar warn
      repetido. Lista canonical (conservadora, expandível):
        - System.Runtime.WindowsRuntime

      Strip safe sempre (.NET 6 não tem o assembly). Idempotente: skip se
      ref ausente.
    applies_to:
      include: ["**/*.xaml"]
      exclude:
        - "**/.local/**"
        - "**/.tmp/**"
        - "**/.settings/**"
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.legacy_refs
        function: detect_obsolete_dotnet4_refs
    fix:
      apply_class: deterministic
      # Mechanical injetada per-finding (type=strip_assembly_reference, name=<X>)
      prose: |
        Remover `<AssemblyReference>System.Runtime.WindowsRuntime</AssemblyReference>`
        do bloco refs — WinRT bridge não existe em .NET 6. Strip persistente
        elimina XamlMigration warn cycle.

  - id: ENV-2
    severity: ERROR
    category: breaking
    target: windows
    title: "XAML missing legacy compat refs (mscorlib/System/System.Core)"
    description: |
      Sicoob deploy = Studio 23.10 (imutável). Activity Migrator do
      Studio 25.x/26.x strip `<AssemblyReference>mscorlib</AssemblyReference>`
      + `System` + `System.Core` do bloco refs (Studio 25.x não precisa
      em .NET 6 nativo). Mas Studio 23.10 USA esses 3 refs como forwarder
      bridge pra resolver types declarados em refs modernos
      (`System.Private.CoreLib`, `System.Net.Primitives v6`, etc.).

      Sem esses 3 refs Studio 23.10 não bridja resolution → erros:
        BC30652: Reference required to assembly 'System.Collections,
                 Version=6.0.0.0' containing type 'Dictionary(Of ,)'
        BC31424: Type 'System.Net.NetworkCredential' has been forwarded
                 to assembly 'System.Net.Primitives, Version=6.0.0.0' —
                 reference missing.

      Verificação empírica (2026-05-21):
        - Projeto que ABRE em Studio 23.10: 69/69 XAMLs têm mscorlib.
        - Projeto que QUEBRA em Studio 23.10: 0/25 XAMLs têm mscorlib.
        - Mesmo padrão `new System.Net.NetworkCredential(...)` e
          `scg:Dictionary` em ambos. Diff isolado: presença dos 3 refs.

      ENV-2 emite 1 finding por ref faltando. Fix `insert_assembly_reference`
      injeta no bloco. Forward-compat: Studio 25.x ignora esses 3 refs se
      já tem refs modernos — não causa regressão.

      Triplet correto pós-Migrator pra deploy Studio 23.10:
        W-20  → strip xmlns:* Legacy aliases (header)
        ENV-2 → ensure <AssemblyReference> legacy compat (body)   ← este
        W-11g → insert System.Net.Primitives (body) — complementar

      Conservadora — apenas {mscorlib, System, System.Core} no v1.
      Outros refs legacy (Configuration.Install, Data.Entity, WindowsBase)
      ficam separados — são WCF/EF6/WPF specific.

      NOTA HISTÓRICA: rule anterior W-26 (mesmo ID space) tinha lógica
      INVERSA — strippava esses 3 refs. Premissa empiricamente errada.
      Substituído por ENV-2.

      Idempotente: emite findings só para refs faltando. Skip silente se
      bloco refs ausente (fragments/libraries) ou todos 3 já presentes.
    applies_to:
      include: ["**/*.xaml"]
      exclude:
        - "**/.local/**"
        - "**/.tmp/**"
        - "**/.settings/**"
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.legacy_refs
        function: detect_env2_ensure_legacy_refs
    fix:
      apply_class: deterministic
      # Mechanical injetada per-finding pelo detector
      # (type=insert_assembly_reference, name=<ref legacy missing>).
      prose: |
        Inserir cada `<AssemblyReference>{mscorlib|System|System.Core}
        </AssemblyReference>` faltante no bloco refs. Required pra Studio
        23.10 (deploy Sicoob) resolver type forwarders pra .NET 6 modern
        refs. Forward-compat com Studio 25.x.

  - id: W-12
    severity: ERROR
    category: breaking
    target: windows
    title: "Array literal sem tipo explícito"
    description: |
      Inferência de array em Windows com Option Strict é mais rigorosa.
      Casos que quebram:
        - array vazio `[{}]` (`BC36914`).
        - `ArrayRow="[{...}]"` em AddDataRow alvo `Object()` heterogêneo
          (`BC30333` quando elementos são Integer ou outro value type).
      Defesa: prefixar com tipo explícito — `[New Object() {...}]` p/ ArrayRow,
      `[New String() {...}]` p/ contextos String-typed.

      Auto-fix cobre `ArrayRow="[{...}]"` (sempre seguro wrap Object — AddDataRow
      aceita heterogêneo). Caso `[{}]` vazio e `>[{}]<` precisam contexto pra
      type pick — manual.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.windows
        function: detect_w12_array_literal
    fix:
      apply_class: deterministic
      mechanical:
        type: wrap_arrayrow_object
      prose: |
        `ArrayRow="[{a, b}]"` → `ArrayRow="[New Object() {a, b}]"`.
        Auto-fix aplica apenas em ArrayRow=" form (AddDataRow). Outros casos
        (literal vazio, contexto String-typed) requerem manual.

  - id: W-13
    severity: ERROR
    category: breaking
    target: windows
    title: "SendMail sem UseISConnection=\"False\""
    description: |
      Default em `UiPath.Mail.Activities` pós-migração tenta rotear pelo
      Integration Service e falha com NullReferenceException sem ele configurado.
      Aplicar via Studio property panel "Use Integration Service" = False.
      Studio serializa o toggle + ConnectionDetailsBackupSlot/AttachmentsBackup.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.windows
        function: detect_w13_sendmail
    fix:
      prose: |
        Studio: abrir XAML, property panel `Send SMTP Mail Message`,
        desmarcar "Use Integration Service", salvar. NÃO editar manualmente
        — Studio garante backup slots e namespaces consistentes.

  - id: W-14
    severity: ERROR
    category: breaking
    target: windows
    title: "GenerateDataTableFromText quebra com CSV em Windows"
    description: |
      Combinação `Generate Data Table From Text` + `Read Text File` retorna
      `Could not load type 'CsvHelper.ReadingContext'` em Windows target.
      Substituir por `Read CSV` (atividade dedicada com CsvHelper correto).
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: regex
      pattern: 'GenerateDataTableFromText|Generate Data Table From Text'

  - id: W-15
    severity: WARN
    category: breaking
    target: windows
    title: "Encrypt/Decrypt Text com Key SecureString"
    description: |
      `Encrypt Text`/`Decrypt Text` perderam suporte a `Key=SecureString`
      pós-migração. Só aceitam `Key=String`. Para extrair String de SecureString
      usar padrão de W-10 — `[New System.Net.NetworkCredential("", vSStKey).Password]`.
      Heurística: flag toda Encrypt/Decrypt para review manual de tipo.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: regex
      pattern: '<ui:(?:EncryptText|DecryptText)\b[^>]*>'

  - id: W-16
    severity: ERROR
    category: breaking
    target: windows
    title: ".IsNullOrEmpty extension instance quebra em VB Windows"
    description: |
      Forma `vStTexto.IsNullOrEmpty` quebra em Windows target.
      Usar `String.IsNullOrEmpty(vStTexto)` (chamada estática).
      Detector heurístico ignora chamada estática em qualquer caixa
      (`String.`, `string.`, `x:String.`, `s:String.`).
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.windows
        function: detect_w16_isnullorempty
        static_class_names: [string, "s:string", "x:string"]
        last_segment_skip: [string]
    fix:
      mechanical:
        type: regex_replace
        pattern: '(?<![A-Za-z_:.])(?![Ss]tring\.IsNullOrEmpty\b)([a-zA-Z_]\w*)\.IsNullOrEmpty\b'
        replacement: 'String.IsNullOrEmpty(\1)'
      prose: |
        Trocar `<expr>.IsNullOrEmpty` por `String.IsNullOrEmpty(<expr>)`.
        Mechanical fix cobre só identificador simples; chains
        multi-part (`obj.Field.IsNullOrEmpty`) requerem fix manual.

  - id: W-17
    severity: ERROR
    category: breaking
    target: windows
    title: ".ToInt32 extension instance quebra em VB Windows"
    description: |
      Forma `vStVariavel.ToInt32` quebra em Windows.
      Usar `Integer.Parse(vStVariavel)` (parse estrito) ou
      `Convert.ToInt32(vStVariavel)` (tolerante a Nothing/erro).
      Detector heurístico ignora chamada estática (`Convert.`,
      `System.Convert.`, `Integer.`) em qualquer caixa.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.windows
        function: detect_w17_toint32
        static_class_names:
          - convert
          - "system.convert"
          - integer
          - "system.integer"
          - "s:convert"
          - "x:convert"
          - "s:int32"
          - "x:int32"
        last_segment_skip: [convert, integer, int32, system]
    fix:
      mechanical:
        type: regex_replace
        pattern: '(?<![A-Za-z_:.])(?![Cc]onvert\.ToInt32\b)(?![Ii]nteger\.ToInt32\b)([a-zA-Z_]\w*)\.ToInt32\b'
        replacement: 'Convert.ToInt32(\1)'
      prose: |
        Trocar `<expr>.ToInt32` por `Convert.ToInt32(<expr>)` (tolerante a
        Nothing) ou `Integer.Parse(<expr>)` (parse estrito).
        Mechanical fix cobre só identificador simples.

  - id: OCR-10
    severity: ERROR
    category: breaking
    target: windows
    title: "NApplicationCard.OCREngine sem engine concreto"
    description: |
      `<uix:NApplicationCard.OCREngine>` contém `<ActivityFunc>` vazio (sem
      activity OCR concreto dentro). Studio analyzer reporta "OCR Engine must
      be set" e bloqueia execução.

      Migrator headless GA injeta esse placeholder ao converter NApplicationCard
      pre-spec OCREngine. Em workflows que não usam OCR-based selectors, bloco
      é artificial (Migrator artifact) — strip seguro.

      Auto-fix: remove apenas blocos com body vazio (só Argument declarations,
      sem activity concreta). Workflows que setaram engine explícito
      (UiPathScreenOcr/UiPathDocumentOcr/etc) preservados pela precisão do regex.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.windows
        function: detect_ocr1_empty_engine
    fix:
      apply_class: deterministic
      mechanical:
        type: strip_empty_ocrengine_block
      prose: |
        Auto-remove `<uix:NApplicationCard.OCREngine>...</...OCREngine>` quando
        ActivityFunc body vazio. Workflows com engine explícito intact.
        Se precisar OCR depois: declarar `<ui:UiPathScreenOcr>` (ou outro) dentro
        do ActivityFunc.

  # W-5..W-9, W-18 — agent_only (heurística manual, não detectável estaticamente)

  - id: W-5
    severity: WARN
    category: breaking
    target: windows
    title: "AssemblyReferences System.ServiceModel em XAML migrado"
    description: |
      WCF stack não é usado pelos pacotes pinados (D-1) em runtime.
      Permanece em XAML como herança do template Legacy. Não bloqueia
      execução, mas é noise. Studio remove em "Save All" após abrir.
      Cleanup opcional, recomendado para reduzir surface de auditoria.

      Detector cobre `System.ServiceModel.Internals` e `System.ServiceModel.Web`
      — refs órfãs após Migrator GA. `System.ServiceModel` (base) ESTÁ em
      W-11y baseline_refs (cross-version Windows target), strip-eia divergiria
      add↔strip infinitamente.
      Fix mecânico per-finding via strip_assembly_reference (compartilha
      fixer com regras de cleanup).
    applies_to:
      include: ["**/*.xaml"]
      exclude:
        - "**/.local/**"
        - "**/.tmp/**"
        - "**/.settings/**"
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.legacy_refs
        function: detect_servicemodel_refs
    fix:
      apply_class: deterministic
      # Mechanical injetada per-finding (type=strip_assembly_reference,
      # name=<System.ServiceModel*>).
      prose: |
        Remover cada `<AssemblyReference>System.ServiceModel*</AssemblyReference>`
        do bloco refs. WCF não usado pelos pacotes pinados Sicoob; refs órfãs
        apenas adicionam surface de auditoria.

  - id: W-6
    severity: WARN
    category: breaking
    target: windows
    title: "DataContract serializer + persistence diverge Legacy↔Windows"
    description: |
      Comportamento do DataContract serializer diverge entre Legacy e Windows
      em campos sem `[DataMember]` explícito e em ordem de propriedades.
      Se projeto usa `Suspend/Resume`, `WaitForFormTaskAndResume`,
      `WaitForExternalTaskAndResume` ou cross-process state, validar que
      estado serializado de Legacy é desserializável em Windows runtime
      antes de migrar processos in-flight.
    detect:
      type: agent_only

  - id: W-7
    severity: WARN
    category: breaking
    target: windows
    title: "Mensagens de exception mudam entre Legacy e Windows"
    description: |
      Mensagens mudam mesmo com tipo mantido. `Try/Catch` que decide caminho
      via `.Message.Contains("...")` em SystemException pode quebrar silenciosamente.
      Refatorar para checar `.GetType()` ou property específica do exception.
      Agent: grep por `BusinessException.Message.Contains` ou `SystemException.Message.Contains`.
    detect:
      type: agent_only

  - id: W-8
    severity: INFO
    category: breaking
    target: windows
    title: "Encoding default mudou de ANSI para UTF-8"
    description: |
      .NET Framework: `Encoding.Default` = ANSI/CP1252.
      .NET 6+: `Encoding.Default` = UTF-8. `File.ReadAllText(path)` ou
      `StreamReader(path)` sem encoding explícito lê bytes diferente.
      Em PT-BR com acentos, isso quebra silenciosamente (mojibake).
      Sempre passar encoding explícito em File I/O — relevante para `InvokeCode`.
    detect:
      type: agent_only

  - id: W-9
    severity: INFO
    category: breaking
    target: windows
    title: "InvokeCode VB compilation runtime mudou (Roslyn)"
    description: |
      .NET 6 usa Roslyn vs CodeDom .NET Framework. APIs `System.IO`,
      `System.Text.RegularExpressions`, `System.Collections.Generic` continuam.
      Quebram: `System.Web.HttpUtility`, `System.Configuration.ConfigurationManager`,
      COM dynamic dispatch específico. Validar conteúdo de cada `InvokeCode`.
    detect:
      type: agent_only

  - id: W-18
    severity: INFO
    category: breaking
    target: windows
    title: "Studio Modern quirks pós-migração"
    description: |
      Não-determinísticos, não detectáveis estaticamente:
      (a) `Invoke Workflow` retorna "Não é possível localizar o fluxo de
      trabalho" em runtime — recriar a atividade Invoke Workflow apontando
      para o mesmo arquivo e remover a antiga.
      (b) `Invoke Workflow` acusa "argumentos nulos" no build — clicar
      botão "refresh" da atividade no Studio para sincronizar argumentos.
      (c) `Get Asset` falha em produção — verificar Proxy da máquina robô.
    detect:
      type: agent_only

# ---- J — project.json ----

  - id: J-1
    severity: ERROR
    category: breaking
    target: all
    title: "studioVersion deve ser \"23.10.13\""
    description: |
      Diretriz Sicoob: Studio alvo é 2023.10.13 (LTS). Toda criação ou edição
      de `project.json` deve gravar `"studioVersion": "23.10.13"`. Outras
      versões (21.x, 24.x, 25.x) = violação. Reavaliar somente quando o
      usuário sinalizar mudança de diretriz, não com base em versão local.
    applies_to:
      include: ["project.json"]
    detect:
      type: json_field_check
      params:
        path: studioVersion
        expected: "23.10.13"
    fix:
      apply_class: deterministic
      mechanical:
        type: set_json_field
        path: studioVersion
        value: "23.10.13"
      prose: |
        Editar `project.json` setando `"studioVersion": "23.10.13"`.

  - id: J-4
    severity: ERROR
    category: breaking
    target: all
    title: "targetFramework ∈ {Windows, Legacy}"
    description: |
      `targetFramework` deve ser exatamente `"Windows"` ou `"Legacy"`.
      Outros valores quebram resolução de namespace e referências.
    applies_to:
      include: ["project.json"]
    detect:
      type: json_field_check
      params:
        path: targetFramework
        expected_in: ["Windows", "Legacy"]

  - id: J-5
    severity: WARN
    category: architectural
    target: all
    title: "expressionLanguage = VisualBasic"
    description: |
      Padrão Sicoob: VB.NET. `expressionLanguage` deve ser `"VisualBasic"`.
      C# em projetos Sicoob viola padrão arquitetural.
    applies_to:
      include: ["project.json"]
    detect:
      type: json_field_check
      params:
        path: expressionLanguage
        expected: VisualBasic
    fix:
      apply_class: deterministic
      mechanical:
        type: set_json_field
        path: expressionLanguage
        value: VisualBasic
      prose: |
        Setar `expressionLanguage: "VisualBasic"` em `project.json`.

  - id: J-2
    severity: WARN
    category: breaking
    target: all
    title: "studioVersion vs packages — consistência semver"
    description: |
      Pacotes pinados em D-1 são compatíveis com Studio 23.10.13.
      Se `studioVersion` < 23.10 e packages 25.x são usados, há risco
      de incompat. REF tem studio 21.x e packages 25.x — provável bug.
    applies_to:
      include: ["project.json"]
    detect:
      type: json_version_compare
      params:
        path: studioVersion
        min: "23.10.0"

  - id: J-3
    severity: WARN
    category: breaking
    target: all
    title: "Packages obrigatórios mínimos"
    description: |
      Todo projeto deve incluir UiPath.System.Activities como base.
      Faltar essas indica template incompleto.
      Fix mecânico injeta pin Sicoob [25.4.4] (alinhado D-1a) em
      dependencies. Libraries skipadas via skip_when designOptions.outputType.
    applies_to:
      include: ["project.json"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.json_checks
        function: detect_j3_required_packages
        packages:
          - UiPath.System.Activities
        skip_when:
          designOptions.outputType: [Library]
    fix:
      apply_class: deterministic
      mechanical:
        type: set_dependency_pin
        package: UiPath.System.Activities
        version: "[25.4.4]"
      prose: |
        Adicionar `dependencies."UiPath.System.Activities" = "[25.4.4]"`
        em project.json. Pin Sicoob canônico (alinhado D-1a).

  - id: J-6
    severity: WARN
    category: architectural
    target: all
    title: "excludedLoggedData inclui *password* e Private:*"
    description: |
      `excludedLoggedData` deve filtrar campos sensíveis dos logs do Robot.
      Padrão mínimo: incluir `"*password*"` e `"Private:*"`.
      Campo vive em `runtimeOptions.excludedLoggedData` (UiPath schema).
    applies_to:
      include: ["project.json"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.json_checks
        function: detect_j6_excluded_logged
        path: runtimeOptions.excludedLoggedData
        required_patterns:
          - "*password*"
          - "Private:*"
    fix:
      apply_class: deterministic
      mechanical:
        type: json_array_ensure
        path: runtimeOptions.excludedLoggedData
        values:
          - "*password*"
          - "Private:*"
      prose: |
        Append `"*password*"` e `"Private:*"` em `runtimeOptions.excludedLoggedData`.

  - id: J-7
    severity: INFO
    category: architectural
    target: all
    title: "requiresUserInteraction consistente com tipo"
    description: |
      Performer unattended não deve ter `requiresUserInteraction: true`.
      Attended automation não deve ter `requiresUserInteraction: false`.
      Markers de performer/attended e paths em params.
    applies_to:
      include: ["project.json"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.json_checks
        function: detect_j7_user_interaction_consistency
        name_path: name
        flag_path: requiresUserInteraction
        performer_markers: [performer, unattended]
        attended_markers: [attended]
        attended_negative_markers: [unattended]

  - id: J-8
    severity: ERROR
    category: breaking
    target: all
    title: "fileInfoCollection com fileName apontando file inexistente"
    description: |
      `project.json::designOptions.fileInfoCollection[].fileName` referencia
      arquivo que não existe no disco. Studio publish FALHA com:

        "O caso de teste não foi encontrado no caminho esperado. Restaure o
         arquivo recriando-o no caminho especificado ou a partir do controle
         de origem. Se preferir, simplesmente remova o caso de teste ausente."

      Studio analyze (uipcli analyze) NÃO valida isso — só publish detecta.

      Causa típica: TC deletado em refactor mas manifest project.json não
      atualizado. Engine atua como guardrail antes do publish.

      Detector é genérico p/ outros fileInfo-style arrays no project.json
      (e.g. `webServices`), parametrizado via `key_path` + `filename_field`.
    applies_to:
      include: ["project.json"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.project_manifest
        function: detect_j8_stale_fileinfo_entries
        key_path: designOptions.fileInfoCollection
        filename_field: fileName
    fix:
      apply_class: deterministic
      mechanical:
        type: project_manifest_remove_stale_entries
        key_path: designOptions.fileInfoCollection
        filename_field: fileName
      prose: |
        Remover entry de `project.json::designOptions.fileInfoCollection`
        cujo `fileName` aponta arquivo inexistente. Ou restaurar arquivo
        se foi deletado por engano (git checkout do path original).

  - id: ENV-1
    severity: ERROR
    category: breaking
    target: all
    title: "project.json sem flags Studio-compat (Sicoob policy)"
    description: |
      Empresa Sicoob roda Studio 23.10.x (não muda). Dev runs Studio 25.x/26.x.
      project.json precisa de 3 flags Sicoob policy pra Studio 23.10 resolver
      transitive deps de packs UIA 25.x / System 25.x:

        runtimeOptions.mustRestoreAllDependencies = true
        designOptions.modernBehavior = false
        designOptions.libraryOptions.includeOriginalXaml = false

      Sem `mustRestoreAllDependencies=true`, Studio 23.10 lazy-loads assemblies
      → BC30652 `Reference required to assembly 'System.Collections, v6.0.0.0'`
      (Dictionary type) e BC31424 `Type 'System.Net.NetworkCredential' has been
      forwarded to assembly 'System.Net.Primitives, v6.0.0.0'`. Erros aparecem
      em qualquer XAML que use Dictionary, NetworkCredential, ou outros types
      .NET 6 que Studio 23.10 não pre-resolve.

      `modernBehavior=false` opt-out de Studio 25.x runtime features que 23.10
      não tem → garante legacy resolution mode em ambos Studios.

      `includeOriginalXaml=false` (libraryOptions) = Sicoob default — não
      embutir source XAML em packs publicados.

      Verificado vs projeto que ABRE em Studio 23.10 vs projeto que QUEBRA —
      diff isola exatamente esses 3 flags como root cause.
    applies_to:
      include: ["project.json"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.project_manifest
        function: detect_env1_studio_compat
    fix:
      apply_class: deterministic
      # Mechanical injetada pelo detector (type=project_manifest_set_keys,
      # keys={dotted_path: desired_value, ...}) — atomic patch single finding
      # cobrindo todos keys divergentes.
      prose: |
        Aplicar em project.json:
          - runtimeOptions.mustRestoreAllDependencies = true
          - designOptions.modernBehavior = false
          - designOptions.libraryOptions.includeOriginalXaml = false
        Sicoob policy: empresa Studio 23.10 immutable → project.json deve
        forçar restore total + legacy behavior pra evitar BC30652/BC31424.

  - id: ENV-3
    severity: ERROR
    category: breaking
    target: windows
    title: "XAML usa System.Net.* em VB mas falta namespace import"
    description: |
      Sicoob deploy = Studio 23.10. Studio 23.10 precisa namespace
      `<x:String>System.Net</x:String>` (e outros) importado em
      `<TextExpression.NamespacesForImplementation>` pra VB compiler
      resolver types em forwarder chains. Sem o import, mesmo com refs
      corretos em ReferencesForImplementation, Studio 23.10 falha:

        BC30652: Reference required to assembly 'System.Collections'
        BC31424: Type 'System.Net.NetworkCredential' has been forwarded
                 to assembly 'System.Net.Primitives, Version=6.0.0.0'

      Verificação empírica (2026-05-21):
        - Projeto que ABRE em Studio 23.10 (AtualizarFimExecucao.xaml):
          `<x:String>System.Net</x:String>` import PRESENTE.
        - Projeto que QUEBRA (RetryCurrentTransaction.xaml): import
          AUSENTE. Diff isolado (refs idênticos).

      ENV-3 cobre 3 namespaces que aparecem em padrões Sicoob:
        - System.Net (NetworkCredential, IPEndPoint, IPAddress, Cookie,
          WebClient, HttpWebRequest)
        - System.Runtime.CompilerServices (RuntimeHelpers, CallerMemberName)
        - System.Text.RegularExpressions (Regex, Match, MatchCollection)

      Detector é seletivo — emite finding APENAS quando XAML body usa o
      type prefixado em VB expression. Skip silente se namespace já
      importado ou usage ausente.

      Forward-compat: Studio 25.x ignora imports redundantes.
    applies_to:
      include: ["**/*.xaml"]
      exclude:
        - "**/.local/**"
        - "**/.tmp/**"
        - "**/.settings/**"
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.legacy_refs
        function: detect_env3_ensure_namespace_imports
    fix:
      apply_class: deterministic
      # Mechanical injetada per-finding (type=insert_namespace_import,
      # name=<namespace>). Idempotente.
      prose: |
        Inserir `<x:String>{namespace}</x:String>` no bloco
        `<TextExpression.NamespacesForImplementation>` pra Studio 23.10
        resolver types forwarded. Solução cosmética sem regressão.

  - id: ENV-4
    severity: ERROR
    category: breaking
    target: windows
    title: "XAML tem `<mva:VisualBasic.Settings>` legacy text-content"
    description: |
      ROOT CAUSE de BC30652 + BC31424 isolated empiricamente (2026-05-22,
      projeto contestacao-de-compras-ajuste-na-reserva-de-fraude-performer).

      Studio pré-19.x (template REFramework antigo) deixa stub legacy em
      `<TextExpression>` block siblings:

        <mva:VisualBasic.Settings>Assembly references and imported namespaces
        for internal implementation</mva:VisualBasic.Settings>

      Esse text-content é interpretado pelo VB compiler como
      `Microsoft.VisualBasic.Activities.VisualBasicSettings` instance com
      payload string → ativa modo LEGACY resolution → Dictionary +
      NetworkCredential resolvem via facades .NET Framework v4
      (mscorlib/System Legacy) → mismatch contra forwarder v6
      (System.Private.CoreLib) → erros persistem MESMO com:

        BC30652: Reference required to assembly 'System.Collections,
                 Version=6.0.0.0' containing the type 'Dictionary(Of ,)'
        BC31424: Type 'System.Net.NetworkCredential' has been forwarded
                 to assembly 'System.Net.Primitives, Version=6.0.0.0'

      W-11g/W-11y/ENV-2 (insert refs) NÃO bastam — text-content overrides
      resolver mode independent das refs presentes.

      Verificação empírica (2026-05-22):
        - Studio "Import References" auto-fix substituí element por canonical
          `<VisualBasic.Settings><x:Null /></VisualBasic.Settings>` → BC
          clears imediatamente.
        - Engine W-11g + W-11y + manual add de 3 BCL .NET 6 refs ANTES de
          ENV-4 fix = BC30652/BC31424 PERSISTEM.

      Fix mecânico: substituir element por canonical modern empty marker.
      Cobre forma text-content + self-closing. Drop `xmlns:mva=...` do
      root se prefix unused pós-replacement.

      Triplet correto pós-Migrator p/ deploy Studio 23.10 + Windows target:
        ENV-2 → ENSURE legacy compat refs (mscorlib/System/System.Core)
        ENV-3 → ENSURE namespace imports (System.Net etc)
        ENV-4 → NORMALIZE VisualBasic.Settings legacy stub   ← este (ROOT CAUSE)
        W-11g → INSERT System.Net.Primitives ref
        W-11y → ENSURE BCL .NET 6 refs baseline
        W-19  → REWRITE QueueItem indexer (.SpecificContent.Item etc)

      Idempotente: skip silente se element já canonical.
    applies_to:
      include: ["**/*.xaml"]
      exclude:
        - "**/.local/**"
        - "**/.tmp/**"
        - "**/.settings/**"
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.legacy_refs
        function: detect_env4_normalize_vb_settings
    fix:
      apply_class: deterministic
      # Mechanical injetada per-finding (type=normalize_visualbasic_settings).
      prose: |
        Substituir `<mva:VisualBasic.Settings>text</mva:VisualBasic.Settings>`
        (ou self-closing) por canonical `<VisualBasic.Settings><x:Null /></
        VisualBasic.Settings>`. Drop `xmlns:mva=...` se prefix unused.
        ROOT CAUSE BC30652/BC31424 — sem ENV-4, outras regras não bastam.

  - id: J-12
    severity: ERROR
    category: breaking
    target: windows
    title: "project.json arguments[*].type aponta pra .NET Framework mscorlib v4"
    description: |
      Activity Migrator switches `targetFramework: Legacy → Windows` (.NET 6)
      mas deixa `project.json::arguments.input[*].type` (e output[*].type)
      apontando pra assemblies `.NET Framework v4.0.0.0`:

        "type": "System.String, mscorlib, Version=4.0.0.0, Culture=neutral,
                  PublicKeyToken=b77a5c561934e089"

      Studio analyzer compila project com .NET 6 BCL mas vê argument types
      declarados com mscorlib v4 (incompatible). Quando workflow USA esses
      arguments em expressions VB, dispara cascade BC31424/BC30652 type
      forwarding errors mesmo com refs corretas em XAML.

      Fix mecânico: rewrite type pra short form (sem assembly clause):

        "System.String, mscorlib, Version=4.0.0.0, ..." → "System.String"

      Studio resolve type via project deps + AssemblyReferences. Cobre
      input + output arguments arrays.
    applies_to:
      include: ["project.json"]
    detect:
      type: regex
      pattern: '"type":\s*"[^"]+,\s*(?:mscorlib|System|System\.Core|System\.Drawing|System\.Xml|System\.Data),\s*Version=4\.\d+\.\d+\.\d+,'
    fix:
      apply_class: deterministic
      mechanical:
        type: retarget_project_argument_types
      prose: |
        Reescrever `project.json::arguments.input/output[*].type` pra short
        form sem assembly clause (.NET Framework v4 refs). Studio resolve via
        project deps em Windows target.

# ---- X — Compile/runtime preventers (extraídos de lints atuais) ----

  - id: X-1
    severity: ERROR
    category: breaking
    target: all
    title: "Duplicate IdRef em XAML"
    description: |
      `IdRef` duplicado dentro do mesmo XAML quebra o XAML 2009/2010 ID
      resolution e causa Studio compile error
      `Duplicate identifier 'X' detected`. Cada `IdRef` precisa ser único
      dentro do `<x:Members>` ou no `<sap:WorkflowViewStateService.ViewState>`.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: duplicate_id
      params:
        attribute: IdRef
        # Skip patterns: IdRefs auto-gerados por Studio (formato
        # `<TypeName>``<Arity>_<Index>`) são scope-local — dups tolerados.
        # Validado contra Studio Analyzer (silent em REF: 3 dups VBValue).
        skip_patterns:
          - "^[A-Za-z][A-Za-z0-9]*`\\d+_\\d+$"
    fix:
      apply_class: deterministic
      mechanical:
        type: dedupe_idref
      prose: |
        Renomear IdRefs duplicados: manter primeira ocorrência, sufixar
        subsequentes com `_dedup_<n>`. ViewState dict references de IdRef
        antigo são tolerados (rendering hint).

# ============================================================
# Batch 2 — Architectural (Sicoob standards)
# ============================================================

  - id: A-1
    severity: ERROR
    category: architectural
    target: all
    title: "InitAllApplications scope — apps abrem aqui, Process só faz attach"
    description: |
      TODAS as apps abrem em `Framework/InitAllApplications.xaml`
      (`OpenMode="Always"`). Process.xaml SOMENTE faz attach
      (`OpenMode="Never"`). Inverter esta divisão fragmenta sessão e
      multiplica overhead de open/close.
      Agent: revisar `OpenMode` em NApplicationCard de cada app.
    detect:
      type: agent_only

  - id: A-2
    severity: ERROR
    category: architectural
    target: all
    title: "Persistence activities em Main.xaml"
    description: |
      `WaitForFormTaskAndResume` e `CreateFormTask` DEVEM ficar em
      `Main.xaml`. Workflows com UI/DB/browser não podem ser persistidos.
    applies_to:
      include: ["**/*.xaml"]
      exclude: ["Main.xaml", "Framework/**", "Tests/**"]
    detect:
      type: regex
      pattern: '<ui:(?:WaitForFormTaskAndResume|CreateFormTask)\b'

  - id: A-3
    severity: ERROR
    category: architectural
    target: all
    title: "Credenciais nunca como argumento (exceto chain Sicoob)"
    description: |
      Workflows recebem `in_StCredentialAssetName: String`, recuperam credencial
      no próprio workflow via `GetRobotCredential`. NUNCA passar SecureString
      direta como argumento.

      Exceção arquitetural Sicoob: REFramework Sicoob coleta TODAS as credenciais
      uma única vez em `InitAllApplications` (via `GetAllCredentials`), armazena
      em `in_Credenciais` (`Dictionary(String, Tuple(String, SecureString))`)
      e propaga (ou Tuple/SecureString derivados) ao longo da cadeia. Workflows
      que recebem `InArgument(SecureString)`, `InArgument(Tuple(String, SecureString))`
      ou `InArgument(Dictionary(String, Tuple(String, SecureString)))` derivados
      de `in_Credenciais` são parte do padrão — não violação.
    applies_to:
      include: ["**/*.xaml"]
      exclude: ["Framework/**", "Tests/**", "**/*Launch.xaml"]
    detect:
      type: securestring_argument_outside_chain
      params:
        chain_marker_args: [in_Credenciais, in_Credentials]
        chain_marker_types: [Tuple, Dictionary]
    fix:
      prose: |
        Trocar argumento por `in_StCredentialAssetName: String`.
        Chamar `GetRobotCredential` dentro do workflow.

  - id: A-4
    severity: ERROR
    category: architectural
    target: all
    title: "NUNCA modificar Framework/SetTransactionStatus.xaml"
    description: |
      `Framework/SetTransactionStatus.xaml` é REFramework padrão.
      Modificações quebram contrato com Process/Main e dificultam updates
      futuros do template. Ajustes específicos vão em workflows wrappers.
      Agent: comparar contra REFramework template; sinalizar diff.
    detect:
      type: agent_only

  - id: A-5
    severity: ERROR
    category: architectural
    target: all
    title: "Decomposição modular por conceito (1 workflow = 1 conceito)"
    description: |
      Cada workflow trata exatamente UM conceito (uma validação, uma
      integração, uma transformação). Workflow com múltiplos conceitos
      misturados é violação independente do tamanho. Exceção: workflows
      originais REFramework (Main, Process, SetTransactionStatus,
      InitAllApplications, GetTransactionData).
    detect:
      type: agent_only

  - id: A-6
    severity: ERROR
    category: architectural
    target: all
    title: "Navegação separada da ação (browser e desktop)"
    description: |
      Workflow de navegação retorna `UiElement` do destino;
      workflow de ação recebe como `in_UI`. Misturar quebra reuso e
      complica retry granular.
    detect:
      type: agent_only

  - id: A-7
    severity: WARN
    category: architectural
    target: all
    title: "Logs sem bookends [INICIO]/[FIM]"
    description: |
      Robot já loga entrada/saída em cada `InvokeWorkflowFile` —
      bookends `[INICIO]`/`[FIM]` são ruído duplicado. Workflows na cadeia
      de Process recebem `in_StPrefixoLog` e prependam em mensagens reais.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: regex
      pattern: '\[INICIO\]|\[FIM\]'

  - id: A-8
    severity: WARN
    category: architectural
    target: all
    title: "Config path nunca hardcoded"
    description: |
      Workflow lê path de Config.xlsx via Orchestrator asset (Initialization
      obtém asset string com path NAS). Path literal hardcoded em
      `WorkbookPath="..."` é violação. Aceito: `WorkbookPath="[expr]"`.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: regex
      pattern: 'WorkbookPath="(?!\[)[^"]*\.xlsx"'
    fix:
      prose: |
        Substituir por `WorkbookPath="[in_StConfigPath]"` — `in_StConfigPath`
        vem de `GetRobotAsset` em `InitAllSettings`.

  - id: A-9
    severity: WARN
    category: architectural
    target: all
    title: "Browser/Desktop config padrão"
    description: |
      Browser: `IsIncognito="True"`, `InteractionMode="Simulate"`,
      `AttachMode="SingleWindow"`. Desktop: sem IsIncognito,
      `AttachMode="ByInstance"`. Sessão descartada ao fechar (sem logout).
      Agent: revisar NApplicationCard / Use Application.
    detect:
      type: agent_only

  - id: A-10
    severity: WARN
    category: architectural
    target: all
    title: "Uma única NApplicationCard por web app"
    description: |
      UiElement distinto por app. Múltiplas NApplicationCard para o mesmo
      app fragmenta UI state e duplica retry de attach.
      Agent: count per app target.
    detect:
      type: agent_only

  - id: A-11
    severity: WARN
    category: architectural
    target: all
    title: "API/network em RetryScope (3 retries, 5s)"
    description: |
      Wrap API/network em `RetryScope` (3 retries, 5s). Exceções:
      `NetHttpRequest` tem retry builtin; HTTP dentro de `DoWhile` de
      polling não deve ter RetryScope próprio (loop já é o retry).
    detect:
      type: agent_only

  - id: A-12
    severity: WARN
    category: architectural
    target: all
    title: "Extração separada de filtragem"
    description: |
      Extração retorna TODOS os dados; filtragem é separada
      (em `Process/` ou transformação dedicada).
    detect:
      type: agent_only

  - id: A-13
    severity: ERROR
    category: architectural
    target: all
    title: "Mensagens de exception nunca hardcoded"
    description: |
      Mensagens de exception de nível de processo vivem em
      `Config.xlsx` (aba Constants ou sheet dedicada). Workflow lê via
      `in_Config("ChaveDaMensagem").ToString`. Hardcodar mensagem em
      `Throw.Exception` é violação.
      Escopo: workflows da cadeia Process e abaixo.
      Framework/, Tests/, integrações de infra (DB, Orchestrator) podem
      manter mensagens inline.
    applies_to:
      include: ["**/*.xaml"]
      exclude: ["Framework/**", "Tests/**", "DB2/**", "Orquestradora/**", "Orquestrador/**"]
    detect:
      type: regex
      pattern: 'Exception="\[New\s+\w*Exception\("([^"]{4,})"'

  - id: A-13b
    severity: ERROR
    category: architectural
    target: all
    title: "Chaves usadas em XAML existem em Config.xlsx"
    description: |
      Toda chave `in_Config("Chave")` referenciada em XAML deve existir em
      pelo menos uma sheet de `assets/configs/Config_<Role>.xlsx` (fallback
      `Data/Config_*.xlsx` deprecated path).
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: config_xlsx_keys
      params:
        mode: missing

  - id: A-14
    severity: WARN
    category: architectural
    target: all
    title: "Progress counter pattern \"Nr - Desc\" em Main.xaml"
    description: |
      Variável `Progress` (String) atualizada a cada etapa com formato
      numerado + descrição (`"01 - <etapa A>"`, `"02 - <etapa B>"`).
      Usado em resume após crash e em `SetTransactionStatus.Reason`.
      Nunca pipe `Progress` como parte de mensagem — é estado, não log.
    applies_to:
      include: ["Main.xaml"]
    detect:
      type: agent_only

  - id: A-15
    severity: INFO
    category: architectural
    target: all
    title: "Output do TransactionItem reinicializado por transação"
    description: |
      `io_TransactionItem.Output = New Dictionary(Of String, Object)` no
      primeiro workflow da cadeia Process. Output é working state do ciclo
      atual; fonte da verdade é DB queue/Orchestrator queue.
    detect:
      type: agent_only

  - id: A-16
    severity: WARN
    category: architectural
    target: all
    title: "Pastas por sistema externo na raiz (sem numeração)"
    description: |
      Pastas raiz do projeto: `DB2/`, `Orquestrador/`, `Utils/`,
      `[SistemaExterno]/`. Sem numeração tipo `01-Folder/` nem prefixos
      como `R2D2/`. Nome em PT-BR descrevendo sistema ou finalidade.
      Agent: revisar layout do projeto.
    detect:
      type: agent_only

  - id: A-17
    severity: INFO
    category: architectural
    target: all
    title: "Max ~150 linhas por workflow (indicador, não hard limit)"
    description: |
      A-5 (um conceito por workflow) prevalece sobre tamanho. Se workflow
      > 150 linhas E trata múltiplos conceitos, extrair sub-workflows.
    detect:
      type: agent_only

  - id: A-18
    severity: ERROR
    category: architectural
    target: all
    title: "Sem UI activities em workflows de dados"
    description: |
      Pastas `DB2/`, `Orquestrador/`, `Process/` não contém
      `NApplicationCard`, `NClick`, `NTypeInto`, `NGetText`. Dados
      entram/saem via argumentos tipados (DataTable, String, Boolean).
    applies_to:
      include: ["DB2/**/*.xaml", "Orquestrador/**/*.xaml", "Orquestradora/**/*.xaml", "Process/**/*.xaml"]
    detect:
      type: regex
      pattern: '<ui:(?:NApplicationCard|NClick|NTypeInto|NGetText|NHover|NCheck|NSelectItem)\b'

  - id: A-19
    severity: ERROR
    category: architectural
    target: all
    title: "Refatoração preserva contrato io_TransactionItem"
    description: |
      Sub-workflow que MODIFICA `io_TransactionItem.Output(...)`:
      (a) declara `<x:Property Name="io_TransactionItem"
      Type="InOutArgument(ui:QueueItem)"/>`;
      (b) TODO caller passa via `<InOutArgument x:Key="io_TransactionItem">`.
      Detector heurístico: só dispara quando callee escreve em
      `io_TransactionItem.Output` E caller invoca callee SEM bind.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.transaction_item
        function: detect_a19_io_transaction_item

  - id: A-19b
    severity: WARN
    category: architectural
    target: all
    title: "Caller falta argumento In declarado pelo callee"
    description: |
      `InvokeWorkflowFile` sem bind para argumento `In` (ou `InOut`)
      declarado pelo callee transmite `Nothing`. Argumentos `Out`
      faltando são descarte legítimo (output ignorado).
      Heurística: filtra por direction=In/InOut.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.transaction_item
        function: detect_a19b_in_args_missing
    fix:
      apply_class: deterministic
      mechanical:
        type: cascade_caller_in_args
        params: {}

  - id: N-17
    severity: WARN
    category: architectural
    target: all
    title: "LogMessage DisplayName pobre/nao-descritivo"
    description: |
      DisplayName de LogMessage deve seguir convencao Sicoob:
      `<ActivityType> - <contexto>`. Mantem o nome original do tipo de
      activity ("Log Message") e adiciona contexto especifico.
      Casos pobres:
        - Default Studio sem contexto: 'Log Message', 'Log', 'LogMessage'
        - Auto-gerado abreviado: 'Trace: X', 'Log - X', 'Log: X'
      Bom: 'Log Message - Cadastro realizado', 'Log Message - Token obtido',
      'Log Message - Transacao concluida'.
    applies_to:
      include: ["**/*.xaml"]
      exclude: ["Tests/**", "**/Tests/**"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.logs
        function: detect_n17_log_displayname_quality
    fix:
      apply_class: deterministic
      mechanical:
        type: rename_poor_log_displayname
        params: {}
      prose: |
        Auto-fix `rename_poor_log_displayname` substitui DisplayName pobre
        por 'Log Message - <contexto>' usando contexto do DN antigo ou Message body.

  - id: N-16
    severity: WARN
    category: architectural
    target: all
    title: "LogMessage sem rastreabilidade semantica"
    description: |
      Conteudo da Message em <ui:LogMessage> deve gerar rastreabilidade real
      em producao: acao especifica + contexto (IDs, valores runtime) +
      distinguivel de outras logs.

      Falhas detectadas por LLM validator (Claude Code CLI):
      - Termos genericos sem contexto: "OK", "Concluido", "Pronto", "Done"
      - Literais curtos sem variable references
      - Mensagens duplicadas em multiplas activities
      - Sem placeholder runtime (`vXxx`, `in_Xxx`, `&` concatenations)

      Validator cacheia veredito por hash da mensagem
      em `.uipath-rules-cache/llm_logmsg.json` — re-runs sao baratas.

      Fail-open: erro de LLM (CLI ausente, network, etc) NAO emite finding.
    applies_to:
      include: ["**/*.xaml"]
      exclude: ["Tests/**", "**/Tests/**"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.log_traceability
        function: detect_n16_log_semantic_traceability
    fix:
      prose: |
        Reescrever Message com contexto: incluir variable/argument
        references (ex: `in_StPrefixoLog + "Validou coop " + vStCoopId`)
        OU IDs/valores especificos. Evitar literais genericos.

  - id: A-19c
    severity: WARN
    category: architectural
    target: all
    title: "Caller passa x:Key divergente do callee (cascade rename perdida)"
    description: |
      `InvokeWorkflowFile` passa `x:Key="X"` em `<InArgument>`/`<OutArgument>`/
      `<InOutArgument>` mas callee não declara propriedade `X`. Detector busca
      candidato no callee com mesma direção e alta similaridade de tokens
      (Jaccard ≥ threshold após normalização: strip direção + strip type-prefix
      + tokenize CamelCase + lowercase).

      Causa típica: rename N-2/N-11 cascateou para callers que usavam o nome
      ANTIGO exato, mas falhou para callers cujo `x:Key` já era divergente
      (corrupção pré, refactor de contrato, typo histórico).

      Auto-fix `rename_invoke_arg_key`: renomeia `x:Key` SOMENTE no bloco
      `<ui:InvokeWorkflowFile>` que aponta para o callee identificado
      (via `WorkflowFileName` basename + opcional `IdRef` para disambiguar
      múltiplas chamadas ao mesmo callee no mesmo caller).

      Threshold default 0.5 (Jaccard). Ajustável via params. Casos ambíguos
      (≥2 candidatos com mesmo score) NÃO disparam fix — só report.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.transaction_item
        function: detect_a19c_caller_arg_misnamed
        similarity_threshold: 0.5
    fix:
      apply_class: deterministic
      # Heuristic-emitted mechanical (rename_invoke_arg_key). Defesas:
      # consumed_candidates tracking (cada callee prop só é alvo de 1 caller
      # key) + single_unmatched fallback (multi-unmatched = mismatch
      # estrutural, abortado). Post-fix XAML+VB+duplicate-key gate.
      prose: |
        Auto-fix mecânico via `rename_invoke_arg_key`: renomeia x:Key no
        bloco InvokeWorkflowFile que aponta ao callee. Limitado a casos
        com candidato único de alta similaridade.

# ---- S — Sintaxe (estilo) ----

  - id: S-4
    severity: WARN
    category: architectural
    target: all
    title: "Acrônimos UPPERCASE em identificadores"
    description: |
      Acrônimos uppercase sempre. Compostos preservam:
      `ValidarXML.xaml`, `in_StURLBase`, `vDTabRPAUsuarios`.

      Auto-fix mecânico per-finding: rename `vDtXmlData` → `vDtXMLData`.
      - Variables (`<Variable Name="...">`): rename via `rename_attribute`
        (whole-word VB case-insensitive, skip element tags).
      - Arguments (`<x:Property Name="...">`): rename via `rename_argument`
        (callee declaração + body refs + cascade cross-file InvokeWorkflowFile
        x:Key + this:Class.arg PropertyElement).
      Defesas: VB orphan gate + XML well-formed gate + fixpoint loop. Falhas
      rolam back para review manual.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.naming
        function: detect_s4_acronyms
        acronyms:
          - XML
          - RPA
          - DB2
          - XSD
          - API
          - URL
          - HTTP
          - HTTPS
          - JSON
          - CSV
          - SQL
          - UI
          - CPF
          - CNPJ
          - HTML
    fix:
      apply_class: deterministic
      # Detector emite mechanical per-finding com type=rename_argument (args)
      # ou rename_attribute (vars). Cascade callers tratado por rename_argument.
      # VB orphan/XML gates rolam back se rename quebra refs.
      prose: |
        Renomear identificador para versão com acrônimo UPPERCASE
        (ex: `vDtXmlData` → `vDtXMLData`). Args cascade callers automaticamente.

  - id: S-5
    severity: WARN
    category: architectural
    target: all
    title: "Sem annotations em XAML (DisplayName + nomes claros)"
    description: |
      Código deve ser auto-explicativo via `DisplayName` descritivo +
      nomes de variáveis claros. `sap2010:Annotation.AnnotationText`
      só quando absolutamente imprescindível. Exceção: workflows
      REFramework original (Main, Process, etc.).
    applies_to:
      include: ["**/*.xaml"]
      exclude: ["Main.xaml", "Framework/Process.xaml", "Framework/InitAllApplications.xaml", "Framework/InitAllSettings.xaml", "Framework/SetTransactionStatus.xaml", "Framework/CloseAllApplications.xaml", "Framework/GetTransactionData.xaml", "Framework/KillAllProcesses.xaml"]
    detect:
      type: regex
      pattern: 'sap2010:Annotation\.AnnotationText'
    fix:
      apply_class: deterministic
      mechanical:
        type: strip_annotation_text
        params: {}

  - id: S-5b
    severity: ERROR
    category: breaking
    target: windows
    title: "Annotation [PostMigration Action Required] do Activity Migrator"
    description: |
      Activity Migrator injeta `sap2010:Annotation.AnnotationText` começando
      com `[PostMigration Action Required]` em TryCatch (e outras activities)
      ao migrar Legacy→Windows, sinalizando ações manuais pós-migração.

      Esses markers DEVEM ser removidos após o desenvolvedor revisar e tratar
      o ponto. Permanecer no XAML = item pendente esquecido.

      Diferente da S-5 (annotations gerais — exclui REFramework template),
      S-5b ataca SOMENTE markers do Migrator em QUALQUER arquivo (sem exclude
      REFramework — Migrator injeta nele justamente).
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: regex
      pattern: 'sap2010:Annotation\.AnnotationText="\[PostMigration Action Required\]'
    fix:
      apply_class: deterministic
      mechanical:
        type: strip_annotation_text
        params:
          text_prefix: "[PostMigration Action Required]"
      prose: |
        Revisar o conteúdo do annotation, aplicar refactor necessário (ex:
        migrar Classic exception → Modern), depois remover o annotation.
        Fixer mecânico remove o atributo XAML. Se a recomendação do Migrator
        não se aplica (ex: chain credentials Sicoob A-3), também remover —
        annotation é ferramenta de revisão, não comentário permanente.

  - id: S-6
    severity: WARN
    category: architectural
    target: all
    title: "x:Class igual filename sem extensão"
    description: |
      `Login.xaml` deve ter `x:Class="Login"`. Studio permite divergência
      mas causa confusão. Exceção: workflows REFramework padrão.

      ATENÇÃO ao aplicar fix manual: rename de x:Class TEM efeitos colaterais
      que quebram compile no Studio ("Cannot set unknown member"):
        1. Mesmo arquivo: blocos `<this:OldClass.argName>...</this:OldClass.argName>`
           (PropertyElement default-values, preferidos por W-3) usam `this:`
           prefix bound ao próprio x:Class. Renomear x:Class sem propagar
           → Studio falha ao abrir.
        2. Callers: raramente referenciam `<this:OldClass.*` ou
           `x:Key="OldClass.argName"` em InvokeWorkflowFile. Quando ocorre,
           também precisa propagação cross-project.
      O fixer mecânico `rename_xclass` cobre ambos pontos automaticamente.
    applies_to:
      include: ["**/*.xaml"]
      exclude: ["Framework/**", "Main.xaml"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.naming
        function: detect_s6_xclass_filename
    fix:
      mechanical:
        type: rename_xclass
      prose: |
        Trocar `x:Class="OldName"` para `x:Class="<filename sem .xaml>"` e
        propagar para todos `this:OldName.` no arquivo + callers cross-project.

  - id: S-7
    severity: INFO
    category: architectural
    target: all
    title: "InvokeCode omite Language (default VB.NET)"
    description: |
      Padrão do projeto é VB.NET via default. Omitir é preferível a
      `Language="VisualBasic"`. Se presente com valor diferente de
      `VisualBasic` ou `CSharp`, é erro.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: regex
      pattern: '<ui:InvokeCode[^>]*Language="(?!VisualBasic|CSharp)[^"]*"'
    fix:
      apply_class: deterministic
      mechanical:
        type: regex_replace
        pattern: '(<ui:InvokeCode\b[^>]*?)\s+Language="(?!VisualBasic|CSharp)[^"]*"'
        replacement: '\1'
      prose: |
        Remover atributo `Language="..."` inválido — InvokeCode default é VB.NET.
    examples:
      bad: '<ui:InvokeCode Language="Python" />'
      good: '<ui:InvokeCode />'

  - id: S-8
    severity: WARN
    category: architectural
    target: all
    title: "InvokeWorkflowFile DisplayName = nome do workflow apenas"
    description: |
      Studio gera por default `DisplayName="Path\To\Workflow.xaml - Invoke
      Workflow File"` (verboso). Renomear para apenas o nome do arquivo
      sem extensão e sem path: `DisplayName="Workflow"`.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: regex
      pattern: '<ui:InvokeWorkflowFile\b[^>]*DisplayName="[^"]*\.xaml\s*-\s*Invoke Workflow File"'
    fix:
      mechanical:
        type: regex_replace
        pattern: 'DisplayName="(?:[^"\\/]*[\\/])*([^"\\/]+)\.xaml\s*-\s*Invoke Workflow File"'
        replacement: 'DisplayName="\1"'
      prose: |
        Renomear DisplayName para apenas o nome do workflow (sem path,
        sem extensão, sem " - Invoke Workflow File").

  - id: S-9
    severity: WARN
    category: architectural
    target: all
    title: "Identificadores em PT-BR (não inglês)"
    description: |
      Variáveis e arguments em PT-BR. Listas de palavras EN proibidas e
      exceções declaradas em params (REFramework standard ignorado).
    applies_to:
      include: ["**/*.xaml"]
      exclude: ["Framework/**"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.naming
        function: detect_s9_pt_br
        forbidden:
          - User
          - Password
          - File
          - Open
          - Close
          - Get
          - Set
          - Path
          - Data
          - Source
          - Target
          - Value
          - Result
          - List
          - Array
          - Number
          - Count
          - Size
          - Length
          - Empty
          - Null
          - Save
          - Load
          - Read
          - Write
          - Send
          - Receive
          - Start
          - End
          - Begin
          - Finish
          - Stop
          - Run
          - Execute
          - Action
          - Method
          - Function
        exceptions:
          - TransactionItem
          - TransactionNumber
          - Config
          - Item
          - Row
          - Element
          - FileInfo
          - DirectoryInfo
          - Process

  - id: S-10
    severity: ERROR
    category: breaking
    target: all
    title: "LogMessage como filho direto de parent restritivo quebra compile no Studio"
    description: |
      `<ui:LogMessage>` NÃO pode ser filho direto de:
        - `ActivityFunc` / `ActivityAction` (aceita 1 handler)
        - Qualified-property elements: `<*.Then>`, `<*.Else>`, `<*.ActivityBody>`,
          `<*.Condition>`, `<*.Handler>`, `<*.Argument>`, `<*.Default>`
          (aceitam 1 child)
        - `<scg:List x:TypeArguments="ui:AssignOperation">` (collection tipada
          — só AssignOperation entra)
        - `<scg:Dictionary>` (só entradas chave-valor)

      Studio falha em compile-time com mensagens como "Then property has already
      been set on If", "Handler property has already been set on ActivityFunc",
      "Add value to collection of type 'List(AssignOperation)' threw an exception".

      Causa histórica (2026-04-30): agente uipath-creator aplicou N-5 (Trace log)
      sem checar contexto do parent, injetando `<ui:LogMessage Level="Trace"
      Message="Iniciando: ui:X" />` em qualquer lugar antes da activity-alvo.
      101 inserções inválidas em 1 projeto.

      Para satisfazer N-5 dentro desses parents: envolver o conteúdo em
      `<Sequence>` e mover a LogMessage pra dentro do Sequence.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.logs
        function: detect_s10_logmessage_in_restrictive_parent
    fix:
      prose: |
        Remover a LogMessage OU envolver o filho atual + a LogMessage em
        `<Sequence>...</Sequence>` (Sequence aceita N filhos). Não há fix
        mecânico seguro — decisão depende da intenção do log.

  - id: S-11
    severity: ERROR
    category: breaking
    target: all
    title: "xmlns prefix usa assembly não declarado em project.json (activities unresolved)"
    description: |
      `xmlns:<prefix>="clr-namespace:<NS>;assembly=<Assembly>"` referencia
      assembly que NÃO está em `project.json::dependencies`. Studio mostra
      activities como "unresolved" e falha compile/run.

      Causa histórica (2026-04-30): agente uipath-creator inseriu
      `<uta:VerifyExpression>` em TestCases (39 ocorrências em 14 arquivos),
      mas convenção Sicoob (REF importar-cadastro-avais-fiancas-honrados-performer)
      é TestCase só executar `<ui:InvokeWorkflowFile>` do workflow-alvo —
      sem dependência de `UiPath.Testing.Activities`.

      Whitelist: assemblies sempre disponíveis no runtime UiPath
      (System.Private.CoreLib, mscorlib, System.Data.Common, e a própria
      `UiPath.System.Activities`/`UiPath.Core.Activities`/sub-pacotes do
      core já incluídos via `UiPath.System.Activities`). Nesses casos não
      flag.

      Correções possíveis:
        (a) declarar dependência em `project.json` com versão compatível;
        (b) remover activities + xmlns órfão (preferido se inserção indevida).
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.testing
        function: detect_s11_xmlns_assembly_missing
        whitelist_assemblies:
          - System.Private.CoreLib
          - mscorlib
          - System
          - System.Data
          - System.Data.Common
          - System.Xml.Linq
          - System.Linq
          - PresentationCore
          - PresentationFramework
          - WindowsBase
          - UiPath.System.Activities
          - UiPath.Core.Activities
          - UiPath.UIAutomation.Activities
          # Transitivos comuns vindos do core UiPath (não precisam em project.json)
          - Newtonsoft.Json
          - Microsoft.VisualBasic
          - System.Activities
        # Se assembly tem mesmo prefixo de um package declarado, ignora
        # (ex.: UiPathTeam.SharePoint subset de UiPathTeam.SharePoint.Activities)
        accept_subset_of_declared: true
        # prefixes irrelevantes (sem assembly=)
        skip_prefixes:
          - this
          - x
          - mc
          - sap
          - sap2010
          - scg
          - sco
          - ss
          - s
          - ui
          - uix
    fix:
      apply_class: deterministic
      # Detector enriquece mechanical per-finding: se assembly tem pin em
      # D-1*, mechanical=add_package (auto-add em project.json com versão
      # pinada). Se não há pin, mechanical=None (cai como no-fix, alertado
      # via prose).
      prose: |
        Resolução automática (quando assembly tem pin em D-1*):
        adicionar package em project.json com versão pinada do batch
        D — Dependências.

        Manual (quando assembly não está em D-1*): decidir entre
        (a) adicionar package + criar D-1* pin OU
        (b) remover activities + xmlns:<prefix>.

  - id: S-13
    severity: ERROR
    category: breaking
    target: all
    title: "Tag XML com nome local em lowercase (provável corrupção por rename fixer)"
    description: |
      Activities XAML têm tag local em PascalCase (`<ui:LogMessage>`,
      `<ui:ShouldStop>`). Tag começando com lowercase indica corrupção:
      whole-word rename de variável/argumento pegou também o nome do
      element XML.

      Causa histórica (2026-04-30): fixer `rename_attribute`/`rename_argument`
      usava `re.sub(r'\\b<from>\\b', to, content)` sem excluir nomes de
      element. Variável `ShouldStop` renomeada → `vBlShouldStop` corrompeu
      `<ui:ShouldStop>` em `<ui:vBlShouldStop>`. Studio: activity unresolved
      e cascade unresolved no resto do arquivo.

      Whitelist de prefixos próprios do XAML (qualified-property children:
      ex. `<If.Then>`, `<ui:RetryScope.ActivityBody>`) já tem ponto, não
      lowercase isolado.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: regex_with_context
      params:
        pattern: '<[A-Za-z_][\w\-]*:[a-z][\w]*\b'
        message_suffix: "Element name começando com lowercase — provável corrupção por rename fixer."
    fix:
      prose: |
        Identificar nome correto da activity e renomear tag manualmente.
        Casos comuns: `<ui:vBlX>` → `<ui:ShouldStop>` ou similar.

  - id: S-12
    severity: ERROR
    category: breaking
    target: all
    title: "Activity genérica sem bind placeholders nullable (Studio reporta unresolved)"
    description: |
      Activities genéricas (`<TResult>`) precisam de declaração explícita de
      todos os bind arguments mesmo quando nullable, senão Studio falha
      ao inferir tipo e mostra activity como unresolved.

      Caso conhecido — `<ui:DeserializeJson x:TypeArguments="...">`:
        - Designer-generated: `JsonSample="{x:Null}" Settings="{x:Null}"`
        - Agente-generated (incompleto): faltam ambos → unresolved.

      Causa histórica (2026-04-30): agente uipath-creator gerou DeserializeJson
      manualmente em 7 arquivos sem bind placeholders. Regra cobre
      `ui:DeserializeJson` por enquanto; expandir conforme outros casos
      surgirem (`ui:DeserializeXml`, etc.).
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: regex_with_context
      params:
        pattern: '<ui:DeserializeJson\b(?:(?!JsonSample=)[^>])*?/?>'
        # match DeserializeJson sem JsonSample (Settings é menos crítico mas também)
    fix:
      mechanical:
        type: set_attribute
        tag: ui:DeserializeJson
        attribute: JsonSample
        value: "{x:Null}"
      # 2026-05-01: anterior tentou adicionar tb `Settings="{x:Null}"` —
      # UiPath rejeita ("Cannot set unknown member ... DeserializeJson(JObject)
      # .Settings") em pacote atual. Mantemos só `JsonSample`. Estrutural
      # via `set_attribute` (idempotente, suporta self-close, validado por
      # post-fix XAML parse gate em `safety.apply_with_gate`).
      prose: |
        Adicionar `JsonSample="{x:Null}"` no opening tag de `<ui:DeserializeJson>`.
        NÃO adicionar `Settings="{x:Null}"` (rejeitado pelo compilador).
        Padrão seguro:
          <ui:DeserializeJson x:TypeArguments="njl:JObject"
            JsonSample="{x:Null}"
            DisplayName="..." JsonObject="..." JsonString="..." />

  - id: S-15
    severity: WARN
    category: architectural
    target: all
    title: "<Sequence> vazio fora de parent required — remover"
    description: |
      `<Sequence>` sem children (self-close ou whitespace-only) é dead structure
      EXCETO quando parent é property element que requer 1 child activity:
      If.Then/Else, While.Body, ForEach.Body, TryCatch.Try, ActivityAction,
      ActivityFunc, RetryScope.ActivityBody, etc.

      Detector identifica parent via stack-scan e PULA quando required. Auto-fix
      aplicado SÓ em escopos seguros (ex: empty Sequence dentro de outra
      Sequence — dead nested code).
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.empty_sequence
        function: detect_empty_sequence
    fix:
      apply_class: deterministic
      # Detector emite mechanical regex_replace per-finding com pattern escaped
      # do tag text exato. Idempotente. Parent-guard skipa Required parents.
      prose: |
        Remover `<Sequence>` vazio quando parent não exige child activity.
        Detector escolhe automaticamente.

  - id: S-16
    severity: WARN
    category: architectural
    target: all
    title: "<ui:CommentOut> — dead code, remover bloco inteiro"
    description: |
      `<ui:CommentOut>` é dead code: lógica que ficou desligada como debug ou
      "talvez precise depois". Polui leitura, esconde bloat, não executa nada.
      Política Sicoob: remover. Histórico fica em git.

      Auto-fix remove `<ui:CommentOut ...>...</ui:CommentOut>` inteiro,
      incluindo `<ui:CommentOut.Body>` e Sequence/atividades aninhadas dentro.
      Self-closing `<ui:CommentOut .../>` também coberto.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: regex
      pattern: '<ui:CommentOut\b(?:[^>]*?/>|[^>]*>[\s\S]*?</ui:CommentOut>)'
    fix:
      apply_class: deterministic
      mechanical:
        type: regex_replace
        pattern: '<ui:CommentOut\b(?:[^>]*?/>|[^>]*>[\s\S]*?</ui:CommentOut>)\s*'
        replacement: ''
      prose: |
        Deletar `<ui:CommentOut>...</ui:CommentOut>` (incluindo `.Body` e
        children). Se precisar reativar, recuperar via `git log`.
    examples:
      bad: |
        <ui:CommentOut DisplayName="Comment Out">
          <ui:CommentOut.Body>
            <Sequence><ui:LogMessage Message="velho" /></Sequence>
          </ui:CommentOut.Body>
        </ui:CommentOut>
      good: ""

  - id: S-14
    severity: WARN
    category: architectural
    target: all
    title: "<Sequence.Variables> vazio — remover container"
    description: |
      `<Sequence.Variables>` vazio (sem `<Variable>` declarations dentro) é
      ruído — Studio aceita Sequence sem Variables block. Comum surgir após
      U-1 deletar todas as vars do escopo. Limpeza puramente cosmética,
      sem efeito semântico.

      NÃO trata `<Sequence>` (corpo de activity) vazio — esse é placeholder
      potencialmente required em parents tipo `<If.Then>`, `<If.Else>`,
      `<While.Body>`, etc. Remoção indevida quebra a parent activity.

      Cobre formas:
        ✗ <Sequence.Variables></Sequence.Variables>  (whitespace-only inside)
        ✗ <Sequence.Variables />                       (self-close)
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: regex
      pattern: '<Sequence\.Variables\b[^>]*?(?:/>|>\s*</Sequence\.Variables>)'
    fix:
      apply_class: deterministic
      mechanical:
        type: delete_empty_element
        tag: Sequence.Variables
      prose: |
        Remover `<Sequence.Variables>` vazio. Studio tolera Sequence sem o
        bloco. Idempotente — no-op se já removido.

  - id: S-17
    severity: ERROR
    category: breaking
    target: all
    title: "XmlComment direct child de <Activity> quebra Studio compiler"
    description: |
      Comments XML como `<!-- ... -->` posicionados como direct child de
      `<Activity>` root (entre open tag e first child element) ABORTAM
      Studio compiler com `Unable to cast object of type 'System.Xml.XmlComment'
      to type 'System.Xml.XmlElement'`. Build da biblioteca falha em
      PREPROCESSING.

      Origem comum: scripts de mass-suppress que injetam reasons cosmeticas
      (VIOLA CLAUDE.md). Tambem ocorre quando dev escreve notas em local
      errado — deveria usar `sap2010:Annotation.AnnotationText` attribute.

      Fix mecanico: remover comment. Caso queira preservar como documentacao,
      mover para `sap2010:Annotation.AnnotationText` no elemento descritivo
      apropriado (Activity, Sequence, etc.).
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.xml_pollution
        function: detect_s17_xml_comment_root
    fix:
      apply_class: deterministic
      mechanical:
        type: remove_xml_comment_root
        params: {}
      prose: |
        Auto-fix `remove_xml_comment_root` apaga TODO `<!--...-->` no espaco
        entre `<Activity ...>` open e primeiro child element. Idempotente.

  - id: S-18
    severity: ERROR
    category: breaking
    target: windows
    title: "ActivityFunc body vazio em .OCREngine/.CVEngine"
    description: |
      Property `.OCREngine` / `.CVEngine` em activities Modern UI (ex:
      `<uix:NApplicationCard.OCREngine>`) recebe `<ActivityFunc>` callback
      que precisa de activity child real (OCR/CV engine activity). Body
      vazio — só `<ActivityFunc.Argument>` com DelegateInArgument
      placeholder — não satisfaz Studio compiler.

      Studio falha compile com:
        `OCR Engine must be set` (NApplicationCard.OCREngine vazio)
        `CV Engine must be set`  (NApplicationCard.CVEngine vazio)

      Causa típica: Activity Migrator pós Legacy→Windows deixa
      placeholder sem plugar OCR engine activity. ActivityFunc tem somente
      bloco Argument, sem activity dentro.

      Fix: inserir activity OCR/CV no body do ActivityFunc. Para Sicoob,
      default é `<p1:UiPathScreenOCR>` do pacote `UiPath.OCR.Activities`
      (pin D-1k = 3.24.0). xmlns canônico:
      `http://schemas.uipath.com/workflow/activities/ocr`.

      Por ser structural (depende de decidir qual engine plugar — pode ser
      `UiPathScreenOCR`, `UiPathDocumentOCR`, `MicrosoftOCR`, etc.), engine
      NÃO aplica fix mecânico. Detector emite alerta + prose; correção
      via subagent `uipath-creator` / dev humano.
    applies_to:
      include: ["**/*.xaml"]
      exclude:
        - "**/.local/**"
        - "**/.tmp/**"
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.empty_activityfunc
        function: detect_empty_ocr_activityfunc
    fix:
      apply_class: structural
      prose: |
        Plug activity OCR/CV no body do ActivityFunc. Default Sicoob:
        ```xml
        <p1:UiPathScreenOCR ApiKey="{x:Null}" Endpoint="{x:Null}" Output="{x:Null}"
          PredictionId="{x:Null}" Text="{x:Null}" UseAccents="{x:Null}"
          UseLocalServer="{x:Null}" ComputeSkewAngle="False" ExtractWords="True"
          Image="[Image]" Language="en" NoopExecution="False" Profile="Screen"
          Scale="1" Timeout="100000" />
        ```
        Adicionar `xmlns:p1="http://schemas.uipath.com/workflow/activities/ocr"`
        no root do XAML se ausente. Confirmar `UiPath.OCR.Activities` em
        `project.json::dependencies` (pin D-1k = 3.24.0).

  - id: S-19
    severity: ERROR
    category: breaking
    target: all
    title: "Production XAML invoca workflow listado em ignoredFiles (publish-breaking)"
    description: |
      `<ui:InvokeWorkflowFile WorkflowFileName="..."/>` em XAML production
      (fora `Tests/`) referencia file que está em
      `project.json::designOptions.processOptions.ignoredFiles`.

      Studio analyzer (uipcli analyze) NÃO detecta esse caso e passa
      "production-ready" — mas Studio Publish gera ERROR:
        ```
        The following invoked workflows are missing: <file>
        Called from: <caller>
        ```

      Causa típica: mock condicional (`in_BlUsarMockSisbrWeb=True`) invocado
      via static reference; mock listado em `ignoredFiles` para reduzir
      tamanho do package. Studio publish valida static reference, ignora
      conditional gating runtime.

      Bug exato confirmado em PRD com `MockSisbrWeb.xaml` —
      `ImportarXmlComRetry.xaml` invoca mock; publish quebra.

      Detector cruza ignoredFiles × WorkflowFileName de cada XAML
      production (exclui `Tests/**`).
    applies_to:
      include: ["**/*.xaml"]
      exclude:
        - "Tests/**"
        - "**/.local/**"
        - "**/.tmp/**"
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.invoke_refs
        function: detect_invoke_ignoredfile_ref
    fix:
      apply_class: structural
      prose: |
        Verificar se file referenciado precisa ser invocado:
        - Caso sim (mock dependency baked into prod): remover de
          `project.json::designOptions.processOptions.ignoredFiles`.
        - Caso não: refatorar caller para não invocar o file static.
        Studio publish revalida — confirmar zero S-19 antes de publicar.

  - id: S-8b
    severity: WARN
    category: architectural
    target: all
    title: "InvokeWorkflowFile DisplayName != basename(WorkflowFileName)"
    description: |
      DisplayName de `<ui:InvokeWorkflowFile>` deve ser o nome do workflow
      sem path nem extensão. Sufixo entre parênteses permitido para
      desambiguar múltiplas invocações no mesmo escopo:
      `DisplayName="Workflow"` ou `DisplayName="Workflow (Cooperativa)"`.
      Studio default verboso (`*.xaml - Invoke Workflow File`) é coberto
      por S-8 — esta regra cobre nomes arbitrários divergentes.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.displayname
        function: detect_s8b_displayname_mismatch
    fix:
      apply_class: deterministic
      # Heuristic-emitted mechanical. Basename derivation canonical.
      prose: |
        Renomear DisplayName para basename(WorkflowFileName) sem extensão.
        Se houver múltiplas invocações do mesmo workflow no mesmo escopo,
        sufixar com contexto entre parênteses.

# ---- N — Naming/Logs/Limites (extraídos da seção Nomenclatura RULES.md) ----

  - id: N-1
    severity: WARN
    category: architectural
    target: all
    title: "Variável usa prefixo v[Tipo][Nome]"
    description: |
      Variáveis `<Variable>` seguem `v[Prefixo][Nome]`. Mapping tipo→prefixo
      em params.type_prefix. Bare-special e REFramework vars em params.
    applies_to:
      include: ["**/*.xaml"]
      exclude: ["Framework/**", "Tests/**"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.naming_prefix
        function: detect_n1_variable_prefix
        type_prefix: &type_prefix
          - {type: SecureString, prefix: SSt}
          - {type: DataTable,    prefix: DTab}
          - {type: DataRow,      prefix: Row}
          - {type: DateTime,     prefix: Dt}
          - {type: Dictionary,   prefix: Dict}
          - {type: JObject,      prefix: JObj}
          - {type: JArray,       prefix: JArr}
          - {type: QueueItem,    prefix: null}
          - {type: UiElement,    prefix: UI}
          - {type: Boolean,      prefix: Bl}
          - {type: Double,       prefix: Dbl}
          - {type: Int32,        prefix: Int}
          - {type: Int64,        prefix: Lng}
          - {type: String,       prefix: St}
          - {type: Object,       prefix: Obj}
        wrong_prefix_map: &wrong_prefix_map
          Bool: Bl
          Boolean: Bl
          DTime: Dt
          DateTime: Dt
          Decimal: Dbl
          Str: St
          String: St
          Integer: Int
          Number: Int
          DT: DTab
          Tab: DTab
          # `Dt` Hungarian-legacy para DataTable (ex.: `dt_Credentials`).
          # Only matched quando expected != Dt (DateTime). Para DateTime
          # type, `vDtNascimento` permanece (Dt é prefix válido lá).
          Dt: DTab
          Dic: Dict
          Dicio: Dict
          Dictio: Dict
          # Array variants. Convenção Sicoob:
          #   - Array nativo `T[]` → `Arr` + prefix(T) (ex.: ArrSt, ArrObj)
          #   - `List<T>`         → `Lst` + prefix(T) (ex.: LstSt, LstObj, LstDict)
          # `Ar` é wrong (deve ser `Arr`). `List`/`Lst` NÃO são wrong — são prefixos
          # válidos para List<T>; engine detecta via _expected_prefix composto.
          Ar: Arr
          # SecureString legado
          SS: SSt
          SecureStr: SSt
          # DataRow legado
          DRow: Row
          DataRow: Row
          # UiElement legado (lowercase i quebrava prefix detection,
          # produzia double-prefix vUIUiElementX em vez de vUIElementX).
          Ui: UI
          UIE: UI
          UIElement: UI
          # Nu = "Numero" — prefixo genérico legado Sicoob para qualquer
          # numérico. Convenção atual: tipo-específico (Int/Lng/Dbl).
          # CamelCase boundary protege `vNumeroX` (Nu seguido de lowercase
          # 'm' = sem strip; `vNuTimeout` Nu seguido de 'T' upper = strip).
          # Mapeamento value usado só em double-stack guard; Int é
          # placeholder — rename real usa expected_prefix do tipo.
          Nu: Int
          Num: Int
          Numero: Int
        bare_special: &bare_special
          - type_substring: QueueItem
            name_in: [TransactionItem, io_TransactionItem, in_TransactionItem, out_TransactionItem]
          # UiElement agora tem prefix oficial `UI` em type_pairs.
          # Detector exige `vUI[Nome]`, `in_UI[Nome]`, etc.
          # Mantemos só `uiApp*` (REFramework global var convention) como bare.
          - type_substring: UiElement
            name_starts_with: [uiApp, in_uiApp, out_uiApp, io_uiApp]
        reframework_main_vars: &reframework_main_vars
          - TransactionNumber
          - RetryNumber
          - Config
          - Credentials
          - in_Credenciais
          - TransactionField1
          - TransactionField2
          - TransactionField3
          - BusinessException
          - SystemException
          - in_BusinessException
          - in_SystemException
          - in_Exception
          - ConsecutiveSystemExceptions
          - TransactionID
          - Reference
          - Progress
          - Item
          - Row
          - Element
          - QueueName
          - in_OrchestratorQueueName
          - in_OrchestratorQueueFolder
          - in_TransactionField1
          - in_TransactionField2
          - in_TransactionField3
    fix:
      apply_class: deterministic
      # 2026-05-01: rename_attribute corrigido — agora case-insensitive (VB-aware)
      # com orphan-detection pós-substituição. Se sobra ref do nome antigo
      # fora de element-name context, fix é abortado (NEEDS_REVIEW). Post-fix
      # XAML parse gate em `safety.apply_with_gate` captura corrupção estrutural.
      prose: |
        Renomear `<Variable Name="...">` declaração + todos os usos:
        `[varname]` em attrs (DataTable=, Result=, StatusCode=, etc.),
        dentro de `<InArgument>`/`<OutArgument>` bodies, `Expression=`,
        e VB literals. Auto-fix mecânico cobre tudo case-insensitive.

  - id: N-2
    severity: WARN
    category: architectural
    target: all
    title: "Argumento usa prefixo (in_|out_|io_)[Tipo][Nome]"
    description: |
      Argumentos `<x:Property>` seguem `(in_|out_|io_)[Prefixo]Nome`. Mapping
      em params.type_prefix (compartilhado com N-1 via YAML anchor).
      Bare permitido em params.bare_arg_names.
    applies_to:
      include: ["**/*.xaml"]
      exclude: ["Framework/**"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.naming_prefix
        function: detect_n2_argument_prefix
        type_prefix: *type_prefix
        wrong_prefix_map: *wrong_prefix_map
        bare_special: *bare_special
        reframework_main_vars: *reframework_main_vars
        bare_arg_names:
          - in_Config
          - out_Config
          - io_Config
          - in_Credenciais
          - in_Credentials
          - in_TransactionItem
          - io_TransactionItem
          - out_TransactionItem
    fix:
      apply_class: deterministic
      # 2026-05-01: Audit dos 13 repos Sicoob: dispatcher↔performer comunicam
      # via Orchestrator queue (BulkAddQueueItems + SpecificContent dict keys),
      # NÃO via cross-repo InvokeWorkflowFile. Zero
      # `WorkflowFileName="..\<outro-repo>\.."`. Scan dentro de project_root
      # é suficiente. Defesas: case-insensitive whole-word + orphan check
      # (callee + caller + this:Class.arg) + post-fix XAML parse gate.
      prose: |
        Renomear argumento + callers:
        1. `<x:Property Name="...">` declaração no callee
        2. `[arg]` em todos usos no body do callee (case-insensitive)
        3. `<ui:InvokeWorkflowFile>` blocks no MESMO project_root:
           - `<ui:Argument x:Key="<old>">` → `<ui:Argument x:Key="<new>">`
        Auto-fix mecânico cobre tudo isso. Caso surja shared-lib repo no
        futuro, adicionar `cross_project_root` opt-in.

  - id: N-3
    severity: INFO
    category: architectural
    target: all
    title: "Workflow cadeia Process com LogMessage usa in_StPrefixoLog"
    description: |
      Workflows na cadeia `Process` (não Framework, não Tests, não *Launch.xaml)
      que tem `<ui:LogMessage>` devem declarar `in_StPrefixoLog: String`
      e prependá-lo nas mensagens. Process inicializa
      `in_TransactionItem.Reference + " - "` e propaga.
    applies_to:
      include: ["**/*.xaml"]
      exclude: ["Framework/**", "Tests/**"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.logs
        function: detect_n3_log_prefixo
        prefixo_arg_name: in_StPrefixoLog
        exclude_paths: &chain_exclude_paths
          - "framework/"
          - "tests/"
          - "/launch.xaml"
          - "launch.xaml"
    fix:
      apply_class: deterministic
      mechanical:
        type: prefix_complex_log_message
        params:
          prefixo_arg: in_StPrefixoLog
      prose: |
        Path 1 (workflow não declara in_StPrefixoLog): fixer
        `add_prefixo_arg` adiciona x:Property + this:<Class>.in_StPrefixoLog
        default value vazio + reescreve LogMessage Messages literais
        `[&quot;X&quot;]` para `[in_StPrefixoLog + &quot;X&quot;]`.
        Callers que não bindam usam default vazio (compile-safe).

        Path 2 (LogMessage não usa prefixo, expr complexa):
        `prefix_complex_log_message` faz wrap `[in_StPrefixoLog & (<expr>)]`
        com guards de tipo (só wrap se expr é String-y: contém literal,
        .ToString, vbLf, etc.).

  - id: N-4
    severity: INFO
    category: architectural
    target: all
    title: "Workflow com > 7 argumentos — agrupar Dictionary/DataTable"
    description: |
      Workflow com mais de 7 argumentos é sinal pra agrupar em
      `Dictionary(String, Object)` ou `DataTable`, ou criar workflow
      intermediário. Threshold default: 7.
    applies_to:
      include: ["**/*.xaml"]
      exclude: ["Framework/**", "Tests/**"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.naming_prefix
        function: detect_n4_arg_count
        threshold: 7

  - id: N-5
    severity: INFO
    category: architectural
    target: all
    title: "Toda activity precisa LogMessage Level=Trace próximo (rastreabilidade total)"
    description: |
      Política Sicoob: rastreabilidade TOTAL — TODA activity executável
      dentro de Process e cadeia abaixo precisa `<ui:LogMessage Level="Trace">`
      em proximidade (±600 chars). Inclui Assign (expor valor de variáveis).
      Throw/Rethrow excluídos — geram log próprio via exception flow.

      Excluídas (control flow / metadata / não-executável):
      Sequence, If, ElseIf, Switch, ForEach, ForEachRow, While, DoWhile,
      Parallel, ParallelForEach, Pick, PickBranch, Flowchart, FlowDecision,
      FlowSwitch, FlowStep, StateMachine, State, Transition, Trigger,
      TryCatch, Catch, Catches, ActivityAction, DelegateInArgument,
      DelegateOutArgument, InArgument, OutArgument, InOutArgument, Variable,
      Property, Members, Literal, Reference, LogMessage (a própria),
      InvokeWorkflowFile (coberto por N-6), MultipleAssign (container —
      AssignOperation individual flag), Persist, Receive, Send, NoPersistScope,
      CompensableActivity.

      Spec original RULES.md A-7 dizia "atividades significativas" — política
      atual mais estrita.
    applies_to:
      include: ["**/*.xaml"]
      exclude: ["Framework/**", "Tests/**", "**/*Launch.xaml"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.logs
        function: detect_n5_trace_log_significant
        exclude_paths: *chain_exclude_paths
        proximity_window: 600
        trace_level: Trace
        include_default_activities:
          - Assign
          - AddDataRow
        exclude_ui_activities:
          - LogMessage
          - InvokeWorkflowFile
          - Comment
          - CommentOut
          - Annotation
          # Control flow / containers (descrição da regra já lista esses;
          # estavam ausentes do enforce — falso positivo histórico)
          - ForEach
          - ForEachRow
          - ForEachFileX
          - Break
          - Continue
          - InterruptibleWhile
          # AssignOperation vive dentro de scg:List<AssignOperation>
          # (parent restritivo — log dentro viola S-10). Cobertura via
          # MultipleAssign pai.
          - AssignOperation
          - FilterOperationArgument
          - Target
          - TargetAnchorable
          - TargetApp
          - VerifyExecutionOptions
    fix:
      # F39 (2026-05): structural → contextual. Engine fixer
      # apply_insert_trace_log (fixers.py:1968) já existia mas estava
      # bloqueado por classification. Fix mecânico cobre:
      #   - Parent restritivo (skip)
      #   - Parent wrap-able (wrap em Sequence)
      #   - Open parent (insert direto)
      #   - Message template com in_StPrefixoLog cross-rule integration
      #   - DisplayName uniqueness (evita ST-MRD-002 / ST-NMG-004)
      # Insertion runs APENAS via `uip --apply-contextual`. F35 per-file
      # analyzer-gate rollback catches Message-quality regressions
      # (N-16 LLM validator, ST-NMG-005).
      apply_class: contextual
      mechanical:
        type: insert_trace_log  # spec injected per-finding by detector
      prose: |
        Inserir `<ui:LogMessage Level="Trace" Message="..."/>` LOGO APÓS
        a activity (até 600 chars depois). Logs ANTES da activity violam
        semântica de rastreabilidade pós-execução — não satisfazem N-5.

        Engine auto-aplica via `uip <project> --apply-contextual`. Fixer
        gera Message template `[in_StPrefixoLog + "Concluído: <DisplayName>"]`
        quando workflow declara `in_StPrefixoLog`, senão `["Concluído: <DisplayName>"]`.
        Message mecânica pode disparar N-16 (LLM traceability validator) —
        F35 analyzer-gate rollback reverte per-file se regressão observada.

        Mensagem ideal CONTEXTUAL, não mecânica:
          ✗ Mecânico (template-like): `"Iniciando: ui:HttpClient"`
          ✗ Mecânico (sem semantica): `"Executando AddDataRow"`
          ✓ Contextual: `"Recuperou " + vIntCount.ToString + " documentos do GED"`
          ✓ Contextual: `"Linha adicionada: " + vDtRow.Item("StPK").ToString`
          ✓ Contextual: `"Token expira em " + vDtExpiracao.ToString("HH:mm")`

        Mensagem contextual depende de INTERPRETAÇÃO do que a activity faz
        em contexto (variáveis, fluxo). É decisão de IA/desenvolvedor.
        Mensagem mecânica = anti-padrão (ver N-9).

        Parent restritivo (ActivityFunc/ActivityAction/`*.Then`/`*.Else`,
        collections tipadas): ver S-10. Inserir LogMessage onde parent
        aceita só 1 child quebra compile no Studio. Solução: envolver em
        Sequence ou aceitar que activity dentro desse parent não tem
        log Trace dedicado.

        ATENÇÃO ao FIXER (cross-rule N-3): N-5 e N-3 são regras
        independentes mas o auto-fix de N-5 pode regredir N-3 se ignorar
        a convenção de prefixo. Antes de inserir Trace:

          1. **Workflow declara `in_StPrefixoLog`?**
             - SIM → mensagem deve usar `[in_StPrefixoLog+"Iniciando: <X>"]`
               para satisfazer N-3 path 3.
             - NÃO + workflow já tem outras LogMessages → workflow já
               viola N-3 path 1 (1 finding total). Inserir Trace sem
               prefixo NÃO piora a contagem (ainda 1 finding). Resolver
               N-3 separadamente.
             - NÃO + workflow tem 0 LogMessages → inserir Trace cria
               novo finding N-3 (de 0 para 1). Decidir:
                 (a) declarar `in_StPrefixoLog` + propagar callers ANTES,
                     mensagem com prefixo → 0 N-3.
                 (b) inserir sem prefixo, aceitar +1 N-3 nesse arquivo,
                     resolver depois em batch.

          2. **Workflow está em `Framework/`/`Tests/`/`Launch.xaml`?**
             N-3 não dispara nesses paths. Inserir sem prefixo é livre.

  - id: N-6
    severity: WARN
    category: architectural
    target: all
    title: "InvokeWorkflowFile com Level=\"Info\" para log entrada/saída"
    description: |
      `<ui:InvokeWorkflowFile>` deve declarar `Level="Info"` (ou
      `Level="[LogLevel.Info]"`) — Robot loga entrada/saída do sub-fluxo
      automaticamente nesse Level via property built-in da activity.

      Padrão observado no projeto modelo `importar-cadastro-avais-fiancas-honrados-performer`:
      32/82 InvokeWorkflowFile têm Level=Info — adoção parcial.
      Política: enforce em todos.

      Auto-fix mecânico: insere `Level="Info"` se ausente; renomeia se valor
      diferente.
    applies_to:
      include: ["**/*.xaml"]
      exclude: ["Tests/**"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.logs
        function: detect_n6_invoke_log_level
        exclude_paths:
          - "tests/"
          - "/launch.xaml"
          - "launch.xaml"
        level_attribute: Level
        canonical_value: Info
        accepted_values:
          - Info
          - "[LogLevel.Info]"
    fix:
      apply_class: deterministic
      # Heuristic-emitted regex_replace adicionando `Level="Info"`. Canonical.
      prose: |
        Adicionar atributo `Level="Info"` em `<ui:InvokeWorkflowFile>`.
        Robot grava entry+exit log automaticamente nesse nível.

  - id: N-7
    severity: WARN
    category: architectural
    target: all
    title: "InvokeWorkflowFile com LogEntry=OnlyInvocation e LogExit=OnlySuccessfulReturn"
    description: |
      `<ui:InvokeWorkflowFile>` deve declarar:
        - `LogEntry="OnlyInvocation"`     — entry log dispara só na invocação
          (não em re-entries de retry/loop interno).
        - `LogExit="OnlySuccessfulReturn"` — exit log dispara só em retorno
          bem-sucedido (exception não loga exit, vai pra catch).

      Política Sicoob (ver Process.xaml `baixar-documentos-cobranca-ajuizada-dispatcher`):
      InvokeWorkflowFile produtivo padroniza ambos os atributos.

      Auto-fix mecânico: insere atributos se ausentes; renomeia se valor
      diferente.
    applies_to:
      include: ["**/*.xaml"]
      exclude: ["Tests/**"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.logs
        function: detect_n7_invoke_log_entry_exit
        exclude_paths:
          - "tests/"
          - "/launch.xaml"
          - "launch.xaml"
        expected_attributes:
          LogEntry: OnlyInvocation
          LogExit: OnlySuccessfulReturn
    fix:
      apply_class: deterministic
      # Heuristic-emitted regex_replace adicionando attrs canonical.
      prose: |
        Adicionar `LogEntry="OnlyInvocation"` e `LogExit="OnlySuccessfulReturn"`
        em `<ui:InvokeWorkflowFile>`. Robot grava entry/exit log com semântica
        explícita: entry = só invocação, exit = só retorno bem-sucedido.

  - id: V-1
    severity: WARN
    category: architectural
    target: all
    title: "Value-type com Default=[Nothing] / {x:Null} (intent ambígua)"
    description: |
      Variable/Property de value-type (struct) com `Default="[Nothing]"` ou
      `Default="{x:Null}"` compila em VB.NET mas vira `default(T)` implícito:
        - Int32/Int64/Int16/Byte/SByte → `0`
        - Double/Single/Decimal       → `0.0`
        - Boolean                     → `False`
        - DateTime                    → `01/01/0001 00:00:00` (MinValue)
        - TimeSpan                    → `00:00:00`
        - Char                        → `\0`

      Anti-padrão: leitor não distingue valor real `0` de "ausente"; bugs
      sutis em comparações (`If x Is Nothing` em Int32 sempre False após init).

      Decisões corretas:
        ✓ Default explícito (`[0]`, `[False]`, `[DateTime.Now]`, etc.)
        ✓ Tipo Nullable (`x:Nullable(x:Int32)` com `.HasValue` check)
        ✓ Sem Default (deixar Studio default — equivalente a 0/False)
                       — preferível a `[Nothing]` que é ruidoso

      Detecta:
        - `<Variable x:TypeArguments="x:Int32" Default="[Nothing]" .../>`
        - `<Variable x:TypeArguments="x:Boolean" Default="{x:Null}" .../>`
        - `<Variable x:TypeArguments="x:DateTime"><Variable.Default>[Nothing]</Variable.Default></Variable>`

      Não auto-fix mecânico — depende de intent (qual default real?).
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.value_types
        function: detect_v1_nothing_in_value_type
        # extra_value_types: lista opcional pra estender (Guid, etc.)
        extra_value_types: []
    fix:
      prose: |
        Decidir entre:
          (a) Remover Default= do XAML (deixa default(T) implícito mas sem ruído)
          (b) Setar Default explícito (`[0]`, `[False]`, `[DateTime.Now]`, etc.)
          (c) Trocar tipo para Nullable (`x:Nullable(x:Int32)`) e verificar
              `.HasValue` antes de uso

  - id: N-11
    severity: ERROR
    category: breaking
    target: all
    title: "Direção de argumento inválida (canonical: in_/out_/io_)"
    description: |
      Convenção Sicoob: argumento `<x:Property>` SEMPRE com direção:
        - `in_<Nome>`  — entrada
        - `out_<Nome>` — saída
        - `io_<Nome>`  — entrada+saída

      Qualquer outra forma = ERRO. Casos vistos por corrupção/template/typo:
        ✗ `inout_X`, `in_out_X` (canonical é `io_`)
        ✗ `IN_X`, `OUT_X`, `IO_X` (caps errado)
        ✗ `In_X`, `Out_X`, `Io_X` (PascalCase errado)
        ✗ `inOut_X`, `InOut_X`, `Inout_X`

      Bare-args permitidos (sem direction): `Config`, `TransactionItem` e
      similares declarados em `params.bare_arg_names` / `bare_special`.

      Diferença N-2 vs N-11:
        - N-11 (ERROR/breaking): direção em si está errada — independente de tipo.
        - N-2 (WARN/architectural): direção OK, mas prefix de tipo errado/ausente.

      Auto-fix: rename_argument com cascade nos callers (basename match
      em `WorkflowFileName`).
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.naming_prefix
        function: detect_n11_argument_direction
        bare_special: *bare_special
        reframework_main_vars: *reframework_main_vars
        bare_arg_names:
          - in_Config
          - out_Config
          - io_Config
          - in_Credenciais
          - in_Credentials
          - in_TransactionItem
          - io_TransactionItem
          - out_TransactionItem
          - Config
          - TransactionItem
          - Credentials
    fix:
      apply_class: deterministic
      # 2026-05-01: Mesmo audit que N-2: zero invokes cross-repo nos 13 repos
      # Sicoob. Case-insensitive + orphan check + post-fix gate cobrem
      # dentro do project_root.
      prose: |
        Renomear pra forma canonical (`in_/out_/io_` + Nome canonical capitalizado).
        Auto-fix infere direção a partir do tipo (InArgument→in,
        OutArgument→out, InOutArgument→io) + atualiza callers no
        project_root via `WorkflowFileName` matching.

  - id: N-12
    severity: WARN
    category: architectural
    target: all
    title: "LogMessage em cadeia Process deve ter Level=\"Trace\""
    description: |
      Política Sicoob: rastreabilidade total via Trace. TODO `<ui:LogMessage>`
      em workflows da cadeia Process (e abaixo) deve declarar `Level="Trace"`.

      Esta rule cobre LogMessages JÁ EXISTENTES — apenas seta/replace o
      attribute Level para "Trace". NÃO insere logs novos (cobertura disso
      em N-5, contextual).

      Excluídos do escopo: Framework/** (REFramework templates têm logs
      Info próprios), Tests/** (test runners), *Launch.xaml, Main.xaml
      (top-level transaction logs Info legítimos).
    applies_to:
      include: ["**/*.xaml"]
      exclude:
        - "Framework/**"
        - "Tests/**"
        - "**/*Launch.xaml"
        - "**/Main.xaml"
    detect:
      type: regex_with_context
      params:
        pattern: '<ui:LogMessage\b(?:(?!\bLevel="Trace")[^>])*?/?>'
        message_suffix: 'LogMessage sem Level="Trace" — promover.'
    fix:
      apply_class: deterministic
      mechanical:
        type: force_attribute
        tag: ui:LogMessage
        attribute: Level
        value: Trace
      prose: |
        Adicionar/forçar `Level="Trace"` em `<ui:LogMessage>`. Idempotente:
        se já é Trace, no-op; se ausente, adiciona; se outro valor, substitui.

  - id: N-10
    severity: WARN
    category: architectural
    target: all
    title: "LogMessage antecipatório (sem activity executável imediatamente antes)"
    description: |
      Padrão Sicoob: `Activity → Log → Activity → Log → ...`. Log
      POSICIONALMENTE documenta a activity que VEIO antes (rastreabilidade
      pós-execução). LogMessage cujo sibling-element anterior NÃO é
      activity executável é antecipatório (descreve intenção, não fato).

      Casos detectados:
        ✗ Sequence começa com LogMessage (sem activity precedendo)
        ✗ Dois LogMessage seguidos sem activity entre eles
        ✗ Log → Activity (intenção) — activity tem que vir ANTES do log
          que a documenta

      Sibling não-executável que NÃO conta como "predecessor válido":
      LogMessage, Comment, qualified-property elements, control flow
      containers (If/Switch/ForEach), TryCatch, ActivityAction, etc.
      Lista completa em heuristic.

      Mensagem deve ser CONTEXTUAL (ver N-9). Ordering correto NÃO basta —
      mensagem antecipatória ("Iniciando download...") em posição
      formalmente correta ainda viola filosofia da regra. N-10 + N-9
      cobrem ambos eixos (posição + conteúdo).
    applies_to:
      include: ["**/*.xaml"]
      exclude: ["Framework/**", "Tests/**"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.logs
        function: detect_n10_log_anticipatory
        exclude_paths: *chain_exclude_paths
    fix:
      apply_class: structural
      prose: |
        Reposicionar log para LOGO DEPOIS da activity que ele documenta.
        Se for primeiro elemento do Sequence sem activity precedente:
        provavelmente log antecipatório de inserção indevida — REMOVER
        (a activity seguinte tem seu próprio log APÓS).

        Auto-fix `remove_anticipatory_log` aplica a estratégia de remoção
        quando confirmado que é primeiro filho ou que precede outro log.
        Cuidado: remoção pode amplificar N-5 (cobertura perdida); fixpoint
        loop com N-5 fixer re-insere Trace contextual no próximo iter.

  - id: N-9
    severity: WARN
    category: architectural
    target: all
    title: "LogMessage com mensagem mecânica/template (sem contexto)"
    description: |
      Mensagem de `<ui:LogMessage>` deve ser CONTEXTUAL — descrever O QUE
      aconteceu de relevante usando variáveis/valores reais. Mensagens
      template como "Iniciando: ui:X" não agregam informação de
      rastreabilidade real e são sinal de log gerado sem interpretação
      (provável agente/script).

      Padrões mecânicos detectados:
        - `Iniciando: ui:<ActivityName>` (case insensitive)
        - `Executando ui:<ActivityName>`
        - `Started <ui:|ActivityName>`
        - `Iniciando: <BareActivityName>` (sem `ui:`)
        - Static strings sem interpolação de variáveis (vague)
        - Verbos de intenção em vez de fato: "Vai buscar", "Começando"

      Anti-padrão historicamente gerado por agente uipath-creator
      interpretando N-5 prose. Causa colateral: ver S-10 (LogMessage em
      parent restritivo) e N-5 ordering (logs ANTES viola N-5).

      ─────────────────────────────────────────────────────────────────
      INSTRUÇÕES PARA LLM/AGENTE — como gerar Message contextual:
      ─────────────────────────────────────────────────────────────────

      Pattern obrigatório (quando workflow é da cadeia Process):
        `[in_StPrefixoLog + "<DESCRIÇÃO_FATO> " + <VARIÁVEL>.ToString]`

      Se workflow não declara `in_StPrefixoLog` (raro pós-N-3 fixer):
        `["<DESCRIÇÃO_FATO> " + <VARIÁVEL>.ToString]`

      Decisão tree para construir DESCRIÇÃO_FATO:

      1. **Activity é Assign / MultipleAssign** (atribuição)?
         → Logar variável atribuída + valor:
           `[in_StPrefixoLog + "vEndpoint resolvido: " + vEndpoint]`
           `[in_StPrefixoLog + "Inicializou vIntRetry com " + vIntRetry.ToString]`
         → Se valor é SecureString ou sensitive: NÃO logar valor; só nome:
           `[in_StPrefixoLog + "Token recuperado em vSecPassword"]`

      2. **Activity é HttpClient / OrchestratorHttpRequest** (HTTP)?
         → Logar endpoint + status + size:
           `[in_StPrefixoLog + "GET " + vStEndpoint + " status=" + vIntStatus.ToString + " bytes=" + vStResponse.Length.ToString]`

      3. **Activity é ExecuteQuery / DBCommand** (database)?
         → Logar query identifier + row count + timing:
           `[in_StPrefixoLog + "Query consulta_dossies retornou " + vDtRows.Rows.Count.ToString + " rows"]`

      4. **Activity é DeserializeJson / ParseXml**?
         → Logar token raiz + count de elementos top-level:
           `[in_StPrefixoLog + "Deserializou JSON com " + vJObj.Count.ToString + " keys top-level"]`

      5. **Activity é RetryScope / While / DoWhile**?
         → Logar tentativas + condição saída:
           `[in_StPrefixoLog + "RetryScope concluído após " + vIntAttempts.ToString + " tentativas"]`

      6. **Activity é GetCredential / GetRobotAsset**?
         → Logar identifier do asset (NUNCA o valor):
           `[in_StPrefixoLog + "Asset 'API_GED_Token' recuperado"]`

      7. **Activity é InvokeCode (VB body)**?
         → Logar resultado/output do code, não a invocação:
           `[in_StPrefixoLog + "Validação de placeholders: " + vStExcecao]`

      8. **Activity é CheckTrue / Throw / If branch entry**?
         → Logar condição avaliada + decisão:
           `[in_StPrefixoLog + "Não há restrição: prosseguindo"]`
           `[in_StPrefixoLog + "Token expirado (vDtExpira=" + vDtExpira.ToString("HH:mm") + "), renovando"]`

      9. **Activity sem informação útil pós-execução**?
         → REMOVER LogMessage. Log que não agrega = ruído.

      Regras invariantes para a mensagem:
        - SEMPRE referenciar pelo menos 1 variável de scope com `.ToString`.
        - NUNCA começar com verbo de intenção ("Iniciando", "Vai", "Será").
        - SEMPRE descrever fato pós-execução ("Recuperou", "Concluiu",
          "Status=N", "Encontrou X items"). Tempo verbal: passado/presente
          do indicativo de RESULTADO.
        - Se o valor é PII/secret/SecureString: logar identificador, NUNCA
          o conteúdo. Ex: `"Senha recuperada de vault 'XYZ'"`, não a senha.
        - Tamanho útil: ≤ 200 chars decoded. Logs longos viram ilegíveis em
          Orchestrator.

      Exemplos de transformação mecânico → contextual:

        ✗ "Iniciando: ui:HttpClient"
        ✓ "[in_StPrefixoLog + &quot;GET &quot; + vStEndpoint + &quot; status=&quot; + vIntStatusCode.ToString]"

        ✗ "Executando AddDataRow"
        ✓ "[in_StPrefixoLog + &quot;Linha adicionada: PK=&quot; + vDtRow.Item(&quot;StPK&quot;).ToString]"

        ✗ "Concluído: Assign"
        ✓ "[in_StPrefixoLog + &quot;vIntCount inicializado em &quot; + vIntCount.ToString]"

        ✗ "Sucesso"
        ✓ "[in_StPrefixoLog + &quot;Dossiê &quot; + vStIdDossie + &quot; vinculado em &quot; + vDtTime.ToString(&quot;HH:mm:ss&quot;)]"

      Quando o LLM não consegue identificar variável relevante na cena
      (activity isolada, sem contexto significativo): REMOVER o
      LogMessage em vez de gerar fluff.
    applies_to:
      include: ["**/*.xaml"]
      exclude: ["Framework/**", "Tests/**"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.logs
        function: detect_n9_log_message_mechanical
        exclude_paths: *chain_exclude_paths
    fix:
      prose: |
        Substituir mensagem template por descrição usando variáveis do
        escopo. Sem auto-fix mecânico — interpretação contextual ESTRITA
        seguindo decisão tree na description.

        LLM/agente: aplicar pattern por activity-type:
          1. Identificar tipo da activity (Assign, HttpClient, etc.)
          2. Identificar variáveis no scope que carregam VALOR semântico
             após execução (count, status, identifier, valor recém-atribuído)
          3. Construir Message: `[in_StPrefixoLog + "<fato> " + <var>.ToString]`
          4. Se nenhuma var carrega valor útil: REMOVER LogMessage.

        Tempo verbal obrigatório: passado/resultado ("Recuperou", "Status=",
        "Encontrou"). Verbos de intenção ("Iniciando", "Vai") rejeitam.
        SecureString/PII: nunca logar conteúdo, só identificador.

  - id: N-8
    severity: WARN
    category: architectural
    target: all
    title: "Nome de variável/argumento ≤ 30 caracteres"
    description: |
      Nome de `<Variable>` e `<x:Property>` deve ter no máximo 30 caracteres.
      Limite de legibilidade — nomes longos viram ruído em expressões VB,
      DisplayName de Assigns, e Arguments de InvokeWorkflowFile. Se o nome
      precisa descrever muita coisa, sinal de agrupar em Dictionary/DataTable
      (relaciona com N-4).

      Threshold default: 30. Configurável em params.threshold.

      Sem auto-fix mecânico: rename cruza expressões `[v...]`, Assigns,
      InvokeWorkflowFile Arguments e workflows chamadores — risco de quebrar
      referências cross-file. Manual.
    applies_to:
      include: ["**/*.xaml"]
      exclude: ["Framework/**", "Tests/**"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.naming_prefix
        function: detect_n8_name_length
        threshold: 30
    fix:
      prose: |
        Renomear variável/argumento para ≤ 30 caracteres. Atualizar TODAS
        as referências: expressões VB, Assigns, InvokeWorkflowFile Arguments,
        e workflows chamadores. Considerar agrupar em Dictionary/DataTable
        se nome longo indicar excesso de contexto no identificador.

# ============================================================
# Batch 3 — Testing + Agent + Dependencies
# ============================================================

# ---- P — PDD ----

  - id: P-1
    severity: ERROR
    category: agent_behavior
    target: all
    title: "Seguir o PDD exatamente"
    description: |
      PDD é contrato funcional. Implementar a abordagem especificada.
      Desvios funcionais exigem alinhamento com analista de negócio.
    detect:
      type: agent_only

  - id: P-2
    severity: ERROR
    category: agent_behavior
    target: all
    title: "PDD descreve leitura E processamento implica Dispatcher + Performer"
    description: |
      Recomendar split Dispatcher (lê fonte, enfileira) + Performer
      (consome fila, processa) quando PDD descreve ambos.
    detect:
      type: agent_only

  - id: P-3
    severity: WARN
    category: agent_behavior
    target: all
    title: "Melhorias técnicas OK; mudanças funcionais NÃO"
    description: |
      Refatoração técnica preserva contrato funcional. Mudança em comportamento
      observável exige aprovação prévia do PDD.
    detect:
      type: agent_only

# ---- I — Inspection (HALT/WARN para agentes inspecionando UI) ----

  - id: I-1
    severity: HALT
    category: agent_behavior
    target: all
    title: "Inspeção de browser é READ-ONLY"
    description: |
      NUNCA digitar em campos, inserir credenciais ou clicar submit
      durante inspeção. Inspeção é descoberta de selectors, não execução.
    detect:
      type: agent_only

  - id: I-2
    severity: HALT
    category: agent_behavior
    target: all
    title: "PARAR em telas de login durante inspeção"
    description: |
      Pedir ao usuário para logar manualmente. Não preencher credenciais.
    detect:
      type: agent_only

  - id: I-3
    severity: HALT
    category: agent_behavior
    target: all
    title: "NUNCA inventar selectors"
    description: |
      Selectors devem vir de inspeção real (Studio UI Explorer ou
      `inspect-ui-tree.ps1`). Inventar = bug em produção.
    detect:
      type: agent_only

  - id: I-4
    severity: WARN
    category: agent_behavior
    target: all
    title: "Inspecionar apps-alvo ANTES de gerar XAML"
    description: |
      Sem inspeção real, selectors são chute. Sempre inspecionar primeiro.
    detect:
      type: agent_only

# ---- T — Testing ----

  - id: T-1
    severity: INFO
    category: testing
    target: all
    title: "Pasta Tests/ no projeto Performer contém test cases"
    description: |
      Sub-estrutura (Unit/Integration/Helpers/Fixtures/Mocks) é
      convenção de projeto — definir no CLAUDE.md do projeto.
    detect:
      type: agent_only

  - id: T-2
    severity: INFO
    category: testing
    target: all
    title: "TC isolado (unit) usa mocks e fixtures"
    description: |
      Não requer sistemas externos; rodável offline.
      Mock helper fica em `Tests/Helpers/`.
    detect:
      type: agent_only

  - id: T-3
    severity: WARN
    category: testing
    target: all
    title: "TC de integração só para validar contratos com sistemas externos"
    description: |
      Credenciais via `GetRobotAsset`/`GetRobotCredential` com assets
      de ambiente de teste, nunca produção. Workflows que escrevem em
      sistema produtivo (APIs, filas externas) sempre mockados, inclusive
      em integração real.
    detect:
      type: agent_only

  - id: T-4
    severity: ERROR
    category: testing
    target: all
    title: "TC InvokeWorkflowFile com x:Key não declarado no callee"
    description: |
      Test case invocando workflow real deve passar exatamente os
      argumentos declarados pelo callee. x:Key extra ou faltando =
      bug de teste.
    applies_to:
      include: ["Tests/**/*.xaml"]
    detect:
      type: cross_file_args
      params:
        direction: caller_extra

  - id: T-5
    severity: ERROR
    category: testing
    target: all
    title: "TC referencia arquivo inexistente"
    description: |
      `WorkflowFileName="Path/To/X.xaml"` deve apontar para arquivo real
      no projeto. Path quebrado = TC não roda.
    applies_to:
      include: ["Tests/**/*.xaml"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.testing
        function: detect_t5_missing_workflow

  - id: T-6
    severity: ERROR
    category: testing
    target: all
    title: "TC sem mock invoca workflow que escreve em sistema externo"
    description: |
      Heurística: presença de `AddQueueItem` ou `SetTransactionStatus`
      real (não em mock helper) em test case = risco de escrita em
      sistema produtivo durante CI/CD.
    applies_to:
      include: ["Tests/**/*.xaml"]
      exclude: ["Tests/Mocks/**", "Tests/Helpers/**"]
    detect:
      type: regex
      pattern: '<ui:(?:AddQueueItem|BulkAddQueueItems|SetTransactionStatus)\b'

  - id: T-7
    severity: ERROR
    category: testing
    target: all
    title: "Asset name hardcoded em TC"
    description: |
      Asset name em TC deve vir de variável de ambiente de teste
      (`vStAssetTeste`, `in_StConfigPath`, etc.), não literal.

      Whitelist arquitetural: bootstrap asset Sicoob
      (`*Configuracao_Performer` / `*Configuracao_Dispatcher`) é obrigatório
      literal — chicken-and-egg pra resolver path do Config.xlsx antes do
      InitAllSettings carregar `in_Config`. Mesmo padrão de Main.xaml
      produção. Detector skipa esse caso.
    applies_to:
      include: ["Tests/**/*.xaml"]
    detect:
      type: regex
      pattern: 'AssetName="(?!\[)(?![^"]*Configuracao_(?:Performer|Dispatcher)")[^"]+"'

# ---- D — Dependencies ----

  - id: D-1a
    severity: ERROR
    category: breaking
    target: windows
    title: "UiPath.System.Activities == [25.4.4]"
    description: |
      Pin EXATO Sicoob: `UiPath.System.Activities` `[25.4.4]`.
      Versões anteriores não corrigem WorkerProcess.exe .NET 6 detection.
      Versões posteriores (latest stable injetado por Activity Migrator)
      podem introduzir APIs exclusivas que quebram quando engine realinha
      ao pin. Drift em qualquer direção (maior OU menor) é violação policy.
    applies_to:
      include: ["project.json"]
    detect:
      type: nuget_version_check
      params:
        package: UiPath.System.Activities
        exact: "25.4.4"
    fix:
      apply_class: deterministic
      mechanical:
        type: set_dependency_pin
        package: UiPath.System.Activities
        version: "[25.4.4]"
      prose: |
        Pinar `dependencies."UiPath.System.Activities" = "[25.4.4]"`.

  - id: D-1b
    severity: ERROR
    category: breaking
    target: windows
    title: "UiPath.UIAutomation.Activities == [25.10.8]"
    description: |
      Pin EXATO Sicoob: `UiPath.UIAutomation.Activities` `[25.10.8]`.
      Versões anteriores não têm fixes Modern activities (Find Elements,
      ScreenPlay). Versões posteriores (ex: 25.10.21 injetado por Activity
      Migrator) trazem APIs exclusivas (RetryScope.LogRetriedExceptions,
      CopyFile.DestinationResource, NWindowOperation) que quebram quando
      engine realinha ao pin. Drift em qualquer direção é violação policy.
    applies_to:
      include: ["project.json"]
    detect:
      type: nuget_version_check
      params:
        package: UiPath.UIAutomation.Activities
        exact: "25.10.8"
    fix:
      apply_class: deterministic
      mechanical:
        type: set_dependency_pin
        package: UiPath.UIAutomation.Activities
        version: "[25.10.8]"
      prose: |
        Pinar `dependencies."UiPath.UIAutomation.Activities" = "[25.10.8]"`.

  - id: D-1c
    severity: ERROR
    category: breaking
    target: windows
    title: "UiPath.Excel.Activities == [3.1.2]"
    description: |
      Pin EXATO Sicoob: `UiPath.Excel.Activities` `[3.1.2]`. Drift em
      qualquer direção (maior OU menor) é violação policy — Activity
      Migrator pode injetar latest stable; engine realinha ao pin.
    applies_to:
      include: ["project.json"]
    detect:
      type: nuget_version_check
      params:
        package: UiPath.Excel.Activities
        exact: "3.1.2"
    fix:
      apply_class: deterministic
      mechanical:
        type: set_dependency_pin
        package: UiPath.Excel.Activities
        version: "[3.1.2]"
      prose: |
        Pinar `dependencies."UiPath.Excel.Activities" = "[3.1.2]"`.

  - id: D-1d
    severity: ERROR
    category: breaking
    target: windows
    title: "UiPath.Database.Activities == [1.10.1]"
    description: |
      Pin EXATO Sicoob: `UiPath.Database.Activities` `[1.10.1]`.
      Pré-1.10.0 tinha bug Try/Catch em Windows que corrompia routing
      BusinessException × SystemException. Drift em qualquer direção
      (maior OU menor) é violação policy.
    applies_to:
      include: ["project.json"]
    detect:
      type: nuget_version_check
      params:
        package: UiPath.Database.Activities
        exact: "1.10.1"
    fix:
      apply_class: deterministic
      mechanical:
        type: set_dependency_pin
        package: UiPath.Database.Activities
        version: "[1.10.1]"
      prose: |
        Pinar `dependencies."UiPath.Database.Activities" = "[1.10.1]"`.

  - id: D-1e
    severity: ERROR
    category: breaking
    target: windows
    title: "UiPath.WebAPI.Activities == [1.20.1]"
    description: |
      Pin EXATO Sicoob: `UiPath.WebAPI.Activities` `[1.20.1]`. v1.20.0 foi
      withdrawn. v1.20.1 corrige UTF-8 file download corruption. Drift em
      qualquer direção (maior OU menor) é violação policy — Activity
      Migrator pode injetar latest stable; engine realinha ao pin.
    applies_to:
      include: ["project.json"]
    detect:
      type: nuget_version_check
