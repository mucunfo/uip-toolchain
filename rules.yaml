  - id: D-PINALERT
    severity: ERROR
    category: breaking
    target: windows
    title: "API exclusiva de versão > pin detectada em XAML"
    description: |
      XAML usa API/activity introduzida em versão > pin atual do pacote.

      Causa típica: Activity Migrator (Studio GA, headless) pega latest
      stable do pacote (ignora pin Sicoob declarado em project.json) e
      injeta APIs novas durante a migração Windows. Quando engine realinha
      o pacote ao pin via D-1* (fix mecânico), as APIs órfãs sobrevivem
      no XAML e geram `UIPATH:LOAD ERROR` no analyzer do Studio.

      D-PIN-ALERT cruza `project.json::dependencies` (pin atual por pacote)
      com `assets/version_exclusive_apis.yaml` (APIs e versão de origem).
      Para cada API exclusiva de versão > pin encontrada no XAML, emite
      finding com fix textual.

      Lista de APIs mantida em `assets/version_exclusive_apis.yaml` —
      adicionar novos casos conforme aparecerem.
    applies_to:
      include: ["*.xaml"]
      exclude:
        - "**/.local/**"
        - "**/.tmp/**"
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.pin_alert
        function: detect_pin_alert
    fix:
      # Mixed: attribute strips (LogRetriedExceptions, DestinationResource, etc)
      # têm mechanical=strip_xml_attribute → deterministic per-finding.
      # Element replaces (NWindowOperation) sem mechanical → contextual per-finding
      # via classifier refinement em check_perfect.py.
      apply_class: deterministic
      prose: |
        Ver `fix:` específico no message do finding. Tipicamente:
        - Atributo XAML exclusivo de versão > pin: REMOVER do XAML (auto via strip_xml_attribute).
        - Activity exclusiva de versão > pin: substituir por equivalente
          Modern presente na pin (ex: NWindowOperation → NApplicationCard
          CloseMode="Always"). MANUAL — element replace exige context.
        Após edit, re-rodar review p/ confirmar que UIPATH:LOAD não dispara mais.

  - id: D-2
    severity: ERROR
    category: breaking
    target: windows
    title: "NuGet peer dependency conflict (NU1605 prevention)"
    description: |
      Dependência primária em `project.json::dependencies` tem peer
      requirement (declarada no `.nuspec` do package) que conflita com pin
      de outra dependência no mesmo `project.json`.

      Exemplo conceitual:
        UIA 25.10.29 → peer `UiPath.UIAutomation.Activities.Runtime [25.10.29]`
        Project pin `UiPath.UIAutomation.Activities.Runtime [25.10.8]`
        → downgrade. Studio Publish gera `NU1605: package downgrade`.

      Studio analyzer (uipcli analyze) NÃO valida peer compat — passa
      silencioso. Engine valida cruzando cache local de `.nupkg`
      (extrai `.nuspec` via ZIP) com `project.json::dependencies`.

      Detector resolve peer requirement de cada primary dep no cache local
      e checa se versão pinada do peer satisfaz o range (`[X.Y.Z]`,
      `>=X.Y.Z`, etc.). Conflito → finding com `(primary, peer, expected,
      actual)`. Não usa `dotnet restore` (offline-safe, determinístico).

      Cache padrão: `~/.nuget/packages/<id>/<version>/<id>.nuspec`.
      Override via param `nupkgs_cache_dir`.
    applies_to:
      include: ["project.json"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.nuget_peer
        function: detect_nuget_peer_conflict
    fix:
      apply_class: contextual  # fix depende de qual lado realinhar (primary vs peer)
      prose: |
        Resolver conflito atualizando pin para versão compatível:
        - Option A: alinhar peer ao requirement da primary (recomendado se
          primary é o pacote core, ex: UIA).
        - Option B: downgrade da primary para versão cujo peer requirement
          satisfaz o pin atual.
        Consultar `.nuspec` do package primário (`<dependencies><group>
        <dependency>`) para ver requirement exato. Após edit, re-rodar
        review p/ confirmar zero D-2.

# ============================================================
# Batch 4 — Per-package (Windows target)
# Maioria reference/agent_only. Pacotes pinados em D-1*.
# ============================================================

# ---- EXC — Excel ----

  - id: EXC-1
    severity: ERROR
    category: architectural
    target: windows
    title: "Use Excel File (Modern) em vez de Excel Application Scope (Classic)"
    description: |
      Em projetos Windows, usar `Use Excel File` (Modern) em vez de
      `Excel Application Scope` (Classic). Classic mantido só por compat.
      Modern integra com Excel Process Scope para reuso de sessão.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: regex
      pattern: '<ui:ExcelApplicationScope\b'

  - id: EXC-2
    severity: ERROR
    category: architectural
    target: windows
    title: "Use Excel File dentro de Excel Process Scope"
    description: |
      Process Scope controla segurança de macros, conflitos e ciclo da sessão.
      Sem ele cada Use Excel File abre/mata instância e vaza handles COM.
    detect:
      type: agent_only

  - id: EXC-3
    severity: ERROR
    category: architectural
    target: windows
    title: "Visible=False, ReadOnly=True quando atividade só lê"
    description: |
      `Config.xlsx`, listas de input do dispatcher: Visible=False evita
      janela Excel real (custa segundos); ReadOnly=True previne escrita
      acidental em arquivos compartilhados.
    detect:
      type: agent_only

  - id: EXC-4
    severity: ERROR
    category: architectural
    target: windows
    title: "Senhas de workbook só via Orchestrator Credential SecureString"
    description: |
      `Password`/`EditPassword` nunca literal nem em Config.xlsx.
    detect:
      type: agent_only

  - id: EXC-5
    severity: WARN
    category: architectural
    target: windows
    title: "Workbook activities preferíveis a Use Excel File para .xlsx puros"
    description: |
      Para leitura/escrita pura sem fórmulas/macros/formatação preferir
      Workbook activities — não exigem Excel instalado, ~10x mais rápido.
    detect:
      type: agent_only

  - id: EXC-6
    severity: WARN
    category: architectural
    target: windows
    title: "Não aninhar Use Excel File para mesmo workbook"
    description: |
      Reusar referência IExcelWorkbook existente.
      Aninhamento causa file-lock errors.
    detect:
      type: agent_only

  - id: EXC-7
    severity: INFO
    category: architectural
    target: windows
    title: "AutoSave=False + Save Excel File explícito em checkpoints"
    description: |
      AutoSave em workbook de rede + falha mid-write produz arquivo parcial
      que REFramework retenta, duplicando linhas.
    detect:
      type: agent_only

# ---- DB — Database ----

  - id: DB-1
    severity: ERROR
    category: architectural
    target: windows
    title: "targetFramework=Windows alinhado ao stack"
    description: |
      Cross-platform suportado v1.9.0+ mas não usar em Sicoob por padrão.
      v2.0.0 dropou .NET 4.6.1 e Windows-Legacy.
    detect:
      type: agent_only

  - id: DB-2
    severity: ERROR
    category: architectural
    target: windows
    title: "Connect/Disconnect em Init/Close — não por transação"
    description: |
      Abrir/fechar conexão DB2/SQL por queue item esgota pool e dispara
      ORA-12519/SQLSTATE 08001. Uma conexão por execução do Performer.
    detect:
      type: agent_only

  - id: DB-3
    severity: ERROR
    category: architectural
    target: windows
    title: "Credenciais DB via Secure connection string (SecureString)"
    description: |
      Nunca ConnectionString plana. SecureString é o mecanismo documentado
      para credenciais sensíveis (DB2 mainframe).
    detect:
      type: agent_only

  - id: DB-4
    severity: ERROR
    category: architectural
    target: windows
    title: "Parameters em Execute Query/Non Query — nunca concatenar SQL"
    description: |
      Concatenação é SQL-injetável. Identificadores de cliente
      (CPF, conta, agência) precisam parametrização.
    detect:
      type: agent_only

  # DB-5 removida 2026-05-19: redundante com D-1d (pin EXATO [1.10.1],
  # deterministic auto-fix). Versão min: 1.10.0 era mais fraca + double-flag
  # mesmo finding em projetos com drift.

  - id: DB-6
    severity: ERROR
    category: architectural
    target: windows
    title: "Multi-statement em Start Transaction com Commit/Rollback"
    description: |
      Não confiar em auto-commit. Escritas parciais sem commit explícito
      produzem registros órfãos não detectáveis pelo Performer.
    detect:
      type: agent_only

  - id: DB-7b
    severity: WARN
    category: breaking
    target: windows
    title: "ProviderName=IBM.Data.DB2 legacy → .Core"
    description: |
      `IBM.Data.DB2` (sem `.Core`) é o assembly Framework. Windows target
      (.NET 6+) exige `IBM.Data.DB2.Core`. Provider errado causa
      `Keyword not supported` pós-migração.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: regex
      pattern: 'ProviderName="IBM\.Data\.DB2(?!\.Core)"'
    fix:
      apply_class: deterministic
      mechanical:
        type: regex_replace
        pattern: 'ProviderName="IBM\.Data\.DB2(?!\.Core)"'
        replacement: 'ProviderName="IBM.Data.DB2.Core"'
      prose: |
        Trocar `ProviderName="IBM.Data.DB2"` por `ProviderName="IBM.Data.DB2.Core"`.
    examples:
      bad: 'ProviderName="IBM.Data.DB2"'
      good: 'ProviderName="IBM.Data.DB2.Core"'

  - id: DB-7c
    severity: WARN
    category: breaking
    target: windows
    title: "ProviderName=System.Data.SqlClient → Microsoft.Data.SqlClient"
    description: |
      `System.Data.SqlClient` deprecated. Windows target (.NET 6+) usa
      `Microsoft.Data.SqlClient` (pacote independente, mantido pela MS).
      Provider errado causa `Keyword not supported` pós-migração.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: regex
      pattern: 'ProviderName="System\.Data\.SqlClient"'
    fix:
      apply_class: deterministic
      mechanical:
        type: regex_replace
        pattern: 'ProviderName="System\.Data\.SqlClient"'
        replacement: 'ProviderName="Microsoft.Data.SqlClient"'
      prose: |
        Trocar `ProviderName="System.Data.SqlClient"` por `ProviderName="Microsoft.Data.SqlClient"`.
    examples:
      bad: 'ProviderName="System.Data.SqlClient"'
      good: 'ProviderName="Microsoft.Data.SqlClient"'

# ---- API — WebAPI ----

  - id: API-1
    severity: HALT
    category: architectural
    target: windows
    title: "Nunca ContinueOnError=True em HTTP Request POST/PUT/PATCH/DELETE"
    description: |
      ContinueOnError default=True engole 4xx/5xx silenciosamente.
      Em endpoints não-idempotentes mascara falhas.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: regex
      pattern: '<ui:HttpClient\b[^>]*Method="(?:POST|PUT|PATCH|DELETE)"[^>]*ContinueOnError="True"'

  - id: API-2
    severity: ERROR
    category: architectural
    target: windows
    title: "Retry só em verbos idempotentes"
    description: |
      GET, HEAD, PUT com idempotency key. POST sem retry a menos que servidor
      documente header de idempotência. Replay em transient pode duplicar
      lançamento financeiro.
    detect:
      type: agent_only

  - id: API-3
    severity: ERROR
    category: architectural
    target: windows
    title: "Override timeout default 10000 ms para chamadas batch"
    description: |
      APIs REST mainframe-backed Sicoob excedem 10s. Default dispara
      SystemException que REFramework retenta indefinidamente.
      Pinar valor em Config.xlsx (`API_Timeout_Ms`).
    detect:
      type: agent_only

  - id: API-4
    severity: ERROR
    category: architectural
    target: windows
    title: "Credenciais API via Orchestrator Credential"
    description: |
      Basic (SecureString password) ou Bearer token; nunca embedded em
      headers como string plana.
    detect:
      type: agent_only

  # API-5 removida 2026-05-19: sem necessidade ativa no contexto Sicoob atual.
  # Re-introduzir caso compliance bancária flag config inseguro em auditoria.

  - id: API-6
    severity: WARN
    category: breaking
    target: windows
    title: "SOAP Request remanescente — só Windows-Legacy"
    description: |
      SOAP Request 1.x não compatível com .NET 6+. Migrado vira
      HTTP Request + body manual application/soap+xml.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: regex
      pattern: '<ui:SoapRequest\b'

  - id: API-7
    severity: WARN
    category: architectural
    target: windows
    title: "JSON grande via body Stream + desserialização incremental"
    description: |
      Body Text default carrega resposta completa em String, estoura
      limite 2GB CLR em response multi-MB.
    detect:
      type: agent_only

# ---- UI — UIAutomation ----

  - id: UI-1
    severity: ERROR
    category: architectural
    target: windows
    title: "Modern activities (NClick/NTypeInto/NApplicationCard) — nunca Classic"
    description: |
      Classic Click/TypeInto/Open Browser não tem inline designers,
      verification, Check App State Wait active, Find Elements.
      Seletores precisam ser regerados com Modern UI Explorer.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: regex
      pattern: '<ui:(?:Click|TypeInto|OpenBrowser|GetText|GetAttribute|HighlightElements|MouseClick|HoverActivity)\b'

  - id: UI-2
    severity: ERROR
    category: architectural
    target: windows
    title: "Sisbr (Chrome incognito) → InteractionMode=Simulate"
    description: |
      Simulate é background-capable, tolerante a screen-lock em robôs
      unattended. HardwareEvents falha em sessão bloqueada.
      ChromiumAPI só fallback.
    detect:
      type: agent_only

  - id: UI-3
    severity: ERROR
    category: architectural
    target: windows
    title: "AttachMode=ByInstance em apps desktop/Sisbr"
    description: |
      Nunca ByTitle/ByProcessId. ByTitle colide com 2 janelas Sisbr/DB2 abertas.
      ByInstance vincula ao UiElement retornado por Open e sobrevive a
      mudanças de título mid-transaction.
    detect:
      type: agent_only

  - id: UI-4
    severity: WARN
    category: architectural
    target: windows
    title: "Chrome NApplicationCard com --incognito + CloseSession ao fim"
    description: |
      Incognito isola cookies/cache; cada browser fecha deterministicamente.
    detect:
      type: agent_only

  - id: UI-5
    severity: WARN
    category: architectural
    target: windows
    title: "Computer Vision desabilitado por default (data leak)"
    description: |
      CV vem desabilitado desde 25.10.27 para evitar leak de dado sensível.
      Telas bancárias nunca devem sair do host. Preferir Strict/Fuzzy/Image
      com anchors.
    detect:
      type: agent_only

  - id: UI-6
    severity: WARN
    category: architectural
    target: windows
    title: "Pós Legacy→Windows: regerar seletores + validar OCR/Vision"
    description: |
      Schemas de seletor .NET 4.6.1 ≠ .NET 6/8. Mismatch UiPath.Vision causa
      "OCR engine not found" e ByInstance attach failure pós-migração.
    detect:
      type: agent_only

  - id: UI-7
    severity: INFO
    category: architectural
    target: windows
    title: "Timeout explícito + DelayBefore/After=0 em Simulate"
    description: |
      Default 30s baixo para Sisbr. Simulate não precisa de delays
      (são para HardwareEvents).
      Detector + fix mecânico cobrem APENAS DelayBefore/After != 0 em
      activities com InteractionMode="Simulate". Timeout enforcement
      permanece manual (valor depende de Config Sicoob).
      Scope-strict: guard InteractionMode="Simulate" impede polluir
      HardwareEvents/ChromiumAPI no mesmo XAML.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: python
      params:
        module: scripts.rule_engine.heuristics.windows
        function: detect_ui7_simulate_delays
    fix:
      apply_class: deterministic
      # fix_mechanical per-finding (type=force_attribute_in_activity_with_guard).
      prose: |
        Quando InteractionMode="Simulate", forçar DelayBefore="0" e
        DelayAfter="0" (delays só fazem sentido em HardwareEvents).
        Timeout permanece manual — valor depende de Config Sicoob.

# ---- SYS — System ----

  - id: SYS-1
    severity: HALT
    category: breaking
    target: all
    title: "Projeto deve targetar Windows (.NET 6+)"
    description: |
      System v25.2.1+ não funciona em Windows-Legacy.
      25.4.3 corrige WorkerProcess.exe .NET 6 detection.
    applies_to:
      include: ["project.json"]
    detect:
      type: json_field_check
      params:
        path: targetFramework
        expected: Windows

