# ============================================================
# Batch 4 — Per-package (Windows target)
# Maioria reference/agent_only. Pacotes pinados em D-1*.
# ============================================================

# ---- EXC — Excel ----

  - id: EXC-1
    severity: ERROR
    category: architectural
    target: windows
    title: "Use Excel File (Modern) em vez de Excel Application Scope (Classic)"
    description: |
      Em projetos Windows, usar `Use Excel File` (Modern) em vez de
      `Excel Application Scope` (Classic). Classic mantido só por compat.
      Modern integra com Excel Process Scope para reuso de sessão.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: regex
      pattern: '<ui:ExcelApplicationScope\b'

  - id: EXC-2
    severity: ERROR
    category: architectural
    target: windows
    title: "Use Excel File dentro de Excel Process Scope"
    description: |
      Process Scope controla segurança de macros, conflitos e ciclo da sessão.
      Sem ele cada Use Excel File abre/mata instância e vaza handles COM.
    detect:
      type: agent_only

  - id: EXC-3
    severity: ERROR
    category: architectural
    target: windows
    title: "Visible=False, ReadOnly=True quando atividade só lê"
    description: |
      `Config.xlsx`, listas de input do dispatcher: Visible=False evita
      janela Excel real (custa segundos); ReadOnly=True previne escrita
      acidental em arquivos compartilhados.
    detect:
      type: agent_only

  - id: EXC-4
    severity: ERROR
    category: architectural
    target: windows
    title: "Senhas de workbook só via Orchestrator Credential SecureString"
    description: |
      `Password`/`EditPassword` nunca literal nem em Config.xlsx.
    detect:
      type: agent_only

  - id: EXC-5
    severity: WARN
    category: architectural
    target: windows
    title: "Workbook activities preferíveis a Use Excel File para .xlsx puros"
    description: |
      Para leitura/escrita pura sem fórmulas/macros/formatação preferir
      Workbook activities — não exigem Excel instalado, ~10x mais rápido.
    detect:
      type: agent_only

  - id: EXC-6
    severity: WARN
    category: architectural
    target: windows
    title: "Não aninhar Use Excel File para mesmo workbook"
    description: |
      Reusar referência IExcelWorkbook existente.
      Aninhamento causa file-lock errors.
    detect:
      type: agent_only

  - id: EXC-7
    severity: INFO
    category: architectural
    target: windows
    title: "AutoSave=False + Save Excel File explícito em checkpoints"
    description: |
      AutoSave em workbook de rede + falha mid-write produz arquivo parcial
      que REFramework retenta, duplicando linhas.
    detect:
      type: agent_only

# ---- DB — Database ----

  - id: DB-1
    severity: ERROR
    category: architectural
    target: windows
    title: "targetFramework=Windows alinhado ao stack"
    description: |
      Cross-platform suportado v1.9.0+ mas não usar em Sicoob por padrão.
      v2.0.0 dropou .NET 4.6.1 e Windows-Legacy.
    detect:
      type: agent_only

  - id: DB-2
    severity: ERROR
    category: architectural
    target: windows
    title: "Connect/Disconnect em Init/Close — não por transação"
    description: |
      Abrir/fechar conexão DB2/SQL por queue item esgota pool e dispara
      ORA-12519/SQLSTATE 08001. Uma conexão por execução do Performer.
    detect:
      type: agent_only

  - id: DB-3
    severity: ERROR
    category: architectural
    target: windows
    title: "Credenciais DB via Secure connection string (SecureString)"
    description: |
      Nunca ConnectionString plana. SecureString é o mecanismo documentado
      para credenciais sensíveis (DB2 mainframe).
    detect:
      type: agent_only

  - id: DB-4
    severity: ERROR
    category: architectural
    target: windows
    title: "Parameters em Execute Query/Non Query — nunca concatenar SQL"
    description: |
      Concatenação é SQL-injetável. Identificadores de cliente
      (CPF, conta, agência) precisam parametrização.
    detect:
      type: agent_only

  - id: DB-5
    severity: ERROR
    category: breaking
    target: windows
    title: "UiPath.Database.Activities >= 1.10.0"
    description: |
      Versões anteriores tinham bug Try/Catch em Windows que pulava Catch.
      1.10.1 corrige adicional Studio 2023.10.
    applies_to:
      include: ["project.json"]
    detect:
      type: nuget_version_check
      params:
        package: UiPath.Database.Activities
        min: "1.10.0"

  - id: DB-6
    severity: ERROR
    category: architectural
    target: windows
    title: "Multi-statement em Start Transaction com Commit/Rollback"
    description: |
      Não confiar em auto-commit. Escritas parciais sem commit explícito
      produzem registros órfãos não detectáveis pelo Performer.
    detect:
      type: agent_only

  - id: DB-7b
    severity: WARN
    category: breaking
    target: windows
    title: "ProviderName=IBM.Data.DB2 legacy → .Core"
    description: |
      `IBM.Data.DB2` (sem `.Core`) é o assembly Framework. Windows target
      (.NET 6+) exige `IBM.Data.DB2.Core`. Provider errado causa
      `Keyword not supported` pós-migração.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: regex
      pattern: 'ProviderName="IBM\.Data\.DB2(?!\.Core)"'
    fix:
      apply_class: deterministic
      mechanical:
        type: regex_replace
        pattern: 'ProviderName="IBM\.Data\.DB2(?!\.Core)"'
        replacement: 'ProviderName="IBM.Data.DB2.Core"'
      prose: |
        Trocar `ProviderName="IBM.Data.DB2"` por `ProviderName="IBM.Data.DB2.Core"`.
    examples:
      bad: 'ProviderName="IBM.Data.DB2"'
      good: 'ProviderName="IBM.Data.DB2.Core"'

  - id: DB-7c
    severity: WARN
    category: breaking
    target: windows
    title: "ProviderName=System.Data.SqlClient → Microsoft.Data.SqlClient"
    description: |
      `System.Data.SqlClient` deprecated. Windows target (.NET 6+) usa
      `Microsoft.Data.SqlClient` (pacote independente, mantido pela MS).
      Provider errado causa `Keyword not supported` pós-migração.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: regex
      pattern: 'ProviderName="System\.Data\.SqlClient"'
    fix:
      apply_class: deterministic
      mechanical:
        type: regex_replace
        pattern: 'ProviderName="System\.Data\.SqlClient"'
        replacement: 'ProviderName="Microsoft.Data.SqlClient"'
      prose: |
        Trocar `ProviderName="System.Data.SqlClient"` por `ProviderName="Microsoft.Data.SqlClient"`.
    examples:
      bad: 'ProviderName="System.Data.SqlClient"'
      good: 'ProviderName="Microsoft.Data.SqlClient"'

# ---- API — WebAPI ----

  - id: API-1
    severity: HALT
    category: architectural
    target: windows
    title: "Nunca ContinueOnError=True em HTTP Request POST/PUT/PATCH/DELETE"
    description: |
      ContinueOnError default=True engole 4xx/5xx silenciosamente.
      Em endpoints não-idempotentes mascara falhas.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: regex
      pattern: '<ui:HttpClient\b[^>]*Method="(?:POST|PUT|PATCH|DELETE)"[^>]*ContinueOnError="True"'

  - id: API-2
    severity: ERROR
    category: architectural
    target: windows
    title: "Retry só em verbos idempotentes"
    description: |
      GET, HEAD, PUT com idempotency key. POST sem retry a menos que servidor
      documente header de idempotência. Replay em transient pode duplicar
      lançamento financeiro.
    detect:
      type: agent_only

  - id: API-3
    severity: ERROR
    category: architectural
    target: windows
    title: "Override timeout default 10000 ms para chamadas batch"
    description: |
      APIs REST mainframe-backed Sicoob excedem 10s. Default dispara
      SystemException que REFramework retenta indefinidamente.
      Pinar valor em Config.xlsx (`API_Timeout_Ms`).
    detect:
      type: agent_only

  - id: API-4
    severity: ERROR
    category: architectural
    target: windows
    title: "Credenciais API via Orchestrator Credential"
    description: |
      Basic (SecureString password) ou Bearer token; nunca embedded em
      headers como string plana.
    detect:
      type: agent_only

  - id: API-5
    severity: ERROR
    category: architectural
    target: windows
    title: "Forçar TLS 1.2/1.3, Disable SSL verification=False em prod"
    description: |
      Default "Automatic" pode negociar para baixo. Compliance bancária
      e gateway Sicoob exigem TLS 1.2+ com chain validation.
    detect:
      type: agent_only

  - id: API-6
    severity: WARN
    category: breaking
    target: windows
    title: "SOAP Request remanescente — só Windows-Legacy"
    description: |
      SOAP Request 1.x não compatível com .NET 6+. Migrado vira
      HTTP Request + body manual application/soap+xml.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: regex
      pattern: '<ui:SoapRequest\b'

  - id: API-7
    severity: WARN
    category: architectural
    target: windows
    title: "JSON grande via body Stream + desserialização incremental"
    description: |
      Body Text default carrega resposta completa em String, estoura
      limite 2GB CLR em response multi-MB.
    detect:
      type: agent_only

# ---- UI — UIAutomation ----

  - id: UI-1
    severity: ERROR
    category: architectural
    target: windows
    title: "Modern activities (NClick/NTypeInto/NApplicationCard) — nunca Classic"
    description: |
      Classic Click/TypeInto/Open Browser não tem inline designers,
      verification, Check App State Wait active, Find Elements.
      Seletores precisam ser regerados com Modern UI Explorer.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: regex
      pattern: '<ui:(?:Click|TypeInto|OpenBrowser|GetText|GetAttribute|HighlightElements|MouseClick|HoverActivity)\b'

  - id: UI-2
    severity: ERROR
    category: architectural
    target: windows
    title: "Sisbr (Chrome incognito) → InteractionMode=Simulate"
    description: |
      Simulate é background-capable, tolerante a screen-lock em robôs
      unattended. HardwareEvents falha em sessão bloqueada.
      ChromiumAPI só fallback.
    detect:
      type: agent_only

  - id: UI-3
    severity: ERROR
    category: architectural
    target: windows
    title: "AttachMode=ByInstance em apps desktop/Sisbr"
    description: |
      Nunca ByTitle/ByProcessId. ByTitle colide com 2 janelas Sisbr/DB2 abertas.
      ByInstance vincula ao UiElement retornado por Open e sobrevive a
      mudanças de título mid-transaction.
    detect:
      type: agent_only

  - id: UI-4
    severity: WARN
    category: architectural
    target: windows
    title: "Chrome NApplicationCard com --incognito + CloseSession ao fim"
    description: |
      Incognito isola cookies/cache; cada browser fecha deterministicamente.
    detect:
      type: agent_only

  - id: UI-5
    severity: WARN
    category: architectural
    target: windows
    title: "Computer Vision desabilitado por default (data leak)"
    description: |
      CV vem desabilitado desde 25.10.27 para evitar leak de dado sensível.
      Telas bancárias nunca devem sair do host. Preferir Strict/Fuzzy/Image
      com anchors.
    detect:
      type: agent_only

  - id: UI-6
    severity: WARN
    category: architectural
    target: windows
    title: "Pós Legacy→Windows: regerar seletores + validar OCR/Vision"
    description: |
      Schemas de seletor .NET 4.6.1 ≠ .NET 6/8. Mismatch UiPath.Vision causa
      "OCR engine not found" e ByInstance attach failure pós-migração.
    detect:
      type: agent_only

  - id: UI-7
    severity: INFO
    category: architectural
    target: windows
    title: "Timeout explícito + DelayBefore/After=0 em Simulate"
    description: |
      Default 30s baixo para Sisbr. Simulate não precisa de delays
      (são para HardwareEvents).
    detect:
      type: agent_only

# ---- SYS — System ----

  - id: SYS-1
    severity: HALT
    category: breaking
    target: all
    title: "Projeto deve targetar Windows (.NET 6+)"
    description: |
      System v25.2.1+ não funciona em Windows-Legacy.
      25.4.3 corrige WorkerProcess.exe .NET 6 detection.
    applies_to:
      include: ["project.json"]
    detect:
      type: json_field_check
      params:
        path: targetFramework
        expected: Windows

  - id: SYS-2
    severity: HALT
    category: architectural
    target: all
    title: "Credenciais via Get Credential/Get Asset (Orchestrator)"
    description: |
      Sem senhas/tokens hardcoded em XAML/Config.xlsx (DB2, Sisbr).
      Activity retorna SecureString; ACLs de pasta Orchestrator aplicam.
      Compliance Resolução BCB 4.893.
    detect:
      type: agent_only

  - id: SYS-3
    severity: ERROR
    category: architectural
    target: all
    title: "REFramework: Get Credential dentro de Init State"
    description: |
      (Ou per-transaction se CacheStrategy=Execution).
      Passar SecureString — nunca converter para String plana.
    detect:
      type: agent_only

  - id: SYS-4
    severity: ERROR
    category: architectural
    target: all
    title: "OrchestratorFolderPath explícito (Modern)"
    description: |
      Quando assets vivem fora da ambient folder. Multi-tenant Sicoob
      (DEV/HML/PRD) faz resolução ambient pegar asset errado.
    detect:
      type: agent_only

  - id: SYS-5
    severity: WARN
    category: architectural
    target: all
    title: "Throw/Rethrow business vs system explícitos no Performer"
    description: |
      Default ContinueOnError=False é correto. Sobrescrever esconde erros
      e quebra retry/SystemException counter do REFramework.
    detect:
      type: agent_only

  - id: SYS-6
    severity: WARN
    category: architectural
    target: all
    title: "Persistence só em processo separado, não no Performer"
    description: |
      UI elements, browsers, DB connections dentro do Performer não podem
      ser persistidos e throw em suspend. Dispatcher cria task; workflow
      de persistence separado retoma.
    detect:
      type: agent_only

  - id: SYS-7
    severity: INFO
    category: architectural
    target: all
    title: "Pinar UiPath.System.Activities 25.4.4"
    description: |
      Evita regressão de filtro OData vista em 26.2.0.
      25.12+ Filter Builder para reporting.
    detect:
      type: agent_only

# ---- TEST — Testing pack ----

  - id: TEST-1
    severity: ERROR
    category: testing
    target: all
    title: "Verify Expression somente em Test Cases"
    description: |
      `Verify Expression`/`Verify Expression With Operator`/
      `Verify Control Attribute` SOMENTE em `Tests/`. Nunca dentro de
      Performer/Process.xaml. Logam falhas sem throw, corrompem transações.
    applies_to:
      include: ["**/*.xaml"]
      exclude: ["Tests/**"]
    detect:
      type: regex
      pattern: '<ui:(?:VerifyExpression|VerifyExpressionWithOperator|VerifyControlAttribute)\b'

  - id: TEST-2
    severity: ERROR
    category: testing
    target: all
    title: "Test Case segue Given-When-Then"
    description: |
      Given = arrange (mock data, navegar). When = Invoke do SUT.
      Then = Verify Expression comparando output. Template TestCase do
      Studio enforça layout; desviar quebra Test Manager.
    detect:
      type: agent_only

  - id: TEST-3
    severity: ERROR
    category: testing
    target: all
    title: "Mockar dependências externas (DB2, API Sisbr, SMTP)"
    description: |
      Mock em volta do Invoke Workflow; nunca CI tocar produção bancária.
    detect:
      type: agent_only

  - id: TEST-4
    severity: WARN
    category: testing
    target: all
    title: "TakeScreenshotIfFailed=True + AlternativeVerificationTitle"
    description: |
      Especialmente em data variations. Títulos aparecem em Test Manager
      para QA identificar variação sem rerodar.
    detect:
      type: agent_only

  - id: TEST-5
    severity: WARN
    category: testing
    target: all
    title: "Given workflows project-level + tag tests"
    description: |
      Setup compartilhado (login, abrir Sisbr). Uma asserção lógica por TC
      para falha diagnosticável.
    detect:
      type: agent_only

  - id: TEST-6
    severity: INFO
    category: testing
    target: all
    title: "Variações de dados via Data Service ou Test Data Queues"
    description: |
      Não Config.xlsx. Test data bancário precisa versionamento e PII control.
    detect:
      type: agent_only

# ---- CRY — Cryptography ----

  - id: CRY-1
    severity: HALT
    category: architectural
    target: all
    title: "Nunca hardcode keys/passwords em Encrypt/Hash"
    description: |
      Carregar de Orchestrator Asset (Credential) ou Windows Credential Store.
    detect:
      type: agent_only

  - id: CRY-2
    severity: ERROR
    category: architectural
    target: all
    title: "AES-GCM/AES-256 para simétrico; SHA256/512 para hash"
    description: |
      Evitar DES, RC2, MD5, SHA1, RIPEMD160. 1.4.x ainda expõe legados em
      dropdowns mas não compliam BACEN/PCI-DSS.
    applies_to:
      include: ["**/*.xaml"]
    detect:
      type: regex
      pattern: 'Algorithm="(?:DES|RC2|MD5|SHA1|RIPEMD160)"'

  - id: CRY-3
    severity: ERROR
    category: architectural
    target: all
    title: "Preferir KeySecureString sobre Key (String)"
    description: |
      1.4.x adicionou overloads SecureString para manter keys fora de
      memory dump e log verbose.
    detect:
      type: agent_only

  - id: CRY-4
    severity: WARN
    category: architectural
    target: all
    title: "Encrypt/Decrypt em Try/Catch sem logar inner verbatim"
    description: |
      CryptographicException pode ecoar IV bytes ou tamanho da key.
    detect:
      type: agent_only

  - id: CRY-5
    severity: WARN
    category: breaking
    target: all
    title: "Migrar Hash Text/File legadas (deprecated em 1.4.0+)"
    description: |
      Studio marca legadas como (deprecated). Novas Hash exigem Key.
      Verificar Key Encoding preservado na migração.
    detect:
      type: agent_only

  - id: CRY-6
    severity: INFO
    category: architectural
    target: all
