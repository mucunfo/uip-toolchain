      mas relevante se time abrir cross-platform.
    detect:
      type: agent_only

  - id: PDF-10
    severity: INFO
    category: architectural
    target: all
    title: "FIPS Compliance Flag (v3.1.0+)"
    description: |
      Algumas funcionalidades não-FIPS ainda podem throw exception.
      Auditoria Sicoob pode requerer FIPS — testar caminho específico.
    detect:
      type: agent_only

# ---- DULS — DocumentUnderstanding LocalServer ----

  - id: DULS-1
    severity: HALT
