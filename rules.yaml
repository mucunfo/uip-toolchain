  - id: IOCR-1
    severity: HALT
    category: breaking
    target: all
    title: "Pipeline obrigatório Taxonomy → Digitize → Classify → Extract → Validate → Export"
    description: |
      Activities downstream throwam quando DOM/TextResult ausente.
    detect:
